# =====================================================================
# CMS — pannello di amministrazione del sito Studio Campa
# =====================================================================

backend:
  name: github
  repo: doc-campa/drcampa-landing-1
  branch: main
  base_url: https://ubiquitous-bunny-0cd00a.netlify.app
  auth_endpoint: .netlify/functions/auth

media_folder: "images"
public_folder: "/images"
locale: 'it'
site_url: /
display_url: /

collections:
  - name: "content"
    label: "Contenuti del sito"
    delete: false
    editor:
      preview: true
    files:
      - file: "content.json"
        name: "main"
        label: "Landing page"
        description: "Modifica i contenuti della landing. Le sezioni sono trascinabili: puoi riordinarle, aggiungerne, rimuoverne. Le modifiche vengono pubblicate online quando clicchi su Save."
        fields:

          # =========================================================
          # 🌐 SITO
          # =========================================================
          - label: "🌐 Impostazioni Generali"
            name: "site"
            widget: "object"
            collapsed: true
            hint: "Le informazioni che compaiono nel tab del browser, su Google, e i colori del sito."
            fields:
              - {label: "Titolo del sito", name: "title", widget: "string", hint: "Quello che si legge nel tab del browser."}
              - {label: "Descrizione per Google", name: "meta_description", widget: "text", hint: "La descrizione che appare sotto il titolo del sito su Google. Max 160 caratteri."}
              - {label: "Testo accanto al logo", name: "logo_text", widget: "string", hint: "Quello che compare accanto al quadratino arancione del logo, in alto a sinistra."}

              # ---- 🎨 COLORI ----
              - label: "🎨 Colori del sito"
                name: "colors"
                widget: "object"
                collapsed: true
                hint: "Personalizza i colori principali del sito. Cambiando il colore ARANCIONE qui, tutti i bottoni arancioni, titoli evidenziati, e bordi del sito cambieranno di conseguenza. Lasciare un campo vuoto per usare il colore di default."
                fields:
                  - {label: "Colore principale (arancione brand)", name: "primary", widget: "color", required: false, default: "#e85d3c", allowInput: true, hint: "Il colore arancione del marchio. Compare in: bottoni primari, titoli evidenziati, card grandi arancioni, link accentuati. Default: #e85d3c"}
                  - {label: "Colore accento (giallo)", name: "accent", widget: "color", required: false, default: "#ffd43b", allowInput: true, hint: "Il giallo che si vede nell'hero principale (parola sottolineata) e nei bottoni gialli. Default: #ffd43b"}
                  - {label: "Colore testo principale (nero)", name: "ink", widget: "color", required: false, default: "#0a0a0a", allowInput: true, hint: "Il nero del testo principale e dello sfondo del footer/citazione. Default: #0a0a0a"}
                  - {label: "Sfondo soft (beige chiaro)", name: "bg_soft", widget: "color", required: false, default: "#faf7f3", allowInput: true, hint: "Il colore delle sezioni con sfondo leggero (Problema, Metodo, Programmi, Testimonianze). Default: #faf7f3"}

          # =========================================================
          # 📋 MENU
          # =========================================================
          - label: "📋 Menu di navigazione"
            name: "nav"
            widget: "object"
            collapsed: true
            hint: "La barra in cima al sito con i link e il bottone Prenota."
            fields:
              - label: "Voci del menu"
                name: "links"
                widget: "list"
                hint: "Le voci cliccabili nel menu. Puoi aggiungere, rimuovere o riordinare."
                fields:
                  - {label: "Testo visibile", name: "label", widget: "string"}
                  - {label: "Destinazione (link)", name: "href", widget: "string", hint: "Usa #nome-sezione per saltare a una sezione (es. #trattamenti)."}
              - {label: "Testo del link telefono", name: "phone_label", widget: "string", required: false}
              - {label: "Numero di telefono", name: "phone_href", widget: "string", required: false, hint: "Formato: tel:+390200000000"}
              - {label: "Testo del bottone arancione", name: "cta_label", widget: "string"}
              - {label: "Link del bottone arancione", name: "cta_href", widget: "string"}

          # =========================================================
          # 🧩 SEZIONI
          # =========================================================
          - label: "🧩 Sezioni della pagina"
            name: "sections"
            widget: "list"
            label_singular: "Sezione"
            hint: "Trascina le sezioni per riordinarle. Clicca + per aggiungerne. L'ordine qui = l'ordine sul sito."
            summary: "{{fields.type}} · {{fields.title_a}}{{fields.title}}{{fields.headline_main}}"
            types:

              - label: "✨ Hero"
                name: "hero"
                widget: "object"
                summary: "Hero · {{fields.headline_main}} {{fields.headline_accent}}"
                fields:
                  - {label: "Immagine di sfondo", name: "bg_image", widget: "image", hint: "Sfondo a tutto schermo. Idealmente orizzontale, almeno 1920px."}
                  - {label: "Watermark (testo gigante in trasparenza)", name: "watermark", widget: "string", required: false}
                  - {label: "Riga sopra il titolo", name: "headline_pre", widget: "string", hint: "Es: 'Bellezza Autentica. Risultati Reali.'"}
                  - {label: "Titolo grande - parte normale", name: "headline_main", widget: "string"}
                  - {label: "Titolo grande - parola GIALLA evidenziata", name: "headline_accent", widget: "string", hint: "La parola in giallo con il segno disegnato a mano sotto."}
                  - {label: "Sottotitolo - parte in corsivo", name: "subtitle_em", widget: "text", required: false}
                  - {label: "Sottotitolo - parte normale", name: "subtitle", widget: "text"}
                  - {label: "Testo del bottone giallo", name: "cta_label", widget: "string", required: false}
                  - {label: "Link del bottone giallo", name: "cta_href", widget: "string", required: false, default: "#contatti"}
                  - {label: "Card missione - etichetta in grassetto", name: "mission_label_strong", widget: "string", required: false, hint: "Lascia tutti i campi mission vuoti per nascondere l'intera card."}
                  - {label: "Card missione - testo descrittivo", name: "mission_label_text", widget: "string", required: false}
                  - {label: "Card missione - percentuale (0-100)", name: "mission_percent", widget: "number", required: false, value_type: "int", min: 0, max: 100}
                  - {label: "Card missione - numero grande", name: "mission_figure", widget: "string", required: false}
                  - {label: "Card missione - testo finale (parte normale)", name: "mission_sub_a", widget: "string", required: false}
                  - {label: "Card missione - testo finale (parte arancione)", name: "mission_sub_b", widget: "string", required: false}

              - label: "💬 Problema"
                name: "problem"
                widget: "object"
                summary: "Problema · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false, hint: "Es: 'studio' per linkare con #studio dal menu."}
                  - {label: "Watermark trasparente", name: "watermark", widget: "string", required: false}
                  - {label: "Titolo - parte nera", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE evidenziata", name: "title_accent", widget: "string"}
                  - label: "Paragrafi introduttivi"
                    name: "intro_paragraphs"
                    widget: "list"
                    field: {label: "Paragrafo", name: "p", widget: "text"}
                  - label: "Domande in grassetto"
                    name: "questions"
                    widget: "list"
                    field: {label: "Domanda", name: "q", widget: "string"}
                  - label: "Paragrafi centrali"
                    name: "middle_paragraphs"
                    widget: "list"
                    field: {label: "Paragrafo", name: "p", widget: "text"}
                  - label: "Citazione evidenziata (bordo arancione)"
                    name: "quote_lines"
                    widget: "list"
                    field: {label: "Riga", name: "line", widget: "text"}
                  - {label: "Riga di chiusura", name: "final_line", widget: "text", required: false}

              - label: "👤 Chi è il dottore"
                name: "about"
                widget: "object"
                summary: "About · {{fields.title}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false}
                  - {label: "Titolo principale", name: "title", widget: "string"}
                  - {label: "Lead (sottotitolo)", name: "lead", widget: "text"}
                  - {label: "Foto del dottore", name: "photo", widget: "image"}
                  - label: "Paragrafi del testo"
                    name: "body_paragraphs"
                    widget: "list"
                    hint: "Puoi usare <strong>parola</strong> per mettere in grassetto."
                    field: {label: "Paragrafo", name: "p", widget: "text"}
                  - {label: "Citazione finale (box evidenziato)", name: "callout", widget: "text", required: false}

              - label: "🏅 Card valore"
                name: "value_card"
                widget: "object"
                summary: "Card Valore · {{fields.title}}"
                fields:
                  - {label: "Titolo grande (bianco su arancione)", name: "title", widget: "string"}
                  - {label: "Paragrafo descrittivo", name: "lead", widget: "text"}
                  - {label: "Chiusura del paragrafo in GRASSETTO", name: "lead_strong", widget: "string", required: false}
                  - label: "3 cardline (i 3 vantaggi)"
                    name: "items"
                    widget: "list"
                    max: 3
                    fields:
                      - {label: "Icona", name: "icon", widget: "select", options: ["clock", "chart", "shield"]}
                      - {label: "Titolo", name: "title", widget: "string"}
                      - {label: "Tag (pillola in basso)", name: "tag", widget: "string", required: false}
                  - {label: "Testo finale (parte normale)", name: "footnote", widget: "text", required: false}
                  - {label: "Testo finale (parte in GRASSETTO)", name: "footnote_strong", widget: "string", required: false}

              - label: "🪜 Metodo"
                name: "method"
                widget: "object"
                summary: "Metodo · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false}
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Sottotitolo (prima riga)", name: "subtitle_a", widget: "text"}
                  - {label: "Sottotitolo (seconda riga)", name: "subtitle_b", widget: "text", required: false}
                  - {label: "Sottotitolo - chiusura in grassetto", name: "subtitle_strong", widget: "string", required: false}
                  - label: "Le tappe del metodo"
                    name: "cards"
                    widget: "list"
                    fields:
                      - {label: "Numero", name: "num", widget: "string"}
                      - {label: "Foto", name: "photo", widget: "image"}
                      - {label: "Titolo", name: "title", widget: "string"}
                      - {label: "Descrizione", name: "body", widget: "text"}

              - label: "🔺 Piramide"
                name: "levels"
                widget: "object"
                summary: "Piramide · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Sottotitolo", name: "subtitle", widget: "text"}
                  - label: "I 3 livelli"
                    name: "levels"
                    widget: "list"
                    fields:
                      - {label: "Tag", name: "tag", widget: "string"}
                      - {label: "Titolo", name: "title", widget: "string"}
                      - {label: "Descrizione", name: "body", widget: "text"}
                  - label: "Etichette sulla piramide"
                    name: "pyramid_labels"
                    widget: "list"
                    field: {label: "Etichetta", name: "label", widget: "string"}
                  - {label: "Testo di chiusura", name: "footer_a", widget: "text", required: false}
                  - {label: "Testo di chiusura in grassetto", name: "footer_strong", widget: "string", required: false}

              - label: "📦 Programmi"
                name: "programs"
                widget: "object"
                summary: "Programmi · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Sottotitolo", name: "subtitle", widget: "text"}
                  - label: "Programmi"
                    name: "cards"
                    widget: "list"
                    fields:
                      - {label: "Tag in corsivo", name: "tag", widget: "string", required: false}
                      - {label: "Titolo del programma", name: "title", widget: "string"}
                      - {label: "Sottotitolo del programma", name: "subtitle", widget: "string", required: false}
                      - {label: "Descrizione", name: "body", widget: "text"}
                      - {label: "Testo del link", name: "link_label", widget: "string", required: false}
                      - {label: "Destinazione del link", name: "link_href", widget: "string", required: false, default: "#contatti"}
                      - {label: "Foto del programma", name: "photo", widget: "image"}
                      - {label: "Foto a destra del testo?", name: "reverse", widget: "boolean", default: false}

              - label: "👥 Audience"
                name: "audience"
                widget: "object"
                summary: "Audience · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Sottotitolo", name: "subtitle", widget: "text"}
                  - label: "Tipi di paziente"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "Foto", name: "photo", widget: "image"}
                      - {label: "Titolo (categoria)", name: "title", widget: "string"}
                      - {label: "Frase d'apertura in grassetto", name: "body_strong", widget: "string"}
                      - {label: "Resto del paragrafo", name: "body", widget: "text"}

              - label: "📊 Statistiche"
                name: "stats"
                widget: "object"
                summary: "Statistiche · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false}
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Sottotitolo", name: "subtitle", widget: "text"}
                  - label: "Riga 1 di statistiche"
                    name: "row_a"
                    widget: "list"
                    fields:
                      - {label: "Pillola sopra il numero", name: "pill", widget: "string", required: false}
                      - {label: "Numero grande arancione", name: "num", widget: "string"}
                      - {label: "Etichetta sotto", name: "label", widget: "text"}
                  - label: "Riga 2 di statistiche (opzionale)"
                    name: "row_b"
                    widget: "list"
                    required: false
                    fields:
                      - {label: "Pillola sopra il numero", name: "pill", widget: "string", required: false}
                      - {label: "Numero grande arancione", name: "num", widget: "string"}
                      - {label: "Etichetta sotto", name: "label", widget: "text"}
                  - {label: "Disclaimer in fondo", name: "footnote", widget: "text", required: false}

              - label: "⭐ Testimonianze"
                name: "testimonials"
                widget: "object"
                summary: "Testimonianze · {{fields.title_a}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false}
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte in CORSIVO elegante", name: "title_italic", widget: "string"}
                  - label: "Testimonianze"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "Frase di apertura (in grassetto)", name: "text_strong", widget: "text"}
                      - {label: "Resto del commento", name: "text", widget: "text"}
                      - {label: "Foto del paziente (avatar tondo)", name: "avatar", widget: "image"}
                      - {label: "Nome (e iniziale del cognome)", name: "name", widget: "string"}

              - label: "🎤 Grande citazione"
                name: "big_quote"
                widget: "object"
                summary: "Quote · {{fields.author_name}}"
                fields:
                  - {label: "La citazione (testo lungo)", name: "quote", widget: "text"}
                  - {label: "Foto autore (tonda)", name: "author_photo", widget: "image"}
                  - {label: "Nome autore", name: "author_name", widget: "string"}

              - label: "✅ Caratteristiche"
                name: "features_card"
                widget: "object"
                summary: "Caratteristiche · {{fields.title}}"
                fields:
                  - {label: "Titolo grande (bianco)", name: "title", widget: "string"}
                  - {label: "Lead (paragrafo introduttivo)", name: "lead", widget: "text"}
                  - label: "Pillole/caratteristiche"
                    name: "pills"
                    widget: "list"
                    fields:
                      - {label: "Testo della pillola", name: "text", widget: "string"}
                      - {label: "Pillola SPECIALE (sfondo dorato + corsivo)", name: "special", widget: "boolean", default: false}

              - label: "📩 Form Contatti"
                name: "cta_form"
                widget: "object"
                summary: "Form Contatti · {{fields.title_a}} {{fields.title_accent}}"
                fields:
                  - {label: "ID per link interni", name: "id", widget: "string", required: false, default: "contatti"}
                  - {label: "Titolo - parte normale", name: "title_a", widget: "string"}
                  - {label: "Titolo - parte ARANCIONE", name: "title_accent", widget: "string"}
                  - {label: "Paragrafo introduttivo", name: "body", widget: "text"}
                  - label: "Bullet point con check arancione"
                    name: "perks"
                    widget: "list"
                    field: {label: "Vantaggio", name: "p", widget: "string"}
                  - {label: "Titolo del box del form", name: "form_title", widget: "string", default: "Prenota Consulto"}
                  - {label: "Sottotitolo sotto al titolo del form", name: "form_subtitle", widget: "string"}
                  - label: "Opzioni del menu 'Cosa ti interessa'"
                    name: "treatments"
                    widget: "list"
                    field: {label: "Trattamento", name: "t", widget: "string"}
                  - {label: "Etichetta bottone invio", name: "submit_label", widget: "string", default: "Invia Richiesta"}
                  - {label: "Titolo schermata di conferma", name: "success_title", widget: "string", default: "Grazie!"}
                  - {label: "Messaggio di conferma dopo invio", name: "success_body", widget: "text"}

          # =========================================================
          # 📎 FOOTER
          # =========================================================
          - label: "📎 Footer"
            name: "footer"
            widget: "object"
            collapsed: true
            hint: "La sezione nera in fondo al sito con link, contatti e copyright."
            fields:
              - {label: "Testo descrittivo accanto al logo", name: "about_text", widget: "text"}
              - label: "Colonne di link"
                name: "columns"
                widget: "list"
                fields:
                  - {label: "Titolo della colonna", name: "title", widget: "string"}
                  - label: "Link nella colonna"
                    name: "links"
                    widget: "list"
                    fields:
                      - {label: "Testo del link", name: "label", widget: "string"}
                      - {label: "Destinazione", name: "href", widget: "string"}
              - {label: "Copyright (in basso a sinistra)", name: "bottom_left", widget: "string"}
              - label: "Link in basso a destra (Privacy, Cookie, ecc.)"
                name: "bottom_links"
                widget: "list"
                fields:
                  - {label: "Testo", name: "label", widget: "string"}
                  - {label: "Destinazione", name: "href", widget: "string"}
