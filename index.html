/* ==========================================================
   TOPBAR ROTATOR — fa scorrere le voci della topbar
   una alla volta, ogni 4 secondi, con fade.
   ========================================================== */
function initTopbarMobileRotate(){
  const wrap = document.querySelector('.topbar-fixed');
  if(!wrap) return;
  const slots = Array.from(wrap.querySelectorAll('.tb-slot'))
    .filter(s => s.querySelector('*') || s.textContent.trim());
  const mq = window.matchMedia('(max-width: 860px)');
  let timer = null, idx = 0;
  function show(i){ slots.forEach((s,k)=>s.classList.toggle('is-active', k===i)); }
  function stop(){ if(timer){ clearInterval(timer); timer=null; } slots.forEach(s=>s.classList.remove('is-active')); }
  function start(){
    stop();
    if(slots.length === 0) return;
    idx = 0; show(0);
    if(slots.length < 2) return;
    timer = setInterval(()=>{ idx=(idx+1)%slots.length; show(idx); }, 3000);
  }
  function apply(){ if(mq.matches){ start(); } else { stop(); } }
  apply();
  if(mq.addEventListener) mq.addEventListener('change', apply);
  else if(mq.addListener) mq.addListener(apply);
}
function initTopbarRotator(){
  if(document.querySelector('.topbar-fixed')) return;
  const items = document.querySelectorAll('.topbar-item');
  if(!items.length) return;
  let current = 0;
  items[0].classList.add('is-active');
  if(items.length < 2) return; // se c'è solo una voce, rimane fissa
  setInterval(() => {
    items[current].classList.remove('is-active');
    current = (current + 1) % items.length;
    items[current].classList.add('is-active');
  }, 4000);
}

/* ==========================================================
   BEFORE / AFTER SLIDERS
   Drag laterale per scoprire prima/dopo. Funziona con mouse + touch.
   ========================================================== */
function initBeforeAfterSliders(){
  document.querySelectorAll('[data-ba-slider]').forEach(slider => {
    const compare = slider.querySelector('.ba-compare');
    const before  = slider.querySelector('.ba-before');
    const handle  = slider.querySelector('.ba-handle');
    if(!compare || !before || !handle) return;

    let dragging = false;

    function setPosition(clientX){
      const rect = compare.getBoundingClientRect();
      let x = clientX - rect.left;
      x = Math.max(0, Math.min(rect.width, x));
      const pct = (x / rect.width) * 100;
      before.style.clipPath = `polygon(0 0, ${pct}% 0, ${pct}% 100%, 0 100%)`;
      handle.style.left = `${pct}%`;
    }

    function onMove(e){
      if(!dragging) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setPosition(x);
    }
    function onUp(){ dragging = false; document.body.style.userSelect = ''; }
    function onDown(e){
      dragging = true;
      document.body.style.userSelect = 'none';
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      setPosition(x);
    }

    compare.addEventListener('mousedown', onDown);
    compare.addEventListener('touchstart', onDown, {passive:true});
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
  });
}

/* ==========================================================
   STATS BAND — count-up animato quando entra in viewport
   ========================================================== */
function initStatsBands(){
  const bands = document.querySelectorAll('[data-stats-band]');
  if(!bands.length) return;

  const formatNum = (n) => {
    // Formattazione italiana: punto come separatore migliaia
    return Math.round(n).toLocaleString('it-IT');
  };

  const animateCount = (el) => {
    // Se non ha data-count-to (numero decimale tipo "99,8"), lo lasciamo fisso
    if(!el.hasAttribute('data-count-to')) return;
    const target = parseInt(el.getAttribute('data-count-to'), 10) || 0;
    const duration = 1800;
    const start = performance.now();
    // easeOutExpo per un "rallentamento" elegante verso il numero finale
    const ease = (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t));
    function frame(now){
      const p = Math.min((now - start) / duration, 1);
      el.textContent = formatNum(target * ease(p));
      if(p < 1) requestAnimationFrame(frame);
      else el.textContent = formatNum(target);
    }
    requestAnimationFrame(frame);
  };

  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.querySelectorAll('.sb-count').forEach(animateCount);
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.35 });

  bands.forEach(b => io.observe(b));
}

/* ==========================================================
   TREATMENTS TABS — cambio categoria al click
   ========================================================== */
function initTreatmentsTabs(){
  document.querySelectorAll('[data-treatments-list]').forEach(section => {
    const items = Array.from(section.querySelectorAll('.tl-acc-item'));
    items.forEach(item => {
      const head = item.querySelector('.tl-acc-head');
      if(!head) return;
      head.addEventListener('click', () => {
        const wasOpen = item.classList.contains('is-open');
        if(wasOpen){
          item.classList.remove('is-open');
          head.setAttribute('aria-expanded','false');
        } else {
          items.forEach(o => {
            o.classList.remove('is-open');
            const h = o.querySelector('.tl-acc-head'); if(h) h.setAttribute('aria-expanded','false');
          });
          item.classList.add('is-open');
          head.setAttribute('aria-expanded','true');
        }
      });
    });
  });
}

/* ==========================================================
   COOKIE BANNER — consenso minimale (Meta Pixel parte solo se accettato)
   API: window.ccConsent() -> bool · window.openCookiePrefs() · evento 'cc-change'
   ========================================================== */
function initCookieBanner(){
  var KEY='cc_choice', el=null;
  function get(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } }
  window.ccConsent = function(){ return get()==='granted'; };
  function set(v){
    try{ localStorage.setItem(KEY, v); }catch(e){}
    hide();
    try{ document.dispatchEvent(new CustomEvent('cc-change', {detail:v})); }catch(e){}
  }
  function build(){
    el = document.createElement('div');
    el.className='ck-banner'; el.setAttribute('role','dialog'); el.setAttribute('aria-label',I18N.ckAria);
    el.innerHTML = '<p>'+I18N.ckText+'</p>'+
      '<div class="ck-actions"><button type="button" class="ck-btn ck-refuse">'+I18N.ckRefuse+'</button><button type="button" class="ck-btn ck-accept">'+I18N.ckAccept+'</button></div>';
    document.body.appendChild(el);
    el.querySelector('.ck-accept').addEventListener('click', function(){ set('granted'); });
    el.querySelector('.ck-refuse').addEventListener('click', function(){ set('denied'); });
  }
  function show(){ if(!el) build(); requestAnimationFrame(function(){ el.classList.add('is-open'); }); }
  function hide(){ if(el) el.classList.remove('is-open'); }
  window.openCookiePrefs = show;
  document.addEventListener('click', function(e){
    var t = e.target && e.target.closest ? e.target.closest('[data-cc-open]') : null;
    if(t){ e.preventDefault(); show(); }
  });
  if(!get()) setTimeout(show, 900);
}

/* ==========================================================
   WHATSAPP — al click sui link wa.me si apre un mini-form:
   nome + messaggio -> apre WhatsApp con il testo precompilato
   ========================================================== */
function initWaModal(){
  var modal=null, currentNum='';
  function build(){
    modal=document.createElement('div');
    modal.className='wa-modal';
    modal.innerHTML='<div class="wa-card" role="dialog" aria-label="'+I18N.waTitle+'">'+
      '<button type="button" class="wa-close" aria-label="\u00d7">\u00d7</button>'+
      '<h3>'+I18N.waTitle+'</h3>'+
      '<p>'+I18N.waSub+'</p>'+
      '<label for="wa-name">'+I18N.waName+'</label>'+
      '<input id="wa-name" type="text" autocomplete="name" placeholder="'+I18N.waNamePh+'">'+
      '<label for="wa-msg">'+I18N.waMsg+'</label>'+
      '<textarea id="wa-msg">'+I18N.waDefault+'</textarea>'+
      '<button type="button" class="wa-send">'+I18N.waSend+'</button>'+
    '</div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', function(e){ if(e.target===modal) close(); });
    modal.querySelector('.wa-close').addEventListener('click', close);
    modal.querySelector('.wa-send').addEventListener('click', function(){
      var name=(modal.querySelector('#wa-name').value||'').trim();
      var msg=(modal.querySelector('#wa-msg').value||'').trim();
      var text=(name?(I18N.waIam+name+'. '):'')+(msg||I18N.waFallback);
      var url='https://wa.me/'+currentNum+'?text='+encodeURIComponent(text);
      try{ document.dispatchEvent(new CustomEvent('wa-send')); }catch(err){}
      window.open(url,'_blank','noopener');
      close();
    });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });
  }
  function open(num){ currentNum=num; if(!modal) build(); modal.classList.add('is-open'); try{ document.dispatchEvent(new CustomEvent('wa-open')); }catch(err){} setTimeout(function(){ var f=modal.querySelector('#wa-name'); if(f) f.focus(); },200); }
  function close(){ if(modal) modal.classList.remove('is-open'); }
  document.addEventListener('click', function(e){
    var a=e.target && e.target.closest ? e.target.closest('a[href*="wa.me/"], a[href*="api.whatsapp.com"]') : null;
    if(!a) return;
    var href=a.getAttribute('href')||'';
    var m=href.match(/wa\.me\/(\+?\d+)/) || href.match(/phone=(\+?\d+)/);
    if(!m) return; // numero non riconoscibile: lascia il comportamento normale
    e.preventDefault();
    open(m[1].replace('+',''));
  });
}

function initBehaviors(){
  // ---- TESTIMONIALS SLIDER (mobile: auto + swipe) ----
  (function(){
    var grid=document.querySelector("section.testimonials .test-grid"); if(!grid) return;
    var wrap=grid.parentNode;
    var dots=wrap?wrap.querySelectorAll(".test-dots .test-dot"):[];
    var mq=window.matchMedia("(max-width:760px)");
    var timer=null, idx=0, paused=false, resumeT=null, scrollT=null;
    function cards(){ return grid.querySelectorAll(".test-card"); }
    function setActive(i){ for(var k=0;k<dots.length;k++) dots[k].classList.toggle("is-active", k===i); }
    function go(i){ var cs=cards(); if(!cs.length) return; idx=(i+cs.length)%cs.length; var c=cs[idx]; grid.scrollTo({left:c.offsetLeft-(grid.clientWidth-c.clientWidth)/2, behavior:"smooth"}); setActive(idx); }
    function nearest(){ var cs=cards(); if(!cs.length) return 0; var center=grid.scrollLeft+grid.clientWidth/2, best=0, bd=1e9; for(var k=0;k<cs.length;k++){ var cc=cs[k].offsetLeft+cs[k].clientWidth/2, d=Math.abs(cc-center); if(d<bd){bd=d;best=k;} } return best; }
    function stop(){ if(timer){ clearInterval(timer); timer=null; } }
    function start(){ stop(); if(!mq.matches) return; timer=setInterval(function(){ if(!paused) go(idx+1); }, 4500); }
    function pause(){ paused=true; clearTimeout(resumeT); resumeT=setTimeout(function(){ paused=false; }, 5000); }
    grid.addEventListener("touchstart", pause, {passive:true});
    grid.addEventListener("pointerdown", pause);
    grid.addEventListener("wheel", pause, {passive:true});
    // NB: lo scroll NON mette in pausa (altrimenti l'autoplay che scrolla si fermerebbe da solo): aggiorna solo i pallini
    grid.addEventListener("scroll", function(){ clearTimeout(scrollT); scrollT=setTimeout(function(){ idx=nearest(); setActive(idx); }, 120); }, {passive:true});
    for(var d=0; d<dots.length; d++){ (function(k){ dots[k].addEventListener("click", function(){ pause(); go(k); }); })(d); }
    if(mq.addEventListener) mq.addEventListener("change", start); else if(mq.addListener) mq.addListener(start);
    setActive(0); start();
  })();
  (function(){var tt=document.getElementById("themeToggle");if(tt){tt.addEventListener("click",function(){var c=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";document.documentElement.setAttribute("data-theme",c);try{localStorage.setItem("theme",c);}catch(e){}});}})();

  // ---- VIDEO MODAL ----
  initVideoModal();

  // ---- TOPBAR ROTATOR (una voce alla volta, ogni 4 secondi) ----
  initTopbarRotator();
  initTopbarMobileRotate();

  // ---- BEFORE/AFTER SLIDERS ----
  initBeforeAfterSliders();

  // ---- TREATMENTS TABS ----
  initTreatmentsTabs();

  // ---- MINI-FORM nelle schede prenotazione ----
  document.querySelectorAll('.bl-lead-form').forEach(function(f){
    f.addEventListener('submit', async function(e){
      e.preventDefault();
      var btn = f.querySelector('button[type="submit"]');
      var lb = btn ? btn.textContent : '';
      if(btn){ btn.disabled = true; btn.textContent = '\u2026'; }
      var fd = Object.fromEntries(new FormData(f).entries());
      try{
        var res = await fetch('/', {
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ 'form-name':'contatti', message:'', ...fd }).toString()
        });
        if(!res.ok) throw new Error('HTTP '+res.status);
        Array.prototype.forEach.call(f.querySelectorAll('input,button,.bl-consent'), function(el){ el.style.display='none'; });
        var ok = f.querySelector('.bl-form-ok'); if(ok) ok.hidden = false;
        try{ if(window.gtag) gtag('event','lead_submit',{ origin:'booking_card' }); }catch(err){}
        try{ if(window.fbq) fbq('track','Lead'); }catch(err){}
      }catch(err){
        if(btn){ btn.disabled = false; btn.textContent = lb; }
        alert('Invio non riuscito. Riprova tra qualche istante.');
      }
    });
  });

  // ---- LINGUA ----
  var lt=document.getElementById('langToggle');
  if(lt) lt.addEventListener('click', function(){
    try{ localStorage.setItem('site_lang', SITE_LANG==='en' ? 'it' : 'en'); }catch(e){}
    location.reload();
  });

  // ---- COOKIE BANNER ----
  initCookieBanner();

  // ---- WHATSAPP FORM ----
  initWaModal();

  // ---- STATS BAND COUNT-UP ----
  initStatsBands();

  // ---- Sticky nav: solo stato "scrolled" per restringere la nav,
  //      NESSUN hide-on-scroll-down (la CTA Prenota deve essere sempre visibile)
  const nav = document.getElementById('nav');
  if(nav){
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 30);
    }, {passive:true});

    const toggle = document.getElementById('mobileToggle');
    if(toggle) toggle.addEventListener('click', () => nav.classList.toggle('open'));
    nav.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => nav.classList.remove('open'));
    });
  }

  // ---- Smooth scroll for anchor links ----
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const href = a.getAttribute('href');
      if(href.length <= 1) return;
      const target = document.querySelector(href);
      if(target){
        e.preventDefault();
        target.scrollIntoView({behavior:'smooth', block:'start'});
        if(nav) nav.classList.remove('open');
      }
    });
  });

  // ---- Tag elements for animations ----
  // Sections (all except hero) reveal on scroll
  document.querySelectorAll('section:not(.hero)').forEach(s => s.classList.add('fx-reveal'));
  // Stagger grids
  document.querySelectorAll(
    '.method-grid, .audience-grid, .test-grid, .value-grid, .stats-row, .feature-pills, .levels-list'
  ).forEach(g => g.classList.add('fx-stagger'));

  // ---- SAFE ANIMATION SYSTEM ----
  // Strategy:
  // 1. Pre-compute which elements are already in viewport — add fx-in to them NOW
  // 2. THEN add js-ready to body → hidden state CSS kicks in
  // 3. Observer reveals remaining elements as user scrolls
  // This avoids any flash of hidden content for things visible at load.
  if('IntersectionObserver' in window){
    const fxEls = Array.from(document.querySelectorAll('.fx-reveal, .fx-stagger'));

    // First pass: mark in-viewport elements as already revealed
    const vh = window.innerHeight;
    fxEls.forEach(el => {
      const r = el.getBoundingClientRect();
      // If at all in viewport (with generous slack), mark in immediately
      if(r.top < vh + 100 && r.bottom > -100){
        el.classList.add('fx-in');
      }
    });

    // Now enable the JS animation state on body
    document.body.classList.add('js-ready');

    // Observer for remaining elements (below the fold)
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          e.target.classList.add('fx-in');
          obs.unobserve(e.target);
        }
      });
    }, {threshold:.12, rootMargin:'0px 0px -60px 0px'});

    fxEls.forEach(el => {
      if(!el.classList.contains('fx-in')) obs.observe(el);
    });

    // Safety fallback: after 4s, force-reveal anything still hidden
    // (e.g. observer not firing due to some edge case)
    setTimeout(() => {
      document.querySelectorAll('.fx-reveal:not(.fx-in), .fx-stagger:not(.fx-in)').forEach(el => {
        el.classList.add('fx-in');
      });
    }, 4000);
  } else {
    // No IntersectionObserver support → don't set js-ready, everything stays visible
    // Hero animation still won't run (also depends on js-ready), but everything is visible.
  }

  // ---- Stat counter ----
  if('IntersectionObserver' in window){
    const statObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting){
          animateNumber(e.target);
          statObs.unobserve(e.target);
        }
      });
    }, {threshold:.4});
    document.querySelectorAll('.stat .num').forEach(el => statObs.observe(el));
  }

  // ---- Form submit ----
  const form = document.getElementById('leadForm');
  if(form){
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      const btnLabel = btn ? btn.textContent : '';
      if(btn){ btn.disabled = true; btn.textContent = 'Invio in corso…'; }
      const formData = Object.fromEntries(new FormData(form).entries());
      try{
        const res = await fetch('/', {
          method:'POST',
          headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ 'form-name':'contatti', ...formData }).toString()
        });
        if(!res.ok) throw new Error('HTTP ' + res.status);
        form.style.display = 'none';
        const succ = document.getElementById('formSuccess');
        if(succ) succ.classList.add('active');
        try{ if(window.gtag) gtag('event','lead_submit',{ treatment: formData.treatment||'' }); }catch(err){}
        try{ if(window.fbq) fbq('track','Lead'); }catch(err){}
      }catch(err){
        if(btn){ btn.disabled = false; btn.textContent = btnLabel; }
        alert('Invio non riuscito. Riprova tra qualche istante o scrivici su WhatsApp.');
      }
    });
  }
}

/* ==========================================================
   ANIMATE NUMBER — counts from 0 to target, preserving format
   Handles Italian formats: 4.500, 95%, 6.200+, etc.
   ========================================================== */
function animateNumber(el){
  const raw = (el.textContent || '').trim();
  const m = raw.match(/^([^\d-]*)([-\d.,]+)(.*)$/);
  if(!m) return;
  const [, prefix, numStr, suffix] = m;

  const hasComma = numStr.includes(',');
  const hasThousandsDot = /\d\.\d{3}/.test(numStr);
  let target;
  if(hasComma && hasThousandsDot){
    target = parseFloat(numStr.replace(/\./g,'').replace(',','.'));
  } else if(hasComma){
    target = parseFloat(numStr.replace(',','.'));
  } else if(hasThousandsDot){
    target = parseInt(numStr.replace(/\./g,''), 10);
  } else {
    target = parseFloat(numStr);
  }
  if(!isFinite(target)) return;

  const decimals = hasComma ? (numStr.split(',')[1]||'').length : 0;
  const useThousandsDot = hasThousandsDot || target >= 1000;

  function format(val){
    let s;
    if(decimals > 0){
      s = val.toFixed(decimals).replace('.', ',');
      if(useThousandsDot){
        const parts = s.split(',');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        s = parts.join(',');
      }
    } else {
      const intVal = Math.round(val);
      s = useThousandsDot
        ? intVal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.')
        : intVal.toString();
    }
    return prefix + s + suffix;
  }

  const duration = 1500;
  const start = performance.now();
  function step(now){
    const elapsed = now - start;
    const t = Math.min(elapsed/duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = format(target * eased);
    if(t < 1) requestAnimationFrame(step);
    else el.textContent = format(target);
  }
  requestAnimationFrame(step);
}

init();
</script>
