            <div class="viewport-buttons" id="viewportButtons">
              <button data-viewport="desktop" class="${ui.viewport==='desktop'?'active':''}" title="Anteprima desktop (100%)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="1"/><line x1="8" y1="22" x2="16" y2="22"/><line x1="12" y1="18" x2="12" y2="22"/></svg>
                Desktop
              </button>
              <button data-viewport="tablet" class="${ui.viewport==='tablet'?'active':''}" title="Anteprima tablet (768px)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
                Tablet
              </button>
              <button data-viewport="mobile" class="${ui.viewport==='mobile'?'active':''}" title="Anteprima mobile (390px)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
                Mobile

            <div class="viewport-info" id="viewportInfo"></div>
          </div>
          <div class="preview-frame viewport-${ui.viewport}" id="previewFrame">
            <iframe id="preview-iframe"></iframe>
          </div>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  `;
  document.querySelector('#saveBtn').onclick = doSave;
  document.querySelector('#logoutBtn').onclick = logout;
  document.querySelector('#historyBtn').onclick = openHistory;
  // Wire viewport buttons
  document.querySelectorAll('#viewportButtons button').forEach(btn => {
    btn.onclick = () => setViewport(btn.dataset.viewport);
  });
  // Since renderApp creates a fresh iframe, mark preview as needing re-init
  previewInitialized = false;
  renderEditor();
  updateViewportInfo();
  updatePreview();
}

function setViewport(v){
  ui.viewport = v;
  const frame = document.querySelector('#previewFrame');
  if(frame){
    frame.classList.remove('viewport-desktop','viewport-tablet','viewport-mobile');
    frame.classList.add('viewport-' + v);
  }
  document.querySelectorAll('#viewportButtons button').forEach(b => {
    b.classList.toggle('active', b.dataset.viewport === v);
  });
  updateViewportInfo();
}

function updateViewportInfo(){
  const el = document.querySelector('#viewportInfo');
  if(!el) return;
  const sizes = {desktop:'fluido', tablet:'768 px', mobile:'390 px'};
  el.textContent = sizes[ui.viewport] || '';
}

function renderSectionForm(section, idx){
  const schema = SECTION_SCHEMA[section.type];
  if(!schema) return `<div style="padding:20px;color:var(--ink-light)">Tipo "${esc(section.type)}" sconosciuto.</div>`;
  const fields = schema.map(f => renderField(f, section[f[0]], ['sections', idx, f[0]])).join('');
  const style = section.style || {};
  const styleSchema = styleSchemaFor(section.type);
  const defaults = SECTION_DEFAULTS[section.type] || {};
  const styleFields = styleSchema.map(f => renderField(f, style[f[0]], ['sections', idx, 'style', f[0]])).join('');
  const isOpen = ui.styleBlocksOpen && ui.styleBlocksOpen.has(idx);
  // È "personalizzato" se ha un valore DIVERSO dal default della palette
  const isDiff = (v, def) => v && def && v.toLowerCase() !== def.toLowerCase();
  const hasOverrides = !!(
    isDiff(style.bg, defaults.bg) ||
    isDiff(style.accent, defaults.accent) ||
    isDiff(style.text, defaults.text) ||
    isDiff(style.card, defaults.card) ||
    (style.scale && style.scale !== '' && style.scale !== 'normale')
  );
  return `<div class="section-form-fields">${fields}</div>
    <div class="section-style-block ${isOpen?'open':''}" data-style-block="${idx}">
      <div class="section-style-toggle" data-toggle-style="${idx}">
        <span>🎨 Stile della sezione</span>
        <span class="section-style-hint">${hasOverrides ? 'personalizzato ✏️' : 'usa palette globale'}</span>
        <span class="section-style-chevron">▾</span>
      </div>
      <div class="section-style-body">
        <p class="field-hint" style="margin-bottom:14px">
          I colori mostrati sono quelli <strong>attuali</strong> della sezione (palette Clinical Luxury).
          Modificali per personalizzare, oppure <strong>cancella il valore</strong> nel campo testo per tornare al colore di palette globale.
        </p>
        ${styleFields}
      </div>
    </div>`;
}

/* =====================================================================
   EVENT LISTENERS
   ===================================================================== */
function attachEditorListeners(){
  const editor = document.querySelector('#editor');

  // Toggle blocks (Site/Nav/Footer)
  editor.querySelectorAll('[data-toggle-block]').forEach(el => {
    el.onclick = () => {
      const k = el.dataset.toggleBlock;
      if(ui.openObjects.has(k)) ui.openObjects.delete(k);
      else ui.openObjects.add(k);
      renderEditor();
    };
  });

  // Toggle sections (chevron, summary, or button)
  editor.querySelectorAll('[data-toggle-section]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const i = parseInt(el.dataset.toggleSection);
      const wasExpanded = ui.expandedSection === i;
      ui.expandedSection = wasExpanded ? null : i;
      renderEditor();
      // If we just opened a section: scroll BOTH editor row + preview section
      if(!wasExpanded){
        setTimeout(() => scrollEditorToSection(i), 60);
        setTimeout(() => scrollPreviewToSection(i), 60);
      }
      syncPreviewHighlight();
    };
  });

  // Toggle 🎨 Stile blocks
  editor.querySelectorAll('[data-toggle-style]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const i = parseInt(el.dataset.toggleStyle);
      if(ui.styleBlocksOpen.has(i)) ui.styleBlocksOpen.delete(i);
      else ui.styleBlocksOpen.add(i);
      // Toggle in-place, no full re-render needed
      const block = editor.querySelector(`[data-style-block="${i}"]`);
      if(block) block.classList.toggle('open');
    };
  });

  // Drag & drop sections
  let dragSrcIdx = null;
  editor.querySelectorAll('.section-row').forEach(row => {
    row.addEventListener('dragstart', (e) => {
      dragSrcIdx = parseInt(row.dataset.sectionIdx);
      row.classList.add('is-dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Required for Firefox
      try { e.dataTransfer.setData('text/plain', String(dragSrcIdx)); } catch(err){}
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('is-dragging');
      editor.querySelectorAll('.section-row').forEach(r => {
        r.classList.remove('drag-over-above','drag-over-below');
      });
      dragSrcIdx = null;
    });
    row.addEventListener('dragover', (e) => {
      if(dragSrcIdx === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const targetIdx = parseInt(row.dataset.sectionIdx);
      if(targetIdx === dragSrcIdx) return;
      // Determine if we're over the top or bottom half
      const rect = row.getBoundingClientRect();
      const midY = rect.top + rect.height/2;
      row.classList.remove('drag-over-above','drag-over-below');
      if(e.clientY < midY) row.classList.add('drag-over-above');
      else row.classList.add('drag-over-below');
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drag-over-above','drag-over-below');
    });
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      if(dragSrcIdx === null) return;
      const targetIdx = parseInt(row.dataset.sectionIdx);
      if(targetIdx === dragSrcIdx) return;
      const rect = row.getBoundingClientRect();
      const midY = rect.top + rect.height/2;
      const dropBelow = e.clientY >= midY;
      let newIdx = dropBelow ? targetIdx + 1 : targetIdx;
      // Adjust for removal of src that happens before insertion
      if(dragSrcIdx < newIdx) newIdx--;
      const [moved] = data.sections.splice(dragSrcIdx, 1);
      data.sections.splice(newIdx, 0, moved);
      // Track expanded section through the move
      if(ui.expandedSection === dragSrcIdx) ui.expandedSection = newIdx;
      else if(ui.expandedSection !== null){
        // Recompute: this is messy because we moved an item. Simplest = if expanded was between src and new, shift by 1
        const e1 = Math.min(dragSrcIdx, newIdx);
        const e2 = Math.max(dragSrcIdx, newIdx);
        if(ui.expandedSection >= e1 && ui.expandedSection <= e2){
          ui.expandedSection += (dragSrcIdx > newIdx) ? 1 : -1;
        }
      }
      markDirty();
      renderEditor();
    });
  });

  // Delete sections
  editor.querySelectorAll('[data-delete-section]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const i = parseInt(el.dataset.deleteSection);
      if(!confirm('Eliminare questa sezione? L\'operazione è reversibile solo se non hai ancora pubblicato.')) return;
      data.sections.splice(i, 1);
      if(ui.expandedSection === i) ui.expandedSection = null;
      else if(ui.expandedSection > i) ui.expandedSection--;
      markDirty();
      renderEditor();
    };
  });

  // Add section button
  const addBtn = editor.querySelector('#addSectionBtn');
  if(addBtn){
    addBtn.onclick = (e) => {
      e.stopPropagation();
      ui.addMenuOpen = !ui.addMenuOpen;
      renderEditor();
    };
  }
  editor.querySelectorAll('[data-add-type]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const type = el.dataset.addType;
      const newSection = { type };
      data.sections = data.sections || [];
      data.sections.push(newSection);
      ui.expandedSection = data.sections.length - 1;
      ui.addMenuOpen = false;
      // Schedule preview to scroll to the new section once iframe reloads with it
      pendingPreviewScroll = ui.expandedSection;
      markDirty();
      renderEditor();
      setTimeout(() => scrollEditorToSection(ui.expandedSection), 60);
    };
  });

  // Input/textarea/select changes
  editor.querySelectorAll('[data-path]').forEach(el => {
    const isCheckbox = el.type === 'checkbox';
    const isColor = el.hasAttribute('data-color');
    el.addEventListener(isCheckbox || el.tagName === 'SELECT' ? 'change' : 'input', () => {
      const path = el.dataset.path.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
      let v;
      if(isCheckbox) v = el.checked;
      else if(el.type === 'number') v = el.value === '' ? null : Number(el.value);
      else v = el.value;
      setPath(data, path, v);
      // For color: sync the other input and the swatch
      if(isColor){
        const sibling = el.closest('.field-color').querySelector('.field-color-input');
        if(sibling && sibling !== el) sibling.value = v;
        const swatch = el.closest('.field-color-swatch');
        if(swatch) swatch.style.background = v;
      } else if(el.classList.contains('field-color-input')){
        const swatch = el.closest('.field-color').querySelector('.field-color-swatch');
        if(swatch){
          swatch.style.background = v || swatch.style.background;
          const picker = swatch.querySelector('input[type="color"]');
          if(picker && /^#[0-9a-f]{6}$/i.test(v)) picker.value = v;
        }
      }
      // For section summary: if the user edited the headline, refresh just the summary text
      if(path[0] === 'sections' && typeof path[1] === 'number'){
        const idx = path[1];
        const row = editor.querySelector(`[data-section-idx="${idx}"]`);
        if(row){
          const sum = row.querySelector('.section-summary');
          if(sum) sum.textContent = summarize(data.sections[idx]) || TYPE_DESC[data.sections[idx].type] || '';
        }
      }
      markDirty();
    });
  });

  // List remove
  editor.querySelectorAll('[data-list-remove]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const listPath = el.dataset.listPath.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
      const idx = parseInt(el.dataset.listRemove);
      const list = getPath(data, listPath) || [];
      list.splice(idx, 1);
      setPath(data, listPath, list);
      markDirty();
      renderEditor();
    };
  });

  // List move (riordino con frecce)
  editor.querySelectorAll('[data-list-move]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      if(el.disabled) return;
      const listPath = el.dataset.listPath.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
      const idx = parseInt(el.dataset.listIdx);
      const dir = el.dataset.listMove === 'up' ? -1 : 1;
      const list = getPath(data, listPath) || [];
      const j = idx + dir;
      if(j < 0 || j >= list.length) return;
      const tmp = list[idx]; list[idx] = list[j]; list[j] = tmp;
      setPath(data, listPath, list);
      markDirty();
      renderEditor();
    };
  });

  // List add
  editor.querySelectorAll('[data-list-add]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const listPath = el.dataset.listAdd.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
      const list = getPath(data, listPath) || [];
      const newItem = el.dataset.listType === 'object' ? {} : '';
      list.push(newItem);
      setPath(data, listPath, list);
      markDirty();
      renderEditor();
    };
  });

  // ============================================================
  // IMAGE FIELDS (coppia desktop + mobile)
  // ============================================================
  editor.querySelectorAll('.field-image').forEach(el => {
    const parentPath = el.dataset.imageParent;
    if(!parentPath) return; // i campi vecchi senza variant li ignoriamo (non dovrebbero esistere)
    const variant = el.dataset.imageVariant || 'desktop';
    const path = parentPath.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
    const uploadBtn = el.querySelector('[data-action="upload"]');
    const removeBtn = el.querySelector('[data-action="remove"]');

    /* Imposta SOLO la chiave variant del valore immagine.
       Mantiene retro-compatibilità: se il valore corrente è stringa, lo migra
       a oggetto {desktop, mobile} prima di scrivere. */
    function setVariant(newUrl){
      const cur = getPath(data, path);
      let next;
      if(typeof cur === 'string'){
        // Migra: la vecchia stringa era il desktop
        next = {desktop: cur, mobile: ''};
      } else if(cur && typeof cur === 'object'){
        next = {desktop: cur.desktop || '', mobile: cur.mobile || ''};
      } else {
        next = {desktop: '', mobile: ''};
      }
      next[variant] = newUrl;
      // Se entrambi vuoti, salviamo stringa vuota (cleaner)
      if(!next.desktop && !next.mobile){
        setPath(data, path, '');
      } else if(!next.mobile && variant === 'desktop'){
        // Solo desktop → salviamo stringa per retro-compat
        setPath(data, path, next.desktop);
      } else {
        setPath(data, path, next);
      }
    }

    if(uploadBtn){
      uploadBtn.onclick = async () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = async () => {
          const f = input.files[0]; if(!f) return;
          uploadBtn.disabled = true;
          uploadBtn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:1.5px;display:inline-block;vertical-align:-2px"></span> Carico…';
          try {
            const url = await uploadImage(f);
            setVariant(url);
            markDirty();
            renderEditor();
            showToast('Immagine ' + (variant === 'mobile' ? 'mobile' : 'desktop') + ' caricata');
          } catch(err){
            uploadBtn.disabled = false; uploadBtn.textContent = 'Carica';
            showToast('Errore: ' + err.message, 'error');
          }
        };
        input.click();
      };
    }
    if(removeBtn){
      removeBtn.onclick = () => {
        setVariant('');
        markDirty();
        renderEditor();
      };
    }
  });

  // ============================================================
  // VIDEO FIELDS
  // ============================================================
  editor.querySelectorAll('.field-video').forEach(el => {
    const pathStr = el.dataset.videoPath;
    const path = pathStr.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
    const uploadBtn = el.querySelector('[data-action="upload-video"]');
    const removeBtn = el.querySelector('[data-action="remove-video"]');

    function readVideo(){
      const cur = getPath(data, path);
      if(typeof cur === 'string') return {src:cur, autoplay:false, loop:false, muted:false, controls:true};
      return cur && typeof cur === 'object' ? Object.assign({src:'', autoplay:false, loop:false, muted:false, controls:true}, cur) : {src:'', autoplay:false, loop:false, muted:false, controls:true};
    }
    function writeVideo(v){
      if(!v.src){
        setPath(data, path, '');
      } else {
        setPath(data, path, v);
      }
    }

    if(uploadBtn){
      uploadBtn.onclick = async () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'video/mp4,video/webm,video/quicktime';
        input.onchange = async () => {
          const f = input.files[0]; if(!f) return;
          uploadBtn.disabled = true;
          uploadBtn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:1.5px;display:inline-block;vertical-align:-2px"></span> Carico…';
          try {
            const url = await uploadVideo(f);
            const v = readVideo();
            v.src = url;
            writeVideo(v);
            markDirty();
            renderEditor();
            showToast('Video caricato');
          } catch(err){
            uploadBtn.disabled = false; uploadBtn.textContent = 'Carica';
            if(err.message !== 'Upload annullato') showToast('Errore: ' + err.message, 'error');
          }
        };
        input.click();
      };
    }
    if(removeBtn){
      removeBtn.onclick = () => {
        writeVideo({src:'', autoplay:false, loop:false, muted:false, controls:true});
        markDirty();
        renderEditor();
      };
    }
  });

  // Video options checkboxes (autoplay/loop/muted/controls)
  editor.querySelectorAll('[data-video-opt]').forEach(cb => {
    cb.addEventListener('change', () => {
      const pathStr = cb.dataset.videoParent;
      const opt = cb.dataset.videoOpt;
      const path = pathStr.split('.').map(p => /^\d+$/.test(p) ? parseInt(p) : p);
      let cur = getPath(data, path);
      if(typeof cur === 'string') cur = {src:cur, autoplay:false, loop:false, muted:false, controls:true};
      cur = Object.assign({src:'', autoplay:false, loop:false, muted:false, controls:true}, cur || {});
      cur[opt] = cb.checked;
      setPath(data, path, cur);
      markDirty();
      schedulePreviewUpdate();
    });
  });

  // Close add menu when clicking outside
  if(ui.addMenuOpen){
    setTimeout(() => {
      const closeFn = (e) => {
        if(!e.target.closest('.add-section-menu') && !e.target.closest('#addSectionBtn')){
          ui.addMenuOpen = false;
          document.removeEventListener('click', closeFn);
          renderEditor();
        }
      };
      document.addEventListener('click', closeFn);
    }, 0);
  }
}

/* =====================================================================
   SAVE FLOW
   ===================================================================== */
async function doSave(){
  if(ui.isSaving) return;
  ui.isSaving = true;
  updateStatusBar();
  document.querySelector('#saveBtn').disabled = true;
  document.querySelector('#saveBtn').innerHTML = '<span class="spinner"></span> Pubblico…';
  try {
    await saveContent();
    ui.isDirty = false;
    // Traduzione inglese automatica (non blocca la pubblicazione italiana)
    let enOk = true, enErr = '';
    try {
      document.querySelector('#saveBtn').innerHTML = '<span class="spinner"></span> Traduco EN…';
      await saveEnglish();
    } catch(e){ enOk = false; enErr = e.message || String(e); }
    ui.isSaving = false;
    document.querySelector('#saveBtn').disabled = false;
    document.querySelector('#saveBtn').textContent = 'Pubblica';
    updateStatusBar();
    if(enOk) showToast('Pubblicato in italiano e inglese! Online in 30 secondi.', 'success');
    else showToast('Pubblicato (italiano). Traduzione EN non aggiornata: ' + enErr, 'error');
  } catch(err){
    ui.isSaving = false;
    document.querySelector('#saveBtn').disabled = false;
    document.querySelector('#saveBtn').textContent = 'Pubblica';
    updateStatusBar();
    showToast('Errore: ' + err.message, 'error');
  }
}

function updateStatusBar(){
  const bar = document.querySelector('#statusBar');
  if(!bar) return;
  bar.classList.remove('dirty','saving','saved');
  if(ui.isSaving){ bar.classList.add('saving'); bar.querySelector('span:last-child').textContent = 'Pubblicando…'; }
  else if(ui.isDirty){ bar.classList.add('dirty'); bar.querySelector('span:last-child').textContent = 'Modifiche da pubblicare'; }
  else { bar.classList.add('saved'); bar.querySelector('span:last-child').textContent = 'Salvato'; }
  // Pulse the "Pubblica" button when there are unsaved changes (subtle attention grabber)
  const saveBtn = document.querySelector('#saveBtn');
  if(saveBtn) saveBtn.classList.toggle('pulse', ui.isDirty && !ui.isSaving);
}

/* =====================================================================
   TOAST
   ===================================================================== */
function showToast(msg, type){
  const t = document.querySelector('#toast');
  if(!t) return alert(msg);
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  setTimeout(()=>t.classList.add('show'), 10);
  setTimeout(()=>t.classList.remove('show'), 4000);
}
function showError(msg){
  const app = document.querySelector('#app');
  const card = app.querySelector('.login-card');
  if(card){
    let err = card.querySelector('.login-error');
    if(!err){ err = document.createElement('div'); err.className = 'login-error'; card.appendChild(err); }
    err.textContent = msg;
  } else {
    showToast(msg, 'error');
  }
}

/* =====================================================================
   INIT
   ===================================================================== */
async function init(){
  if(!token){
    renderApp();
    return;
  }
  renderApp(); // shows loading state
  try {
    data = await loadContent();
    renderApp();
  } catch(err){
    if(/Sessione scaduta/.test(err.message)){
      token = null;
      renderApp();
      showError(err.message);
    } else {
      const app = document.querySelector('#app');
      app.innerHTML = `<div class="login"><div class="login-card">
        <h1>Errore</h1>
        <p>${esc(err.message)}</p>
        <button class="login-btn" onclick="location.reload()">Riprova</button>
      </div></div>`;
    }
  }
}

init();
</script>
