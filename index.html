}

/* ============================================================
   ⭐ ANIMAZIONI SAFE — entrance only when JS marks body
   ============================================================ */

/* Default: tutti gli elementi sono VISIBILI. Solo body.js-ready attiva gli stati nascosti. */

/* Section reveal — entrano dal basso quando vengono osservate */
body.js-ready section.fx-reveal:not(.fx-in) {
  opacity:0;
  transform:translateY(36px);
}
body.js-ready section.fx-reveal {
  transition:opacity .9s var(--ease-spring), transform .9s var(--ease-spring);
  will-change:opacity, transform;
}
body.js-ready section.fx-reveal.fx-in {
  opacity:1;
  transform:none;
}

/* Stagger card grids: i figli entrano uno alla volta */
body.js-ready .fx-stagger > * {
  transition:opacity .7s var(--ease-spring), transform .7s var(--ease-spring);
}
body.js-ready .fx-stagger:not(.fx-in) > * {
  opacity:0;
  transform:translateY(28px);
}
body.js-ready .fx-stagger.fx-in > * {
  opacity:1;
  transform:translateY(0);
}
body.js-ready .fx-stagger.fx-in > *:nth-child(1) { transition-delay:.05s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(2) { transition-delay:.15s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(3) { transition-delay:.25s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(4) { transition-delay:.35s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(5) { transition-delay:.45s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(6) { transition-delay:.55s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(7) { transition-delay:.65s; }
body.js-ready .fx-stagger.fx-in > *:nth-child(8) { transition-delay:.75s; }

/* Hero entrance — animazione al caricamento */
body.js-ready .hero h1,
body.js-ready .hero .hero-sub,
body.js-ready .hero .hero-cta,
body.js-ready .hero .mission-card {
  opacity:0;
  animation:heroEnter 1s var(--ease-spring) forwards;
}
body.js-ready .hero h1 { animation-delay:.2s; }
body.js-ready .hero .hero-sub { animation-delay:.4s; }
body.js-ready .hero .hero-cta { animation-delay:.6s; }
body.js-ready .hero .mission-card { animation-delay:.8s; }
@keyframes heroEnter {
  from { opacity:0; transform:translateY(28px); }
  to { opacity:1; transform:translateY(0); }
}

/* Mission bar fill */
body.js-ready .hero .mission-bar-fill {
  transform:scaleX(0);
  animation:barFill 1.6s var(--ease-out) 1.3s forwards;
}
@keyframes barFill { to { transform:scaleX(1); } }

/* Pyramid stacks in */
body.js-ready .pyramid .tri:not(.fx-in) {
  opacity:0;
  transform:translateY(-30px) scale(.85);
}
body.js-ready .pyramid .tri {
  transition:opacity .8s var(--ease-spring), transform .8s var(--ease-spring);
}
body.js-ready section.fx-in .pyramid .tri-3 { opacity:1; transform:none; transition-delay:.1s; }
body.js-ready section.fx-in .pyramid .tri-2 { opacity:1; transform:none; transition-delay:.35s; }
body.js-ready section.fx-in .pyramid .tri-1 { opacity:1; transform:none; transition-delay:.6s; }

/* Form success */
.form-success.active { animation:successPop .5s var(--ease-spring); }
@keyframes successPop {
  0% { opacity:0; transform:scale(.92); }
  60% { transform:scale(1.02); }
  100% { opacity:1; transform:scale(1); }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration:.01ms !important;
    transition-duration:.01ms !important;
    scroll-behavior:auto !important;
  }
  body.js-ready section.fx-reveal,
  body.js-ready .fx-stagger > *,
  body.js-ready .hero h1, body.js-ready .hero .hero-sub,
  body.js-ready .hero .hero-cta, body.js-ready .hero .mission-card,
  body.js-ready .pyramid .tri {
    opacity:1 !important;
    transform:none !important;
  }
  body.js-ready .hero .mission-bar-fill {
    animation:none !important;
    transform:scaleX(1) !important;
  }
}

/* ============================================================
   PER-SECTION STYLE OVERRIDES
   ------------------------------------------------------------
   Ogni <section> può ricevere variabili inline via il CMS:
     --section-bg     → sostituisce lo sfondo
     --section-accent → sostituisce l'accent (parola corsiva, tag, bordi gold)
     --section-text   → sostituisce il colore del testo
     --section-card   → sostituisce il colore della card/box interna (solo dove c'è)
     --text-scale     → moltiplica la dimensione testi della sezione (default 1)
   Tutte le rule qui sotto fanno fallback alla palette globale se la
   variabile non è settata. Niente !important: rispettiamo la specificity normale.
   ============================================================ */
section[style*="--section-bg"]    { background:var(--section-bg) !important; }
section[style*="--section-text"]  { color:var(--section-text); }
section[style*="--text-scale"]    { font-size:calc(17px * var(--text-scale, 1)); }
section[style*="--text-scale"] h1 { font-size:calc(clamp(2.6rem, 5.5vw, 4.8rem) * var(--text-scale, 1)); }
section[style*="--text-scale"] h2 { font-size:calc(clamp(2rem, 4vw, 3.2rem) * var(--text-scale, 1)); }
section[style*="--text-scale"] h3 { font-size:calc(clamp(1.4rem, 2.5vw, 2rem) * var(--text-scale, 1)); }

/* Accent overrides (parola corsiva nei titoli, tag, bordi) */
section[style*="--section-accent"] .accent,
section[style*="--section-accent"] .serif-italic { color:var(--section-accent); }
section[style*="--section-accent"] .level-tag    { color:var(--section-accent); }
section[style*="--section-accent"] .pill         { background:var(--section-accent); }
section[style*="--section-accent"] .program-tag,
section[style*="--section-accent"] .program-subtitle { color:var(--section-accent); }
section[style*="--section-accent"] .test-stars    { color:var(--section-accent); }
section[style*="--section-accent"] .mission-bar-fill { background:linear-gradient(90deg, var(--section-accent) 0%, var(--section-accent) 100%); }
section.problem[style*="--section-accent"] .problem-quote { border-left-color:var(--section-accent); }
section.problem[style*="--section-accent"] .problem-final { color:var(--section-accent); }
section.about[style*="--section-accent"] .callout         { color:var(--section-accent); }
section.audience[style*="--section-accent"] .audience-item:hover { border-color:var(--section-accent); }
section.testimonials[style*="--section-accent"] .test-card:hover { border-color:var(--section-accent); }
section.levels[style*="--section-accent"] .level { border-left-color:var(--section-accent); }
section.method[style*="--section-accent"] .method-num { background:var(--section-accent); }
section.method[style*="--section-accent"] .method-card:hover { border-color:var(--section-accent); }
section.programs[style*="--section-accent"] .program-link:hover { color:var(--section-accent); }
section.video-section[style*="--section-accent"] .video-caption { color:var(--section-accent); }
section.big-quote[style*="--section-accent"] .av { border-color:var(--section-accent); }

/* Card/box interno per sezioni a doppio sfondo */
section.value-section[style*="--section-card"] .value-card    { background:var(--section-card); }
section.features-section[style*="--section-card"] .features-card { background:var(--section-card); }
section.cta-section[style*="--section-card"] .cta-card         { background:var(--section-card); }
/* Quando l'utente cambia il bg della Card Valore o Features, anche il gradient va sostituito con solido */
section.value-section[style*="--section-card"] .value-card::before,
section.features-section[style*="--section-card"] .features-card::before { display:none; }

/* Quando il colore del testo è impostato manualmente, propaga ai discendenti tipici */
section[style*="--section-text"] h1,
section[style*="--section-text"] h2,
section[style*="--section-text"] h3,
section[style*="--section-text"] h4,
section[style*="--section-text"] p,
section[style*="--section-text"] li { color:inherit; }

/* ============================================================
   BOOKING LADDER — scala di accesso / chiusura prenotazioni
   ============================================================ */
.booking-ladder {
  background:var(--section-bg, var(--petrol-darker));
  color:var(--section-text, var(--ivory));
  padding:96px 0 48px;
  position:relative;
  overflow:hidden;
}
.booking-ladder::before {
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(circle at 50% -10%, rgba(200,168,107,.18), transparent 55%),
    radial-gradient(circle at 90% 110%, rgba(200,168,107,.10), transparent 50%);
  pointer-events:none;
}
.booking-ladder .container { position:relative; z-index:1; }
.bl-head { text-align:center; max-width:760px; margin:0 auto 18px; }
.bl-eyebrow {
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:.22em; font-size:.95rem;
  color:var(--section-accent, var(--gold));
  margin:0 0 14px; text-transform:uppercase;
}
.bl-title {
  font-family:var(--font-display); font-weight:400; letter-spacing:.012em;
  font-size:clamp(2.6rem, 5.6vw, 4.4rem);
  line-height:.98; margin:0 0 18px; color:inherit;
}
.bl-title .accent {
  font-family:'Instrument Serif', serif; font-weight:400;
  font-style:italic; color:var(--section-accent, var(--gold));
}
.bl-subtitle {
  font-size:1.08rem; line-height:1.6;
  opacity:.85; margin:0 auto; max-width:680px;
}
.bl-urgency {
  display:inline-flex; align-items:center; gap:8px;
  margin:26px auto 0; padding:10px 20px;
  background:#FFFFFF;
  border:1.5px solid #FF6B2C;
  border-radius:999px;
  font-size:.95rem; color:#E8520F;
  font-weight:600;
}
.bl-urgency-wrap { text-align:center; }

/* Scala dei tier */
.bl-tiers {
  margin:56px auto 0; max-width:920px;
  display:flex; flex-direction:column; gap:18px;
}
.bl-tier {
  position:relative;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center; gap:26px;
  padding:28px 32px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.10);
  border-left:3px solid var(--section-accent, var(--gold));
  border-radius:18px;
  transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
}
.bl-tier:hover { transform:translateY(-3px); background:rgba(255,255,255,.07); }

/* Tier in evidenza (premium, in cima alla piramide) */
.bl-tier.is-featured {
  background:linear-gradient(135deg, var(--gold) 0%, var(--gold-deeper) 100%);
  border:none;
  color:var(--petrol-darker);
  transform:scale(1.02);
  box-shadow:0 24px 60px -22px rgba(200,168,107,.6);
  padding:34px 32px;
}
.bl-tier.is-featured:hover { transform:scale(1.02) translateY(-3px); }
.bl-tier.is-featured .bl-tier-who,
.bl-tier.is-featured .bl-tier-format,
.bl-tier.is-featured .bl-value { color:rgba(13,46,54,.78); }
.bl-tier.is-featured .bl-icon {
  background:rgba(13,46,54,.14); color:var(--petrol-darker);
}
.bl-tier.is-featured .bl-cta {
  background:var(--orange); color:#fff;
}
.bl-tier.is-featured .bl-cta:hover { background:var(--orange-deep); }

/* Icona tier */
.bl-icon {
  width:54px; height:54px; flex-shrink:0;
  display:grid; place-items:center;
  border-radius:14px;
  background:rgba(200,168,107,.14);
  color:var(--section-accent, var(--gold));
}
.bl-icon svg { width:26px; height:26px; }

/* Corpo testo tier */
.bl-tier-body { min-width:0; }
.bl-badge {
  display:inline-block; margin:0 0 8px;
  font-family:'Bebas Neue', sans-serif; letter-spacing:.14em;
  font-size:.72rem; padding:3px 10px; border-radius:999px;
  background:rgba(13,46,54,.16); color:inherit;
}
.bl-tier:not(.is-featured) .bl-badge {
  background:rgba(200,168,107,.16); color:var(--section-accent, var(--gold));
}
.bl-tier.is-free .bl-badge {
  background:rgba(74,222,128,.16); color:#86efac;
}
.bl-tier-name {
  font-family:'Inter', sans-serif; font-weight:800;
  font-size:1.18rem; line-height:1.2; margin:0 0 6px; color:inherit;
}
.bl-tier-who {
  font-size:.92rem; opacity:.85; margin:0 0 2px;
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
}
.bl-tier-format { font-size:.85rem; opacity:.7; }
.bl-value { font-size:.92rem; line-height:1.5; margin:10px 0 0; opacity:.9; }
.bl-features {
  list-style:none; margin:16px 0 0; padding:0;
  display:flex; flex-direction:column; gap:9px;
  width:100%; text-align:left;
}
.bl-features li {
  display:flex; gap:9px; align-items:flex-start;
  font-size:.88rem; line-height:1.4; opacity:.94;
}
.bl-features li .bl-check {
  width:17px; height:17px; flex-shrink:0; margin-top:1px;
  color:var(--section-accent, var(--gold));
}
.bl-tier.is-featured .bl-features li .bl-check { color:var(--petrol-darker); }
.bl-tier.is-free .bl-features li .bl-check { color:#86efac; }
/* ===== Modalità PARAGONE (✓ inclusi / ✗ esclusi) + doppio CTA ===== */
.bl-features li .bl-x { width:17px; height:17px; flex-shrink:0; margin-top:1px; color:rgba(255,255,255,.4); }
.bl-compare-list li.is-off { opacity:.42; }
.bl-cta-pair { display:flex; flex-direction:column; gap:8px; width:100%; }
.bl-cta-pair .bl-cta { width:100%; }
.bl-cta-alt { background:transparent !important; border:1.5px solid rgba(231,192,103,.55) !important; color:#EBD08A !important; box-shadow:none !important; }
.bl-cta-alt:hover { background:#E7C067 !important; color:#15110A !important; filter:none !important; }
.bl-scarcity {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:10px; font-size:.82rem; font-weight:700;
  color:var(--petrol-darker);
  background:rgba(13,46,54,.12); padding:3px 10px; border-radius:999px;
}

/* Prezzo + CTA (colonna destra) */
.bl-tier-action {
  display:flex; flex-direction:column; align-items:flex-end;
  gap:12px; text-align:right; flex-shrink:0;
}
.bl-price {
  font-family:'Inter', sans-serif; font-weight:800;
  font-size:1.9rem; line-height:1; color:inherit;
}
.bl-price small { font-size:.85rem; font-weight:600; opacity:.7; display:block; margin-top:4px; }
.bl-price.is-free { color:#86efac; }
.bl-tier.is-featured .bl-price.is-free { color:var(--petrol-darker); }
.bl-cta {
  display:inline-flex; align-items:center; gap:7px;
  font-family:'Bebas Neue', sans-serif; letter-spacing:.06em;
  font-size:1rem; padding:11px 24px; border-radius:999px;
  background:var(--orange); color:#fff;
  text-decoration:none; white-space:nowrap;
  transition:transform .2s ease, filter .2s ease;
}
.bl-cta:hover { transform:translateY(-2px); filter:brightness(1.08); }
.bl-tier.is-free .bl-cta {
  background:transparent; color:var(--orange);
  border:1.5px solid var(--orange);
}
.bl-tier.is-free .bl-cta:hover { background:rgba(255,107,44,.12); }

.bl-footer-note {
  text-align:center; margin:48px auto 0; max-width:620px;
  font-size:1rem; line-height:1.6; opacity:.8;
}
.bl-footer-note strong { color:var(--section-accent, var(--gold)); font-weight:700; }

/* Mobile */
@media (max-width:760px){
  .booking-ladder { padding:64px 0 40px; }
  .bl-tier {
    grid-template-columns:auto 1fr;
    gap:16px 16px; padding:22px 20px;
  }
  .bl-tier.is-featured { padding:26px 20px; transform:none; }
  .bl-tier.is-featured:hover { transform:translateY(-3px); }
  .bl-icon { width:46px; height:46px; }
  .bl-icon svg { width:22px; height:22px; }
  .bl-tier-action {
    grid-column:1 / -1;
    flex-direction:row; align-items:center; justify-content:space-between;
    text-align:left; width:100%;
    margin-top:6px; padding-top:16px;
    border-top:1px solid rgba(255,255,255,.12);
  }
  .bl-tier.is-featured .bl-tier-action { border-top-color:rgba(13,46,54,.18); }
  .bl-price { font-size:1.6rem; }
  .bl-cta { flex:0 0 auto; }
}

/* ---- Variante COLONNE (card affiancate, stile pricing) ---- */
.booking-ladder.bl-columns .bl-tiers {
  display:flex; flex-direction:column;
  align-items:stretch;
  max-width:1180px;
  gap:20px;
}
.booking-ladder.bl-columns .bl-row {
  display:flex; gap:16px; align-items:stretch; justify-content:center;
}
.booking-ladder.bl-columns .bl-row-free { max-width:780px; margin:0 auto; width:100%; }
.booking-ladder.bl-columns .bl-row > .bl-tier { flex:1 1 0; min-width:0; }
.booking-ladder.bl-columns .bl-row > .bl-tier.is-featured { flex:1.5 1 0; }
.booking-ladder.bl-columns .bl-tier {
  grid-template-columns:none;
  display:flex; flex-direction:column;
  text-align:center; align-items:center;
  padding:30px 22px;
  border-left:1px solid rgba(255,255,255,.10);
  border-top:3px solid var(--section-accent, var(--gold));
}
.booking-ladder.bl-columns .bl-tier.is-featured {
  transform:scale(1.04);
  border:none;
  padding:36px 22px;
  z-index:2;
}
.booking-ladder.bl-columns .bl-tier.is-featured:hover { transform:scale(1.04) translateY(-3px); }
.booking-ladder.bl-columns .bl-tier-body { width:100%; }
.booking-ladder.bl-columns .bl-tier-who,
.booking-ladder.bl-columns .bl-tier-format { justify-content:center; }
.booking-ladder.bl-columns .bl-value { font-size:.86rem; }
.booking-ladder.bl-columns .bl-tier-action {
  flex-direction:column; align-items:center; text-align:center;
  width:100%; margin-top:auto; padding-top:30px; gap:16px;
}
.booking-ladder.bl-columns .bl-cta {
  width:100%; justify-content:center;
  white-space:normal; line-height:1.2;
  border-radius:16px; padding:13px 18px;
  font-size:.92rem;
}
.booking-ladder.bl-columns .bl-scarcity { margin-left:auto; margin-right:auto; }
/* ===== Premium booking ladder (gold) ===== */
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured {
  display:flex; flex-direction:column; align-items:stretch; text-align:left;
  padding:0; overflow:hidden; border:1px solid rgba(255,255,255,.4);
  background:linear-gradient(160deg,#FBE6A2 0%,#E7C067 28%,#CDA04A 52%,#B5862F 78%,#E2BC6A 100%);
  color:#231905;
  box-shadow:0 0 0 1px rgba(180,134,47,.45), 0 0 20px 0 rgba(231,192,103,.45);
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured:hover { transform:scale(1.04) translateY(-2px); }
.bl-feat-flag {
  position:absolute; top:0; left:0; z-index:3;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  width:104px; padding:14px 10px 12px;
  background:#13110B; color:#E7C067; border-radius:0 0 18px 0;
  font-family:'Bebas Neue',sans-serif; letter-spacing:.1em; line-height:1.12;
  font-size:.72rem; text-align:center; text-transform:uppercase;
}
.bl-feat-flag svg { width:24px; height:24px; }
.bl-feat-pad { padding:26px 32px 24px; position:relative; }
.bl-feat-name {
  font-family:'Inter',sans-serif; font-weight:800; text-transform:uppercase;
  font-size:clamp(2rem,3.2vw,3rem); line-height:.98; letter-spacing:-.01em;
  margin:0 0 6px; padding-left:120px; min-height:58px; color:#1C1405;
  display:flex; align-items:center;
}
.bl-feat-sub {
  font-family:'Bebas Neue',sans-serif; letter-spacing:.05em;
  font-size:1rem; margin:0 0 12px; color:rgba(35,25,5,.82); text-transform:uppercase;
}
.bl-social { display:flex; align-items:center; gap:10px; margin:0 0 18px; font-size:.86rem; font-weight:600; color:rgba(35,25,5,.85); }
.bl-stars { color:#7a5a12; letter-spacing:2px; font-size:.95rem; }
.bl-feat-grid { display:grid; grid-template-columns:1.1fr 1fr; gap:24px; align-items:center; }
.bl-feat-left .bl-features { margin:0; }
.bl-feat-left .bl-features li { font-size:.92rem; opacity:1; color:#2A1E08; }
.bl-feat-right { display:flex; flex-direction:column; align-items:center; text-align:center; gap:3px; border-left:1px solid rgba(35,25,5,.18); padding-left:22px; }
.bl-compare { font-family:'Bebas Neue',sans-serif; letter-spacing:.06em; font-size:.95rem; color:rgba(35,25,5,.7); }
.bl-compare s { color:#9a3b1a; text-decoration-thickness:2px; margin-left:4px; }
.bl-today { font-family:'Bebas Neue',sans-serif; letter-spacing:.12em; font-size:.92rem; color:rgba(35,25,5,.72); text-transform:uppercase; }
.bl-price-big { font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(2.8rem,5vw,3.8rem); line-height:1; color:#1C1405; margin:2px 0 12px; }
.bl-tier.is-featured .bl-cta-dark { background:#13110B; color:#F3D98E; border:none; width:100%; justify-content:center; border-radius:14px; padding:14px 18px; }
.bl-tier.is-featured .bl-cta-dark:hover { background:#000; transform:translateY(-2px); }
.bl-feat-scarcity { display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:.8rem; font-weight:700; color:rgba(35,25,5,.8); }
.bl-bottom-note { background:#13110B; color:rgba(231,192,103,.88); text-align:center; padding:12px 20px; font-family:'Bebas Neue',sans-serif; letter-spacing:.07em; font-size:.82rem; }
.bl-tier.is-featured .bl-features li .bl-check { color:#1C1405; border-color:#1C1405; }

/* ===== Card a pagamento secondarie (scure + oro) ===== */
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) {
  background:#0B0B0C; border:1px solid rgba(231,192,103,.28);
  border-radius:18px; padding:34px 24px;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-icon {
  width:62px; height:62px; border-radius:50%; background:transparent;
  border:1.5px solid rgba(231,192,103,.55); color:#E7C067; margin-bottom:6px;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-name,
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-price { color:#F3E6C8; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta {
  background:linear-gradient(135deg,#E7C067,#C99B43); color:#1C1405; border:none;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta:hover { filter:brightness(1.07); }

/* ===== Spunte cerchiate oro ===== */
.booking-ladder .bl-features li .bl-check {
  width:19px; height:19px; padding:2.5px; border-radius:50%;
  border:1.5px solid currentColor; box-sizing:border-box; margin-top:0;
}

/* ===== Bottoni contatto (servizi rapidi) ===== */
.booking-ladder.bl-columns .bl-buttons {
  display:flex; gap:14px; flex-wrap:wrap; align-items:stretch; justify-content:center;
  max-width:1180px; margin:18px auto 0;
}
.bl-button {
  flex:1 1 0; min-width:300px;
  display:flex; align-items:center; gap:16px;
  background:#0A0B0A; border:1.5px solid rgba(255,255,255,.10); border-radius:18px;
  padding:18px 24px; text-decoration:none; color:#F3EEDD;
  transition:transform .2s ease, box-shadow .25s ease, border-color .25s ease;
}
.bl-button:hover { transform:translateY(-2px); }
.bl-button-ic { width:54px; height:54px; border-radius:50%; display:grid; place-items:center; flex:none; }
.bl-button-ic svg { width:28px; height:28px; }
.bl-button-tx { display:flex; flex-direction:column; gap:3px; line-height:1.2; flex:1; }
.bl-button-tx strong { font-family:'Bebas Neue',sans-serif; letter-spacing:.05em; font-size:1.18rem; font-weight:400; text-transform:uppercase; color:#FBF7EC; }
.bl-button-tx small { font-size:.86rem; color:rgba(255,255,255,.55); }
.bl-button-arrow { flex:none; display:grid; place-items:center; }
.bl-or { flex:none; align-self:center; color:rgba(255,255,255,.45); font-size:.82rem; font-style:italic; letter-spacing:.04em; padding:0 2px; }
.bl-button-wa {
  background:#08110B; border:1.5px solid rgba(37,211,102,.6);
  box-shadow:0 0 0 1px rgba(37,211,102,.25), 0 0 32px -6px rgba(37,211,102,.5);
}
.bl-button-wa:hover { border-color:#25D366; box-shadow:0 0 0 1px rgba(37,211,102,.45), 0 0 44px -4px rgba(37,211,102,.65); }
.bl-button-wa .bl-button-ic { background:#25D366; color:#fff; box-shadow:0 0 20px -3px rgba(37,211,102,.75); }
.bl-button-wa .bl-button-arrow { color:#25D366; }
.bl-button-gold {
  background:linear-gradient(115deg,#14100A 0%,#3A2D12 42%,#9A7531 100%);
  border:1.5px solid rgba(231,192,103,.6);
  box-shadow:0 0 0 1px rgba(231,192,103,.25), 0 0 32px -6px rgba(231,192,103,.5);
}
.bl-button-gold:hover { border-color:#E7C067; box-shadow:0 0 0 1px rgba(231,192,103,.45), 0 0 44px -4px rgba(231,192,103,.65); }
.bl-button-gold .bl-button-ic { background:linear-gradient(135deg,#F4D58A,#C99B43); color:#1C1405; box-shadow:0 0 20px -3px rgba(231,192,103,.75); }
.bl-button-gold .bl-button-arrow { color:#E7C067; }
@media (max-width:760px){ .bl-button { flex:1 1 100%; } .bl-or { width:100%; text-align:center; } }

/* ============== GLOSS REDESIGN booking ladder ============== */
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured {
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.4) 0%, rgba(255,255,255,0) 30%),
    linear-gradient(165deg,#F6DD96 0%,#E0B559 26%,#C99B43 50%,#9C7327 78%,#D9B164 100%);
  border:1px solid rgba(255,244,206,.7);
  box-shadow:0 0 0 1px rgba(180,134,47,.5), 0 0 12px 0 rgba(231,192,103,.5), 0 0 30px -4px rgba(231,192,103,.4);
  color:#2A1E08; text-align:center;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured::after {
  content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
  background:linear-gradient(155deg, rgba(255,255,255,.42) 0%, rgba(255,255,255,0) 24%);
}
.bl-feat-pad { padding:30px 30px 26px; position:relative; z-index:1; text-align:center; }
.bl-feat-ribbon {
  position:absolute; top:0; left:18px; z-index:4; width:78px;
  background:linear-gradient(180deg,#FBE6A2,#C99B43); color:#2A1E08;
  padding:12px 8px 18px; text-align:center;
  font-family:'Bebas Neue',sans-serif; letter-spacing:.07em; font-size:.72rem; line-height:1.18;
  clip-path:polygon(0 0,100% 0,100% 100%,50% 84%,0 100%);
  box-shadow:0 6px 14px rgba(0,0,0,.3);
}
.bl-feat-gem { display:grid; place-items:center; margin:2px auto 6px; color:#6a4a12; }
.bl-feat-gem svg { width:30px; height:30px; }
.bl-feat-name {
  font-family:'Inter',sans-serif; font-weight:800; text-transform:uppercase;
  font-size:clamp(1.7rem,2.5vw,2.4rem); line-height:1; letter-spacing:-.01em;
  margin:0 0 12px; padding:0; min-height:0; display:block;
  background:linear-gradient(180deg,#5a3d0e 0%,#8a6418 45%,#4a3208 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
  filter:drop-shadow(0 1px 0 rgba(255,255,255,.35));
}
.bl-feat-pill {
  display:inline-block; margin:0 0 16px; padding:7px 16px; border-radius:999px;
  background:rgba(20,16,6,.16); color:#3a2c0c; font-size:.86rem; font-weight:600;
}
.bl-tier.is-featured .bl-social { justify-content:center; color:rgba(35,25,5,.82); margin:0 0 16px; }
.bl-feat-list { display:grid; grid-template-columns:1fr 1fr; gap:12px 18px; text-align:left; margin:0 0 18px; }
.bl-feat-item { display:flex; align-items:center; gap:9px; font-size:.85rem; line-height:1.25; color:#2A1E08; }
.bl-feat-ic { width:30px; height:30px; flex:none; border-radius:50%; display:grid; place-items:center; background:rgba(20,16,6,.12); color:#5a3d0e; }
.bl-feat-ic svg { width:16px; height:16px; }
.bl-feat-pricewrap { border-top:1px solid rgba(35,25,5,.18); padding-top:14px; }
.bl-compare { font-family:'Bebas Neue',sans-serif; letter-spacing:.06em; font-size:.95rem; color:rgba(35,25,5,.72); }
.bl-compare s { color:#9a3b1a; text-decoration-thickness:2px; margin-left:4px; }
.bl-today { font-family:'Bebas Neue',sans-serif; letter-spacing:.14em; font-size:.92rem; color:rgba(35,25,5,.72); text-transform:uppercase; }
.bl-price-big {
  font-family:'Inter',sans-serif; font-weight:800; font-size:clamp(2.8rem,5vw,3.8rem);
  line-height:1; margin:2px 0 14px;
  background:linear-gradient(180deg,#6a4a12 0%,#8a6418 50%,#3a2606 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
  filter:drop-shadow(0 1px 0 rgba(255,255,255,.3));
}
.bl-tier.is-featured .bl-cta-dark {
  background:linear-gradient(180deg,#2A2008,#13110B); color:#F3D98E;
  border:1px solid rgba(243,217,142,.4); width:100%; justify-content:center;
  border-radius:14px; padding:14px 18px;
}
.bl-tier.is-featured .bl-cta-dark:hover { filter:brightness(1.12); transform:translateY(-2px); }
.bl-feat-scarcity { display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:.8rem; font-weight:700; color:rgba(35,25,5,.78); justify-content:center; }

/* --- Card secondarie a tema (blu / viola) --- */
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) {
  position:relative; overflow:hidden; border-radius:20px; padding:34px 24px;
  background:radial-gradient(120% 60% at 50% 0%, var(--bl-glow,rgba(231,192,103,.18)) 0%, rgba(8,9,12,0) 60%), #08090C;
  border:1px solid var(--bl-edge,rgba(231,192,103,.3));
  box-shadow:0 0 0 1px var(--bl-edge,rgba(231,192,103,.3)), 0 0 16px 0 var(--bl-glow,rgba(231,192,103,.42));
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-body { display:flex; flex-direction:column; align-items:center; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-name { order:0; background:linear-gradient(180deg,#FFFFFF 0%,var(--bl-accent,#E7C067) 135%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-who { display:none; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-value { order:1; display:inline-block; background:rgba(255,255,255,.05); border:1px solid var(--bl-edge,rgba(231,192,103,.28)); border-radius:12px; padding:8px 14px; font-size:.86rem; opacity:1; color:rgba(255,255,255,.82); margin:8px 0 2px; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-features { order:2; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-format { order:3; color:var(--bl-accent,#E7C067); opacity:.92; font-size:.8rem; margin-top:10px; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-icon {
  width:66px; height:66px; border-radius:50%; background:rgba(255,255,255,.02);
  border:1.5px solid var(--bl-edge,rgba(231,192,103,.55)); color:var(--bl-accent,#E7C067);
  box-shadow:0 0 26px -4px var(--bl-glow,rgba(231,192,103,.6)); margin-bottom:10px;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-features li .bl-check { color:var(--bl-accent,#E7C067); border-color:var(--bl-accent,#E7C067); }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-price { background:linear-gradient(180deg,#FFFFFF,var(--bl-accent,#E7C067)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta { background:rgba(255,255,255,.03); color:var(--bl-accent,#E7C067); border:1.5px solid var(--bl-edge,rgba(231,192,103,.5)); }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta:hover { background:var(--bl-accent,#E7C067); color:#0B0B0C; filter:none; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:nth-child(2),
.booking-ladder.bl-columns .bl-row-paid .bl-tier:nth-child(3) { --bl-accent:#E7C067; --bl-edge:rgba(231,192,103,.45); --bl-glow:rgba(231,192,103,.32); }

@media (max-width:760px){
  /* In colonne su mobile: 1 card per riga, ripristino azione verticale pulita */
  .booking-ladder.bl-columns .bl-row { flex-direction:column; }
  /* FIX: in colonna le card si dimensionano sul contenuto (no collasso/clip) */
  .booking-ladder.bl-columns .bl-row > .bl-tier,
  .booking-ladder.bl-columns .bl-row > .bl-tier.is-featured { flex:1 1 auto; }
  .booking-ladder.bl-columns .bl-row-free { max-width:none; }
  .bl-feat-grid { grid-template-columns:1fr; gap:16px; }
  .bl-feat-right { border-left:none; border-top:1px solid rgba(35,25,5,.18); padding-left:0; padding-top:16px; }
  .bl-feat-name { padding-left:0; padding-top:46px; min-height:0; font-size:2rem; }
  .bl-feat-flag { width:auto; flex-direction:row; gap:8px; border-radius:0 0 14px 0; }
  .bl-button { flex:1 1 100%; }
  .bl-feat-list { grid-template-columns:1fr; }
  .booking-ladder.bl-columns .bl-tier.is-featured { transform:none; }
  .booking-ladder.bl-columns .bl-tier.is-featured:hover { transform:translateY(-3px); }
  .booking-ladder.bl-columns .bl-tier-action {
    border-top:1px solid rgba(255,255,255,.12);
  }
  .booking-ladder.bl-columns .bl-tier.is-featured .bl-tier-action { border-top-color:rgba(13,46,54,.18); }
}

/* ============================================================
   SCALA PRENOTAZIONI — card scure + BORDO ORO, NIENTE alone
   (stesso fondo per tutte; premium = fondo scuro con bordo oro)
   ============================================================ */
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured){
  background:#000;
  border:1px solid rgba(231,192,103,.6);
  box-shadow:0 0 0 1px rgba(231,192,103,.22), 0 0 12px 0 rgba(231,192,103,.30), inset 0 0 16px -6px rgba(231,192,103,.22);
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-icon{
  background:rgba(231,192,103,.10); box-shadow:none;
  border:1.5px solid rgba(231,192,103,.55);
}
/* Premium: da oro pieno a fondo scuro con bordo oro brillante */
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured{
  background:#000;
  border:1.5px solid #E7C067;
  box-shadow:0 0 0 1px rgba(231,192,103,.45), 0 0 18px 1px rgba(231,192,103,.42), inset 0 0 20px -6px rgba(231,192,103,.30);
  color:#F3EEE2;
}
/* sezione: niente alone caldo, nero uniforme */
.booking-ladder::before{ background:none; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier.is-featured::after{ background:none; }
.bl-feat-name{
  background:linear-gradient(180deg,#F6DD96 0%,#E7C067 50%,#C99B43 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  filter:none;
}
.bl-feat-gem{ color:#E7C067; }
.bl-feat-pill{ background:rgba(231,192,103,.12); color:#F3EEE2; border:1px solid rgba(231,192,103,.28); }
.bl-tier.is-featured .bl-social{ color:rgba(247,243,236,.7); }
.bl-stars{ color:#E7C067; }
.bl-feat-item{ color:rgba(247,243,236,.9); }
.bl-feat-ic{ background:rgba(231,192,103,.12); color:#E7C067; }
.bl-feat-pricewrap{ border-top-color:rgba(231,192,103,.22); }
.bl-compare{ color:rgba(247,243,236,.6); }
.bl-compare s{ color:rgba(247,243,236,.42); }
.bl-today{ color:rgba(247,243,236,.7); }
.bl-price-big{
  background:linear-gradient(180deg,#FBE6A2,#E7C067);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  filter:none;
}
.bl-tier.is-featured .bl-cta-dark{
  background:linear-gradient(135deg,#F4D58A,#C99B43); color:#1C1405; border:none;
}
.bl-tier.is-featured .bl-cta-dark:hover{ filter:brightness(1.06); transform:translateY(-2px); }
.bl-feat-scarcity{ color:rgba(247,243,236,.65); }
.bl-bottom-note{ background:rgba(0,0,0,.35); color:rgba(231,192,103,.85); }

/* --- titoli card in Bebas Neue --- */
.bl-feat-name,
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-name{
  font-family:var(--font-display),'Bebas Neue',sans-serif !important;
  font-weight:400 !important; letter-spacing:.014em;
}
.bl-feat-name{ font-size:clamp(2.1rem,3vw,2.9rem) !important; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-tier-name{
  font-size:1.7rem; line-height:1.02;
}
/* --- testi card piu grandi e leggibili --- */
.bl-feat-item{ font-size:.96rem; line-height:1.32; }
.bl-feat-pill{ font-size:.96rem; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-value{ font-size:.95rem; line-height:1.42; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-features li{ font-size:.95rem; line-height:1.32; }
/* --- premium: pulsante spinto in basso --- */
.bl-tier.is-featured .bl-feat-pad{ display:flex; flex-direction:column; height:100%; }
.bl-tier.is-featured .bl-feat-pricewrap{ margin-top:auto; }
/* --- hover CTA premium: resta oro, testo leggibile --- */
.bl-tier.is-featured .bl-cta-dark:hover{
  background:linear-gradient(135deg,#FBE6A2,#E7C067) !important;
  color:#15110A !important; filter:none; transform:translateY(-2px);
}
/* --- CTA secondarie: semplici e leggibili --- */
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta{
  background:transparent; color:#EBD08A;
  border:1.5px solid rgba(231,192,103,.6); font-weight:700;
}
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-cta:hover{
  background:#E7C067; color:#15110A; filter:none;
}

/* ============================================================
   SCALA PRENOTAZIONI — schede piu larghe + bottoni allineati
   ============================================================ */
/* schede piu larghe (meno alte) */
.booking-ladder.bl-columns .bl-tiers{ max-width:1480px; }
/* azione subito dopo il corpo (non in fondo): cosi il 1° tasto e quello gratis sono in linea */
/* blocco prezzo+bottoni ancorato in basso: prezzi e tasti allineati tra le schede */
.booking-ladder.bl-columns .bl-tier-action{ margin-top:auto; padding-top:18px; }
.booking-ladder.bl-columns .bl-cta{ min-height:48px; display:inline-flex; align-items:center; }
.booking-ladder.bl-columns .bl-cta-pair{ min-height:104px; justify-content:flex-start; }
/* pareggio altezze del corpo per allineare prezzo + bottoni tra le schede */
.booking-ladder.bl-columns .bl-row-paid .bl-tier .bl-tier-name{ min-height:3.4rem; }
.booking-ladder.bl-columns .bl-row-paid .bl-tier:not(.is-featured) .bl-value{
  display:flex; align-items:center; justify-content:center;
  width:100%; box-sizing:border-box; min-height:84px; text-align:center;
}

/* ============================================================
   SCALA PRENOTAZIONI — foto che spunta da dietro la scheda
   ============================================================ */
.booking-ladder.bl-columns .bl-row > .bl-card-wrap{ flex:1 1 0; min-width:0; position:relative; display:flex; }
.bl-card-wrap > .bl-tier{ flex:1 1 auto; width:100%; position:relative; z-index:1; }
.bl-photo{
  position:absolute; left:0; right:0; bottom:calc(100% - 100px);
  display:flex; justify-content:center; align-items:flex-end;
  z-index:0; pointer-events:none;
}
.bl-photo img{ height:300px; width:auto; max-width:95%; object-fit:contain; display:block;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.55)); }
.bl-tier.has-photo{ padding-top:30px; }
.booking-ladder.bl-columns .bl-row-paid.bl-row-haspics{ margin-top:150px; }
@media (max-width:760px){
  .bl-photo img{ height:210px; }
  .bl-photo{ bottom:calc(100% - 70px); }
  /* impilate in verticale: lascio spazio sopra ogni scheda per la foto che sporge */
  .booking-ladder.bl-columns .bl-row-paid.bl-row-haspics{ margin-top:110px; gap:160px; }
}

/* ============================================================
   HERO CENTRATA (video grande al centro, stile "event")
   ============================================================ */
.hero.hero-centered{
  position:relative; overflow:hidden; display:block;
  min-height:auto;
  padding:clamp(96px,14vh,160px) 0 clamp(56px,9vh,104px);
  background:var(--petrol-darker);
}
.hero-centered .hero-bg{ position:absolute; inset:0; z-index:0; }
.hero-centered .hero-bg img,
.hero-centered .hero-bg video{ width:100%; height:100%; object-fit:cover; opacity:.30; }
.hero-centered .hero-bg-scrim{
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(circle at 50% 32%, rgba(20,28,46,.45), rgba(14,20,34,.93) 72%),
    linear-gradient(180deg, rgba(14,20,34,.55) 0%, rgba(14,20,34,.9) 100%);
}
.hero-centered .hero-c{
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  gap:20px; max-width:1000px;
}
.hero-centered .hero-title{
  margin:0; text-align:center;
  font-family:var(--font-sans); font-weight:800;
  font-size:clamp(2.2rem,5.4vw,4.1rem); line-height:1.04;
  letter-spacing:-.02em; color:var(--ivory); max-width:18ch;
}
.hero-centered .hero-title .accent{
  font-family:var(--font-serif); font-style:italic; font-weight:400; color:var(--gold);
}
.hero-centered .hero-sub{
  margin:0 auto; max-width:62ch;
  font-size:clamp(1rem,1.5vw,1.16rem); line-height:1.6; color:var(--ink-soft);
}
.hero-centered .hero-sub .em{ font-style:italic; }

/* Palco video */
.hero-stage{
  position:relative; width:100%; max-width:880px; margin:10px auto 0;
  aspect-ratio:16/9; border-radius:24px; overflow:hidden;
  border:1px solid rgba(236,238,244,.10);
  box-shadow:0 44px 96px -30px rgba(0,0,0,.75);
}
.hero-stage-media{ position:absolute; inset:0; }
.hero-stage-media img{ width:100%; height:100%; object-fit:cover; }
.hero-stage-scrim{
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(10,15,26,.05) 0%, rgba(10,15,26,.12) 42%, rgba(10,15,26,.85) 100%);
}
/* Tasto play — arancio forte */
.hero-play{
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  width:88px; height:88px; border-radius:50%;
  border:0; padding:0; cursor:pointer;
  background:#FF6B2C; display:grid; place-items:center;
  box-shadow:0 14px 36px -6px rgba(255,107,44,.6);
  transition:transform .2s ease, background .2s ease;
}
.hero-play svg{ width:34px; height:34px; fill:#fff; margin-left:4px; }
.hero-play:hover{ transform:translate(-50%,-50%) scale(1.07); background:#FF7C42; }
.hero-play-ring{
  position:absolute; inset:-12px; border-radius:50%;
  border:2px solid rgba(255,107,44,.5);
  animation:heroPulse 2.4s ease-out infinite;
}
@keyframes heroPulse{ 0%{transform:scale(1);opacity:.75} 70%{transform:scale(1.4);opacity:0} 100%{opacity:0} }
/* Overlay in basso sul video: CTA + mission */
.hero-stage-bottom{
  position:absolute; left:0; right:0; bottom:0; z-index:3;
  padding:clamp(16px,3vw,30px);
  display:flex; flex-direction:column; align-items:center; gap:14px;
}
.hero-cta-btn{
  display:inline-flex; align-items:center; gap:12px;
  background:#FF6B2C; color:#fff; text-decoration:none;
  font-family:var(--font-display); letter-spacing:.04em;
  font-size:clamp(1rem,1.5vw,1.2rem);
  padding:15px 34px; border-radius:999px;
  box-shadow:0 14px 32px -8px rgba(255,107,44,.55);
  transition:transform .2s ease, filter .2s ease;
}
.hero-cta-btn:hover{ transform:translateY(-2px); filter:brightness(1.07); }
.hero-cta-btn .cta-strike{
  text-decoration:line-through; opacity:.72;
  font-size:.78em; font-family:var(--font-sans);
}
.hero-mission-badge{
  display:flex; flex-direction:column; gap:3px; align-items:center;
  max-width:600px; padding:10px 20px; border-radius:14px;
  background:rgba(14,20,34,.5); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(236,238,244,.18);
  font-size:.86rem; line-height:1.45; color:rgba(236,238,244,.92);
}
.hero-mission-badge .hmb-label{ font-style:italic; }
.hero-mission-badge .hmb-label strong{ color:var(--gold); font-style:normal; font-weight:700; letter-spacing:.04em; }
.hero-mission-badge .hmb-figure{ font-weight:700; color:var(--gold); }

@media (max-width:600px){
  .hero-stage{ aspect-ratio:3/4; border-radius:18px; max-width:460px; }
  .hero-play{ top:38%; width:66px; height:66px; }
  .hero-play svg{ width:25px; height:25px; }
  .hero-cta-btn{ font-size:1rem; padding:13px 24px; white-space:normal; text-align:center; }
  .hero-mission-badge{ font-size:.8rem; padding:9px 14px; }
}

/* ============================================================
   TEMA CHIARO  —  attivo con <html data-theme="light">
   Le sezioni "a variabile" si ribaltano da sole; qui rimappo le
   variabili, tengo scure le sezioni media (hero/video) e converto
   le 3 sezioni col nero cablato (trattamenti, risultati, scala).
   ============================================================ */
:root[data-theme="light"]{
  --petrol:#FFFFFF; --petrol-darker:#FFFFFF; --petrol-soft:#F0F0F2; --petrol-tint:#F4F4F6;
  --ivory:#1B2433; --ivory-deeper:#2A3346;
  --ink:#1B2433; --ink-soft:#4C566B; --ink-light:#7C8597;
  --mist:#E2DCCF; --mist-soft:#EEE9DE; --line:#E2DCCF; --line-hair:rgba(20,28,46,.10);
  --bg-soft:#FFFFFF; --bg-warm:#FFFFFF; --cream:#FFFFFF;
  --gold:#A66A45; --gold-deeper:#8A5436;
  --coral-1:#FFFFFF; --coral-2:#FFFFFF; --coral-deep:#FFFFFF; --coral-darker:#FFFFFF; --coral-soft:#F4F4F6;
}
:root[data-theme="light"] .hero{ background:#141C2E !important; --ink:#ECEEF4; --ink-soft:#C3C9D4; --ivory:#ECEEF4; }
:root[data-theme="light"] .hero-centered{ background:#0E1422 !important; --ink:#ECEEF4; --ink-soft:#C3C9D4; --ivory:#ECEEF4; }
:root[data-theme="light"] section[style*="--section-bg"]:not(.hero):not(.hero-centered):not(.wake-videos){ background:#FFFFFF !important; }
:root[data-theme="light"] section[style*="--section-text"]:not(.hero):not(.hero-centered):not(.wake-videos){ color:#1B2433; }
:root[data-theme="light"] .before-after{ background:#FFFFFF; color:#1B2433; }
:root[data-theme="light"] .ba-cap{ color:#4C566B; }
:root[data-theme="light"] .treatments-list{ background:#FFFFFF; color:#1B2433; }
:root[data-theme="light"] .tl-head h2{ color:#1B2433; }
:root[data-theme="light"] .before-after h2{ color:#1B2433; }

/* richText: applica formattazione inline sicura su testo che potrebbe contenere
   markdown semplice o tag inline tipo <strong>, <em>, <br>, <a href="...">.
   Prima fa escape COMPLETO, poi sblocca SOLO un set ristretto e sicuro di tag/markdown:
   - **bold**, __bold__ → <strong>
   - *italic*, _italic_ → <em>
   - <strong>, </strong>, <b>, </b> → reso come strong
   - <em>, </em>, <i>, </i> → reso come em
   - <br>, <br/> → newline
   - newline doppio → spazio (preserva paragrafi tramite altri meccanismi)
   Tutto il resto resta escapeato. */
function richText(s){
  if(s==null) return '';
  // Prima escape totale
  let out = String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
  // Sblocco tag whitelisted (vengono dall'utente, escapeati prima → ora li ri-attiviamo)
  out = out
    .replace(/&lt;(\/?)strong&gt;/gi, '<$1strong>')
    .replace(/&lt;(\/?)b&gt;/gi, '<$1strong>')
    .replace(/&lt;(\/?)em&gt;/gi, '<$1em>')
    .replace(/&lt;(\/?)i&gt;/gi, '<$1em>')
    .replace(/&lt;br\s*\/?&gt;/gi, '<br>');
  // Markdown semplice
  // ** bold ** (greedy a singola riga)
  out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
  // * italic * — match solo se NON è subito accanto a un altro * (evita conflitti con bold già sostituito)
  out = out.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
  return out;
}

/* Genera tag <img> o <picture> con responsive desktop/mobile.
   `src` può essere:
   - stringa: viene usata sia su desktop che mobile (retro-compat)
   - oggetto {desktop, mobile}: il browser sceglie la versione tramite <picture>+<source>
*/
function img(src, alt, cls){
  if(!src) return '';
  let desktop, mobile;
  if(typeof src === 'object'){
    desktop = src.desktop || src.mobile || '';
    mobile = src.mobile || '';
  } else {
    desktop = src;
    mobile = '';
  }
  if(!desktop && !mobile) return '';
  const useDesktop = desktop || mobile;
  const classAttr = cls ? ` class="${cls}"` : '';
  const altAttr = ` alt="${esc(alt||'')}"`;
  // Se c'è solo desktop (o solo mobile), niente <picture>: usiamo <img> diretto
  if(!mobile || !desktop || desktop === mobile){
    return `<img src="${esc(useDesktop)}"${altAttr}${classAttr}>`;
  }
  // Doppia versione: <picture> con sorgente mobile sotto 768px
  return `<picture>
    <source media="(max-width:768px)" srcset="${esc(mobile)}">
    <img src="${esc(desktop)}"${altAttr}${classAttr}>
  </picture>`;
}

/* Genera tag <video> dato un valore video.
   `value` può essere stringa (src) o oggetto {src, poster, autoplay, loop, muted, controls}. */
function video(value, opts){
  if(!value) return '';
  let v;
  if(typeof value === 'string') v = {src:value};
  else v = value;
  if(!v.src) return '';
  opts = opts || {};
  const cls = opts.className || '';
  const inlineStyle = opts.fill
    ? 'width:100%;height:100%;object-fit:cover'
    : 'width:100%;height:auto';
  // Per il poster, supporto anche oggetto {desktop, mobile}
  let posterUrl = '';
  if(v.poster){
    if(typeof v.poster === 'object'){
      posterUrl = v.poster.desktop || v.poster.mobile || '';
    } else {
      posterUrl = v.poster;
    }
  }
  const attrs = [
    v.autoplay ? 'autoplay' : '',
    v.loop ? 'loop' : '',
    (v.muted || v.autoplay) ? 'muted' : '',
    v.controls ? 'controls' : '',
    'playsinline',
    'preload="metadata"',
    posterUrl ? `poster="${esc(posterUrl)}"` : '',
    cls ? `class="${esc(cls)}"` : ''
  ].filter(Boolean).join(' ');
  return `<video src="${esc(v.src)}" ${attrs} style="${inlineStyle}"></video>`;
}

/* Helper: verifica se un valore video ha effettivamente un src */
function hasVideo(value){
  if(!value) return false;
  if(typeof value === 'string') return !!value;
  return !!(value && value.src);
}

/* Genera attributo style="" con CSS variables locali dalla section.style.
   Le sezioni che ricevono queste variabili NON le usano hard-coded ma con fallback
   sulla palette globale via var(--xxx, default). */
function sectionStyleAttr(s){
  const st = (s && s.style) || {};
  const parts = [];
  if(st.bg)     parts.push(`--section-bg:${st.bg}`);
  if(st.accent) parts.push(`--section-accent:${st.accent}`);
  if(st.text)   parts.push(`--section-text:${st.text}`);
  if(st.card)   parts.push(`--section-card:${st.card}`);
  const scale = scaleValue(st.scale);
  if(scale)     parts.push(`--text-scale:${scale}`);
  return parts.length ? ` style="${parts.join(';')}"` : '';
}
function scaleValue(s){
  if(!s || s === 'normale') return null;
  if(s === 'compatto')   return '0.88';
  if(s === 'grande')     return '1.12';
  if(s === 'extralarge') return '1.25';
  return null;
}

      <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
    </svg>`;
    const items = (s.items||[]).map(t=>{
      // Avatar fallback: se non c'è una foto, mostra l'iniziale del nome su uno sfondo colorato
      const nameTrim = (t.name||'').trim();
      const initial = nameTrim ? nameTrim.charAt(0).toUpperCase() : '?';
      // Hash semplice del nome per scegliere un colore pastello deterministico
      let h = 0; for(let i=0; i<nameTrim.length; i++) h = (h*31 + nameTrim.charCodeAt(i)) >>> 0;
      const avatarColors = ['#5B7C7F','#9B6B5C','#7B6A8C','#8C9B6B','#B68C5C','#4F6B7C','#7C5C8C','#5C8C7C'];
      const bg = avatarColors[h % avatarColors.length];
      const avatarInner = t.avatar
        ? `<div class="test-avatar has-photo">${img(t.avatar, nameTrim)}</div>`
        : `<div class="test-avatar initial" style="background:${bg}">${esc(initial)}</div>`;
      // Wrapper con il mini-badge Google sovrapposto in basso a destra (come fa il vero Google)
      const avatarHtml = `<div class="test-avatar-wrap">${avatarInner}<span class="test-avatar-badge" aria-label="Recensione Google">${googleLogo}</span></div>`;

        </div>
        <p class="test-text">${t.text_strong?`<strong>${richText(t.text_strong)}</strong> `:''}${richText(t.text||'')}</p>
      </div>`;
    }).join('');
    // Logo Facebook (inline)
    const fbLogo = `<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#1877F2" d="M24 12.07C24 5.4 18.63 0 12 0S0 5.4 0 12.07c0 6 4.39 10.97 10.13 11.85v-8.38H7.08v-3.47h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.88v2.26h3.32l-.53 3.47h-2.79V24C19.61 23.04 24 18.07 24 12.07z"/></svg>`;
    const logoFor = (svc)=> svc==='google' ? googleLogo : (svc==='facebook' ? fbLogo : `<span class="tb-ge">GE</span>`);
    // Badge dei 3 servizi (modificabili da CMS via review_badges; default qui sotto)
    const defaultBadges = [
      {service:'guidaestetica', name:'GuidaEstetica', rating:'5,0', note:'60 opinioni · 100% consiglia', href:'https://www.guidaestetica.it/centri/studio-medico-dott-domenico-campa-chirurgia-estetica'},
      {service:'google',        name:'Google',        rating:'5,0', count:'2.238 recensioni', featured:true, href:'https://www.google.com/search?q=dottore+domenico+campa'},
      {service:'facebook',      name:'Facebook',      rating:'98%', note:'217 valutazioni positive', href:'https://www.facebook.com/DottDomenicoCampaChirurgoPlastico/reviews'}
    ];
    const badges = (Array.isArray(s.review_badges) && s.review_badges.length) ? s.review_badges : defaultBadges;
    const badgesRow = `
      <div class="test-badges reveal">
        ${badges.map(b=>{
          const isFeatured = b.featured===true || b.featured==='sì' || b.featured==='si';
          const hasStars = b.rating && !String(b.rating).includes('%');

          <a class="test-badge${isFeatured?' is-featured':''}"${b.href?` href="${esc(b.href)}" target="_blank" rel="noopener"`:''}>
            <span class="tb-logo">${logoFor(b.service)}</span>
            <span class="tb-body">
              <span class="tb-name">${esc(b.name||'')}</span>
              ${b.rating?`<span class="tb-rate"><span class="tb-num">${esc(b.rating)}</span>${hasStars?`<span class="tb-stars">★★★★★</span>`:''}</span>`:`<span class="tb-reco">✓ Consigliato</span>`}
              ${b.count?`<span class="tb-count">${esc(b.count)}</span>`:''}
              ${b.note?`<span class="tb-note">${esc(b.note)}</span>`:''}
            </span>
          </a>`;
        }).join('')}
      </div>`;
    return `
      <section${sectionStyleAttr(s)} class="testimonials"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="test-head reveal">
            <h2>${richText(s.title_a||'')} <span class="serif-italic">${richText(s.title_italic||'')}</span></h2>
            ${s.subtitle?`<p class="test-subtitle">${richText(s.subtitle)}</p>`:''}
            ${badgesRow}

  spacer(s){
    const hd = (s.height_desktop !== undefined && s.height_desktop !== null && String(s.height_desktop).trim() !== '') ? Number(s.height_desktop) : 60;
    const hm = (s.height_mobile !== undefined && s.height_mobile !== null && String(s.height_mobile).trim() !== '') ? Number(s.height_mobile) : hd;
    let divider = '';
    if(s.show_line === 'line') divider = '<span class="spacer-line"></span>';
    else if(s.show_line === 'dot') divider = '<span class="spacer-dot"></span>';
    else if(s.show_line === 'gold') divider = '<span class="spacer-gold"></span>';
    return `
      <div class="spacer-block" style="--sp-d:${hd}px; --sp-m:${hm}px"${s.id?` id="${esc(s.id)}"`:''}>
        ${divider}
      </div>`;
  },

  stats_band(s){
    const items = (s.items||[]).filter(it => it && (it.number || it.label)).map(it => {
      const raw = String(it.number||'').trim();
      // Se il numero ha una virgola (es. "99,8") lo mostriamo fisso, senza count-up
      const isDecimal = raw.includes(',') || raw.includes('.');
      const intVal = raw.replace(/[^\d]/g, '');
      const target = intVal ? parseInt(intVal, 10) : 0;
      const countAttr = isDecimal ? '' : ` data-count-to="${target}"`;
      const shown = isDecimal ? raw : '0';
      return `
        <div class="sb-item">
          <div class="sb-number">
            ${it.prefix?`<span class="sb-affix sb-prefix">${esc(it.prefix)}</span>`:''}
            <span class="sb-count"${countAttr}>${shown}</span>
            ${it.suffix?`<span class="sb-affix sb-suffix">${esc(it.suffix)}</span>`:''}
          </div>
          ${it.label?`<div class="sb-label">${richText(it.label)}</div>`:''}
        </div>`;
    }).join('');
    const labelSizeCls = s.label_size ? ` sb-labelsize-${s.label_size}` : '';
    const introSizeCls = s.intro_size ? ` sb-introsize-${s.intro_size}` : '';

    // Sezione loghi (società scientifiche, accreditamenti...)
    let logosHtml = '';
    const logos = (s.logos||[]).filter(l => l && l.image);
    if(s.logos_title || logos.length){
      const logoItems = logos.map(l => {
        const imgDark = img(l.image, l.alt||'', 'sb-logo-img sb-logo-dark');
        const imgLight = l.image_contrast ? img(l.image_contrast, l.alt||'', 'sb-logo-img sb-logo-light') : '';
        const cls = 'sb-logo' + (l.image_contrast ? ' has-contrast' : '');
        const inner = imgDark + imgLight;
        return l.href
          ? `<a class="${cls}" href="${esc(l.href)}" target="_blank" rel="noopener">${inner}</a>`
          : `<div class="${cls}">${inner}</div>`;
      }).join('');
      logosHtml = `
        <div class="sb-logos-block">
          ${s.logos_title?`<p class="sb-logos-title">${richText(s.logos_title)}</p>`:''}
          ${logoItems?`<div class="sb-logos-grid">${logoItems}</div>`:''}
        </div>`;
    }

    return `
      <section${sectionStyleAttr(s)} class="stats-band${labelSizeCls}${introSizeCls}" data-stats-band${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          ${s.intro?`<p class="sb-intro">${richText(s.intro)}</p>`:''}
          <div class="sb-grid">${items}</div>
          ${logosHtml}
        </div>
      </section>`;
  },

  booking_ladder(s){

    const extAttr = (href)=> /^https?:/i.test(href||'')?' target="_blank" rel="noopener"':'';
    const premium = (t)=>{
      const FIC = ['<path d="M20 6 9 17l-5-5"/>','<rect x="2" y="6" width="13" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3z"/>','<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/>','<circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/>','<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>','<path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>'];
      const fIcon = (i)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${FIC[i%FIC.length]}</svg>`;
      const f = featList(t);
      const featGrid = f.length?`<div class="bl-feat-list">${f.map((x,i)=>`<div class="bl-feat-item"><span class="bl-feat-ic">${fIcon(i)}</span><span>${richText(x)}</span></div>`).join('')}</div>`:'';
      const price = esc(String(t.price||'').trim());
      const cta = t.cta_label?`<a class="bl-cta bl-cta-dark" href="${esc(t.cta_href||'#contatti')}"${/^https?:/i.test(t.cta_href||'')?' target="_blank" rel="noopener"':''}>${esc(t.cta_label)}</a>`:'';
      return `
        <div class="bl-tier is-featured">
          ${t.badge?`<div class="bl-feat-ribbon"><span>${esc(t.badge)}</span></div>`:''}
          <div class="bl-feat-pad">
            <div class="bl-feat-gem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M3 9l4-6h10l4 6-9 12L3 9z"/><path d="M3 9h18"/><path d="M8 3l-1 6 5 12 5-12-1-6"/></svg></div>
            <h3 class="bl-feat-name">${richText(t.name||'')}</h3>
            ${t.who?`<span class="bl-feat-pill">${richText(t.who)}</span>`:''}
            ${t.social_proof?`<div class="bl-social"><span class="bl-stars">★★★★★</span><span>${richText(t.social_proof)}</span></div>`:''}
            ${featGrid}
            <div class="bl-feat-pricewrap">
              ${t.price_compare?`<div class="bl-compare">Valore reale <s>${esc(t.price_compare)}</s></div>`:''}
              <div class="bl-today">Oggi solo</div>
              <div class="bl-price-big">${price}</div>
            </div>
            ${cta}
            ${t.scarcity?`<span class="bl-feat-scarcity">${lock}${esc(t.scarcity)}</span>`:''}
          </div>
        </div>`;
    };
    const renderTier = (t, idx)=>{
      if(!compareMode && s.layout==='columns' && !!t.featured) return premium(t);
      const isFeatured = !compareMode && !!t.featured;
      const isFree = !!t.free;
      const priceRaw = String(t.price||'').trim();
      const priceIsFree = isFree || /grat/i.test(priceRaw);
      const cls = `bl-tier${isFeatured?' is-featured':''}${isFree?' is-free':''}${(compareMode&&t.photo)?' has-photo':''}`;
      const icon = bookingLadderIcon(t.icon);
      const feats = (compareMode && featList(t).length===0)
        ? `<ul class="bl-features bl-compare-list">${compareRows.map(r=>{
            const on = isOn(r, idx);
            return `<li class="${on?'is-on':'is-off'}">${on?checkSvg:xSvg}<span>${richText(r.label)}</span></li>`;
          }).join('')}</ul>`
        : featUl(t);
      const tSlug = String(t.name||('tier-'+(idx+1))).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
      const ctaA = t.cta_label?`<a class="bl-cta bl-cta--${tSlug}" data-tier="${esc(t.name||'')}" data-cta="primario" href="${esc(t.cta_href||'#contatti')}"${extAttr(t.cta_href)}>${esc(t.cta_label)}</a>`:'';
      const ctaB = t.cta2_label?`<a class="bl-cta bl-cta-alt bl-cta--${tSlug}" data-tier="${esc(t.name||'')}" data-cta="secondario" href="${esc(t.cta2_href||'#contatti')}"${extAttr(t.cta2_href)}>${esc(t.cta2_label)}</a>`:'';
      const ctaWrap = (ctaA||ctaB)?`<div class="bl-cta-pair">${ctaA}${ctaB}</div>`:'';
      const formHtml = t.embed_form ? `
        <form class="bl-lead-form bl-lead-form--${tSlug}" data-tier="${esc(t.name||'')}" name="contatti" method="POST">
          <input type="text" name="firstName" placeholder="${I18N.fName}" required>
          <input type="text" name="lastName" placeholder="${I18N.fSurname}" required>
          <input type="email" name="email" placeholder="${I18N.fEmail}" required>
          <input type="tel" name="phone" placeholder="${I18N.fPhone}" required>
          <label class="bl-consent"><input type="checkbox" required><span>${I18N.fConsent}</span></label>
          <button type="submit" class="bl-cta bl-cta--${tSlug}" data-tier="${esc(t.name||'')}" data-cta="form">${I18N.blSend}</button>
          <p class="bl-form-ok" hidden>${I18N.blOk}</p>
        </form>` : '';
      return `<div class="${cls}${t.embed_form?' bl-has-form':''}">
        ${(compareMode&&t.photo) ? '' : (t.icon ? `<div class="bl-icon">${icon}</div>` : '')}
        <div class="bl-tier-body">
          ${t.badge?`<span class="bl-badge">${esc(t.badge)}</span>`:''}
          <h3 class="bl-tier-name">${richText(t.name||'')}</h3>
          ${t.who?`<p class="bl-tier-who">${richText(t.who)}</p>`:''}
          ${t.format?`<p class="bl-tier-format">${richText(t.format)}</p>`:''}
          ${t.value_line?`<p class="bl-value">${richText(t.value_line)}</p>`:''}
          ${t.embed_form ? '' : feats}
          ${t.scarcity?`<span class="bl-scarcity">${esc(t.scarcity)}</span>`:''}
        </div>
        ${t.embed_form
          ? `<div class="bl-tier-action bl-tier-action-form">${formHtml}</div>`
          : `<div class="bl-tier-action">
          <div class="bl-price${priceIsFree?' is-free':''}">${esc(priceRaw||'')}</div>
          ${ctaWrap}
        </div>`}
      </div>`;
    };
    const renderButton = (t)=>{
      const isWa = (t.icon==='whatsapp');
      const bSlug = String(t.name||'button').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
      const sub = t.format || t.who || '';
      return `<a class="bl-button ${isWa?'bl-button-wa':'bl-button-gold'} bl-button--${bSlug}" data-tier="${esc(t.name||'')}" href="${esc(t.cta_href||'#contatti')}"${/^https?:/i.test(t.cta_href||'')?' target="_blank" rel="noopener"':''}>
        <span class="bl-button-ic">${bookingLadderIcon(t.icon||'chat')}</span>
        <span class="bl-button-tx"><strong>${esc(t.name||t.cta_label||'')}</strong>${sub?`<small>${richText(sub)}</small>`:''}</span>
        <span class="bl-button-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg></span>
      </a>`;
    };
    const all = (s.tiers||[]).filter(t => t && (t.name || t.price));
    let tiersHtml;
    if(s.layout === 'columns'){
      const cards = all.filter(t => !t.free);
      const btns = all.filter(t => !!t.free);
      const renderCard = (t,i)=> compareMode
        ? `<div class="bl-card-wrap">${t.photo?`<div class="bl-photo">${img(t.photo, t.name||'')}</div>`:''}${renderTier(t,i)}</div>`
        : renderTier(t,i);
      const anyPhoto = compareMode && cards.some(t=>t.photo);
      tiersHtml = `<div class="bl-row bl-row-paid${anyPhoto?' bl-row-haspics':''}">${cards.map((t,i)=>renderCard(t,i)).join('')}</div>`
        + (btns.length ? `<div class="bl-buttons">${btns.map(renderButton).join('<span class="bl-or" aria-hidden="true">oppure</span>')}</div>` : '');
    } else {
      tiersHtml = all.map((t,i)=>renderTier(t,i)).join('');
    }
    return `
      <section${sectionStyleAttr(s)} class="booking-ladder${s.layout==='columns'?' bl-columns':''}"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="bl-head reveal">
            ${s.eyebrow?`<p class="bl-eyebrow">${esc(s.eyebrow)}</p>`:''}
            <h2 class="bl-title">${richText(s.title_a||'')} <span class="accent">${richText(s.title_accent||'')}</span></h2>
            ${s.subtitle?`<p class="bl-subtitle">${richText(s.subtitle)}</p>`:''}
          </div>
          ${s.urgency?`<div class="bl-urgency-wrap reveal"><span class="bl-urgency">${richText(s.urgency)}</span></div>`:''}
          <div class="bl-tiers">${tiersHtml}</div>
          ${s.footer_note?`<p class="bl-footer-note reveal">${richText(s.footer_note)}</p>`:''}
        </div>
      </section>`;
  }
};

function renderTopbar(data){
  const tb = data.topbar||{};
  // Mostriamo la topbar solo se non è esplicitamente disabilitata E ha almeno un item con label valida
  if(tb.enabled === false) return '';
  const validItems = (tb.items||[]).filter(it => it && it.label && String(it.label).trim());
  if(!validItems.length) return '';
  const built = validItems.map(item => {
    const isLink = !!item.href;
    const tag = isLink ? 'a' : 'span';
    const attrs = isLink
      ? ` href="${esc(item.href)}"${item.new_tab?' target="_blank" rel="noopener"':''}`
      : '';
    let label = esc(item.label||'');
    if(item.google_brand) label = label.replace(/Google/g, '<span class="topbar-google">Google</span>');
    if(item.strong_part) label = label.replace(new RegExp(esc(item.strong_part), 'g'), `<span class="topbar-strong">${esc(item.strong_part)}</span>`);
    // Pilastri (icona scudo): markup speciale maiuscolo
    if(item.icon === 'shield'){
      return {item, html:`<${tag} class="topbar-item topbar-pillars ${isLink?'is-link':''}"${attrs}><span class="topbar-shield">${topbarIconSvg('shield')}</span><span class="topbar-pillars-text">${label}</span></${tag}>`};
    }
    let inner = '';
    if(item.icon === 'star') inner = `<span class="topbar-star">★★★★★</span>`;
    else if(item.icon === 'dot') inner = `<span class="topbar-dot" aria-hidden="true"></span>`;
    else if(item.icon) inner = `<span class="topbar-icon">${topbarIconSvg(item.icon)}</span>`;
    const cls = `topbar-item ${isLink?'is-link':''}`;
    return {item, html: `<${tag} class="${cls}"${attrs}>${inner}${label}</${tag}>`};
  });
  // Rotazione singola al centro: tutte le voci nella track, una attiva alla volta (initTopbarRotator)
  const itemsHtml = built.map(b => b.html).join('');
  return `<div class="topbar-track">${itemsHtml}</div>`;
}

function logoMark(data){
  // Se l'utente ha caricato un logo (URL o file dal CMS), lo usiamo.
  // Supportiamo sia formato stringa (URL diretto) che oggetto {desktop, mobile}.
  const src = data.site?.logo_url;
  let url = '';
  if(typeof src === 'string') url = src;
  else if(src && typeof src === 'object') url = src.desktop || src.mobile || '';
  if(url){
    return `<span class="logo-mark logo-mark-img"><img src="${esc(url)}" alt="${esc(data.site?.logo_text || 'Logo')}"></span>`;
  }
  // Fallback: cerchio gold con iniziali
  const txt = (data.site?.logo_text||'Dr. Campa').trim();
  const initials = txt.split(/\s+/).map(w=>w.replace(/\./g,'').charAt(0).toUpperCase()).join('').slice(0,2);
  return `<span class="logo-mark">${esc(initials || 'DC')}</span>`;
}

   INIT — fetch content.json, set colors, render everything
   ========================================================== */
/* ==========================================================
   RECENSIONI GOOGLE LIVE — rating e conteggio reali dalla scheda
   Google Business (via function con cache). Fallback: valori editor.
   ========================================================== */
function applyLiveReviews(data, live){
  const rating = Number(live.rating), total = Number(live.total);
  if(!rating || !total) return;
  const r0 = (Math.round(rating*10)/10).toFixed(1);
  const r = SITE_LANG==='en' ? r0 : r0.replace('.', ',');
  const sep = SITE_LANG==='en' ? ',' : '.';
  const t = String(total).replace(/\B(?=(\d{3})+(?!\d))/g, sep);
  const revWord = SITE_LANG==='en' ? 'reviews' : 'recensioni';
  ((data.topbar||{}).items||[]).forEach(it => {
    if(it && it.google_brand){
      it.label = r + ' \u00b7 ' + t + ' ' + revWord + ' Google';
      it.strong_part = t;
    }
  });
  (data.sections||[]).forEach(s => {
    if(s.type === 'testimonials'){
      if(s.reviews_rating) s.reviews_rating = r;
      if(s.reviews_count) s.reviews_count = t;
      (s.review_badges||[]).forEach(bd => {
        if(/google/i.test(bd.name||'')){
          if(bd.rating) bd.rating = r;
          if(bd.count) bd.count = t + ' ' + revWord;
        }
      });
    }
  });
}

async function init(){
  try{ document.documentElement.lang = SITE_LANG; }catch(e){}
  try{document.documentElement.setAttribute("data-theme", localStorage.getItem("theme")||"dark");}catch(e){document.documentElement.setAttribute("data-theme","dark");}
  let data;
  try {
    let res = await fetch((SITE_LANG==='en' ? 'content.en.json?t=' : 'content.json?t=') + Date.now(), {cache:'no-store'});
    if(!res.ok && SITE_LANG==='en'){ res = await fetch('content.json?t=' + Date.now(), {cache:'no-store'}); }
    if(!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    /* numeri Google reali (max 1,5s di attesa; se non arrivano, valori editor) */
    try{
      const live = await Promise.race([
        fetch('/.netlify/functions/google-reviews').then(r => r.ok ? r.json() : null).catch(() => null),
        new Promise(resolve => setTimeout(() => resolve(null), 1500))
      ]);
      if(live) applyLiveReviews(data, live);
    }catch(e){}
  } catch(err){
    document.getElementById('app').innerHTML =
      `<div style="padding:80px 20px;text-align:center;color:#c44">Errore caricamento contenuti: ${esc(err.message)}</div>`;
    return;
  }

  // Document meta
  document.title = (data.site && data.site.title) || 'Studio Dr. Campa';
  const metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc && data.site && data.site.meta_description){
    metaDesc.setAttribute('content', data.site.meta_description);
  }

  // Color injection from CMS — override default palette tokens.
  // I 4 slot CMS mappano alla palette Clinical Luxury:
  //   primary  → petrol (colore principale: nav, bottoni, footer, sezioni autorevolezza)
  //   accent   → gold (dettagli luxury, tag, accent dei titoli)
  //   ink      → charcoal (testi)
  //   bg_soft  → ivory (sfondi soft delle sezioni alternative)
  if(data.site && data.site.colors){
    const c = data.site.colors;
    const inj = document.createElement('style');
    let css = ':root{';
    if(c.primary){
      css += `--petrol:${c.primary};`;
      // Aggiorno anche gli alias compat usati da template originali
      css += `--coral-1:${c.primary};--coral-2:${c.primary};--coral-deep:${c.primary};--coral-darker:${c.primary};`;
    }
    if(c.accent){
      css += `--gold:${c.accent};`;
      css += `--yellow:${c.accent};`;
    }
    if(c.ink){     css += `--ink:${c.ink};`; }
    if(c.bg_soft){
      css += `--ivory:${c.bg_soft};`;
      css += `--bg-soft:${c.bg_soft};`;
    }
    css += '}';
    inj.textContent = css;
    document.head.appendChild(inj);
  }

  // Render TOPBAR (sub-header sticky con recensioni Google + altre voci chiave)
  // Se non ci sono items, nascondiamo totalmente la barra e ripristiniamo il top della nav.
  const topbar = document.getElementById('topbar');
  if(topbar){
    const tbHTML = renderTopbar(data);
    if(tbHTML){
      topbar.innerHTML = tbHTML;
      topbar.classList.add('topbar-visible');
      // Colori personalizzabili dall'editor (con fallback ai default petrol/ivory)
      const tb = data.topbar || {};
      const c1 = tb.bg_color || '#2B3138';
      const c2 = tb.bg_color_2 || c1;
      const tc = tb.text_color || '#F0F2F4';
      topbar.style.background = (c1 === c2)
        ? c1
        : `linear-gradient(90deg, ${c1} 0%, ${c2} 100%)`;
      topbar.style.color = tc;
    } else {
      topbar.innerHTML = '';
      topbar.style.display = 'none';
      document.documentElement.classList.add('no-topbar');
    }
  }

  // Render NAV
  const nav = document.getElementById('nav');
  nav.innerHTML = renderNav(data);

  // Render MAIN sections
  const app = document.getElementById('app');
  app.classList.remove('app-loading');
  const sectionsHTML = (data.sections||[]).map(s => {
    const tpl = templates[s.type];
    if(!tpl){ console.warn('Sezione di tipo sconosciuto:', s.type); return ''; }
    try { return tpl(s); }
    catch(e){ console.error('Errore rendering sezione', s.type, e); return ''; }
  }).join('');
  app.innerHTML = sectionsHTML;

  // Render FOOTER
  document.getElementById('footer').innerHTML = renderFooter(data);

  // Behaviors (animations, nav, form)
  initBehaviors();
}

/* ==========================================================
   VIDEO MODAL — apre un video YouTube/Vimeo/MP4 in overlay
   ========================================================== */
function videoEmbedUrl(rawUrl){
  if(!rawUrl) return null;
  const url = String(rawUrl).trim();
  // YouTube — supporto vari formati
  let m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|v\/)|youtu\.be\/)([\w-]{6,})/);
  if(m){
    return {type:'iframe', src:`https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`};
  }
  // Vimeo
  m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m){
    return {type:'iframe', src:`https://player.vimeo.com/video/${m[1]}?autoplay=1`};
  }
  // File diretti (mp4, webm, mov)
  if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(url)){
    return {type:'video', src:url};
  }
  // Default: assumiamo iframe (anche per altri embed)
  return {type:'iframe', src:url};
}

function initVideoModal(){
  // Crea il modal una sola volta nel DOM
  let modal = document.getElementById('videoModal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'videoModal';
    modal.className = 'video-modal';
    modal.innerHTML = `
      <div class="video-modal-content" role="dialog" aria-modal="true" aria-label="Video player">
        <button class="video-modal-close" type="button" aria-label="Chiudi video">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
          </svg>
        </button>
        <div class="video-modal-inner"></div>
      </div>`;
    document.body.appendChild(modal);
  }
  const inner = modal.querySelector('.video-modal-inner');
  const closeBtn = modal.querySelector('.video-modal-close');

  function open(rawUrl){
    const parsed = videoEmbedUrl(rawUrl);
    if(!parsed) return;
    if(parsed.type === 'iframe'){
      inner.innerHTML = `<iframe src="${parsed.src}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    } else {
      inner.innerHTML = `<video src="${parsed.src}" controls autoplay playsinline></video>`;
    }
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function close(){
    modal.classList.remove('open');
    document.body.style.overflow = '';
    // Rimuovo dopo l'animazione per fermare la riproduzione
    setTimeout(() => { inner.innerHTML = ''; }, 300);
  }

  // Wire triggers (i bottoni con data-video-modal)
  document.querySelectorAll('[data-video-modal]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      open(btn.dataset.videoModal);
    });
  });

  // Close: click sull'overlay (non sul content), bottone X, tasto ESC
  closeBtn.addEventListener('click', close);
  modal.addEventListener('click', e => {
    if(e.target === modal) close();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && modal.classList.contains('open')) close();
  });
}
