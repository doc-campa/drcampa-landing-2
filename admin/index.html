<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — Studio Campa</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafaf8; --bg-card:#fff; --bg-soft:#f4ede3;
  --ink:#1a1714; --ink-soft:#5a554d; --ink-light:#8a8580;
  --line:#e7e1d4; --line-soft:#f0ece3;
  --coral:#e85d3c; --coral-soft:#fff5ed;
  --yellow:#ffd43b;
  --green:#0f7a4a;
  --red:#a32d2d;
  /* Animation tokens */
  --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
  /* Shadow tokens */
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 0 1px rgba(0,0,0,.03);
  --shadow-md: 0 4px 14px -2px rgba(0,0,0,.07), 0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg: 0 18px 40px -8px rgba(0,0,0,.15), 0 8px 14px -4px rgba(0,0,0,.07);
  --shadow-coral: 0 8px 24px -6px rgba(232, 93, 60, 0.35);
}
* { box-sizing:border-box; }
html,body {
  margin:0; height:100%; overflow:hidden;
  font-family:"Inter", system-ui, -apple-system, sans-serif;
  font-size:14px; line-height:1.5; color:var(--ink);
  background:var(--bg);
}
button { font:inherit; cursor:pointer; border:0; background:none; color:inherit; padding:0; }
input,textarea,select { font:inherit; }
a { color:inherit; text-decoration:none; }

/* ====== LOGIN ====== */
.login {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:#0a0a0a;
}
.login-card {
  background:#fff; border-radius:16px; padding:48px 40px; max-width:380px; width:100%;
  text-align:center; box-shadow:0 30px 60px -20px rgba(0,0,0,.5);
}
.login-logo {
  display:inline-flex; align-items:center; justify-content:center;
  width:48px; height:48px; border-radius:12px;
  background:linear-gradient(135deg, #ff8a5c, #e85d3c);
  color:#fff; font-weight:700; font-size:18px; margin-bottom:20px;
}
.login h1 { font-size:22px; font-weight:600; margin:0 0 8px; }
.login p { color:var(--ink-soft); margin:0 0 28px; font-size:14px; line-height:1.55; }
.login-btn {
  display:inline-flex; align-items:center; gap:10px; padding:11px 22px;
  background:#1a1714; color:#fff; border-radius:999px; font-weight:500; font-size:14px;
  transition:transform .12s;
}
.login-btn:hover { transform:translateY(-1px); }
.login-error {
  margin-top:14px; padding:10px 14px; background:#fef2f2; color:#a32d2d;
  border-radius:8px; font-size:13px;
}

/* ====== APP LAYOUT ====== */
.app { display:flex; flex-direction:column; height:100vh; }
.topbar {
  flex:0 0 56px; display:flex; align-items:center; padding:0 20px;
  background:#fff; border-bottom:1px solid var(--line); gap:16px;
  position:relative; z-index:10;
  box-shadow:0 1px 3px rgba(0,0,0,.025);
}
.topbar-logo {
  display:flex; align-items:center; gap:10px; font-weight:600;
}
.topbar-logo-mark {
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg, #ff8a5c, #e85d3c);
  display:grid; place-items:center; color:#fff; font-weight:700; font-size:13px;
}
.topbar-status { flex:1; display:flex; justify-content:center; gap:8px; font-size:13px; color:var(--ink-light); }
.topbar-status .dot { width:8px; height:8px; border-radius:50%; background:var(--ink-light); margin-top:5px; }
.topbar-status.dirty { color:#b45309; }
.topbar-status.dirty .dot { background:#f59e0b; }
.topbar-status.saving { color:#1d4ed8; }
.topbar-status.saving .dot { background:#3b82f6; animation:pulse 1s infinite; }
.topbar-status.saved { color:var(--green); }
.topbar-status.saved .dot { background:var(--green); }
@keyframes pulse { 50% { opacity:.4; } }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.btn {
  display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
  border-radius:999px; font-weight:500; font-size:13px;
  transition:transform .18s var(--ease-out), background .18s var(--ease-out), color .18s var(--ease-out), box-shadow .18s var(--ease-out), border-color .18s var(--ease-out);
  border:0.5px solid transparent;
}
.btn:hover { transform:translateY(-1px); }
.btn:active { transform:translateY(0); transition-duration:.08s; }
.btn-secondary { border-color:var(--line); color:var(--ink); background:#fff; }
.btn-secondary:hover { border-color:var(--ink); box-shadow:var(--shadow-sm); }
.btn-primary { background:#1a1714; color:#fff; }
.btn-primary:hover { background:var(--coral); box-shadow:var(--shadow-coral); }
.btn-primary:disabled { background:var(--ink-light); cursor:not-allowed; transform:none; box-shadow:none; }
.btn-primary:disabled:hover { background:var(--ink-light); transform:none; box-shadow:none; }

/* Pulse coral attorno al bottone "Pubblica" quando ci sono modifiche da salvare */
@keyframes coralPulse {
  0%, 100% { box-shadow:0 0 0 0 rgba(232, 93, 60, 0); }
  50%      { box-shadow:0 0 0 6px rgba(232, 93, 60, 0.18); }
}
.btn-primary.pulse:not(:hover):not(:disabled) {
  animation:coralPulse 2.4s ease-in-out infinite;
}
.btn-icon-only { padding:8px; }

.main { flex:1; display:flex; min-height:0; }
.editor {
  flex:0 0 44%; max-width:580px; overflow-y:auto;
  background:
    radial-gradient(ellipse 600px 400px at top right, rgba(232, 93, 60, 0.03), transparent 70%),
    var(--bg);
  padding:20px 24px 60px; border-right:1px solid var(--line);
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
.editor::-webkit-scrollbar { width:10px; }
.editor::-webkit-scrollbar-track { background:transparent; }
.editor::-webkit-scrollbar-thumb {
  background:var(--line);
  border-radius:5px;
  border:2px solid transparent;
  background-clip:padding-box;
}
.editor::-webkit-scrollbar-thumb:hover {
  background:var(--ink-light);
  background-clip:padding-box;
}
.preview {
  flex:1; min-width:0; background:#fff;
  display:flex; flex-direction:column;
}
.preview-toolbar {
  flex:0 0 auto; height:46px;
  display:flex; align-items:center; padding:0 16px; gap:12px;
  background:#fff; border-bottom:0.5px solid var(--line);
}
.viewport-buttons {
  display:flex; gap:2px;
  background:#f4ede3; border-radius:8px; padding:3px;
}
.viewport-buttons button {
  display:flex; align-items:center; gap:6px;
  padding:5px 11px; font-size:12px; font-weight:500;
  color:var(--ink-light); border-radius:5px;
  transition:all .12s;
}
.viewport-buttons button:hover { color:var(--ink); }
.viewport-buttons button.active {
  background:#fff; color:var(--ink);
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.viewport-info {
  margin-left:auto; font-size:11.5px; color:var(--ink-light);
  font-variant-numeric:tabular-nums;
}
.editing-info {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; background:var(--coral-soft);
  border:1px solid var(--coral); border-radius:999px;
  font-size:12px; font-weight:500; color:var(--coral);
  max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.editing-info.hidden { display:none; }
.preview-frame {
  flex:1; min-height:0; overflow:auto;
  background:#e9e3d4; padding:20px;
  display:flex; justify-content:center; align-items:flex-start;
}
.preview-frame iframe {
  display:block; width:100%; height:100%;
  background:#fff; border:0; border-radius:10px;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.18);
  transition:max-width .25s cubic-bezier(.4,0,.2,1);
}
.preview-frame.viewport-desktop iframe { max-width:100%; height:100%; }
.preview-frame.viewport-tablet iframe { max-width:768px; height:100%; }
.preview-frame.viewport-mobile iframe { max-width:390px; height:100%; }
.preview-loading {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:var(--ink-light); font-size:13px;
}

/* ====== OBJECT BLOCKS (Impostazioni Generali, Nav, Footer) ====== */
.block {
  background:var(--bg-card); border:0.5px solid var(--line); border-radius:12px;
  margin-bottom:14px; overflow:hidden;
}
.block-header {
  display:flex; align-items:center; padding:14px 18px; cursor:pointer;
  user-select:none; gap:14px;
  min-width:0;
}
.block-header:hover { background:#fafaf7; }
.block-header-text {
  flex:0 0 auto; font-weight:500; font-size:14px;
  white-space:nowrap;
}
.block-header-hint {
  color:var(--ink-light); font-size:12px; font-weight:400;
  flex:1; min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.block-chevron {
  color:var(--ink-light); transition:transform .3s var(--ease-spring);
  display:inline-block; line-height:1;
}
.block-chevron.open { transform:rotate(180deg); }
.block-body { padding:0 18px 16px; display:none; }
.block.open .block-body { display:block; }
.block.open .block-header { border-bottom:0.5px solid var(--line-soft); }

/* ====== SECTIONS LIST (B-MOCKUP) ====== */
.sections-block { margin-bottom:14px; }
.sections-header {
  display:flex; align-items:center; padding:0 4px 10px; gap:10px;
}
.sections-header-title {
  font-weight:500; font-size:14px; flex:1;
}
.sections-count {
  font-size:12px; color:var(--ink-light); font-weight:400;
}
.sections-list {
  background:var(--bg-card); border:0.5px solid var(--line); border-radius:12px;
  overflow:hidden;
}
.section-row {
  display:grid; grid-template-columns:auto auto 1fr auto; gap:12px;
  align-items:center; padding:10px 14px; min-height:42px;
  border-bottom:0.5px solid var(--line-soft); background:#fff;
  transition:background .25s var(--ease-out), transform .18s var(--ease-out);
  position:relative;
}
.section-row:last-child { border-bottom:0; }
.section-row:hover {
  background:linear-gradient(90deg, rgba(232, 93, 60, 0.045), transparent 70%);
}
.section-row.expanded { background:#fff; }
.section-row.expanded::after {
  content:""; position:absolute; left:0; top:0; width:3px; height:100%;
  background:var(--coral);
}
.section-drag {
  display:flex; flex-direction:column; gap:1px; color:var(--ink-light);
  cursor:grab; padding:4px;
}
.section-drag-row { display:flex; gap:1px; }
.section-drag-dot {
  width:3px; height:3px; border-radius:50%; background:currentColor;
  transition:background .25s var(--ease-out);
}
.section-row:hover .section-drag-dot {
  background:var(--coral);
}
.section-pill {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:6px; font-size:11.5px; font-weight:500;
  white-space:nowrap; flex-shrink:0; line-height:1.4;
  transition:transform .25s var(--ease-spring), filter .25s var(--ease-out);
}
.section-row:hover .section-pill {
  transform:scale(1.05);
  filter:saturate(1.2);
}
.section-summary {
  font-size:13.5px; color:var(--ink); font-weight:400;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0;
  cursor:pointer;
}
.section-actions { display:flex; align-items:center; gap:4px; color:var(--ink-light); }
.section-actions button { padding:6px; border-radius:6px; }
.section-actions button:hover { background:#f0ece3; color:var(--ink); }
.section-actions button.danger:hover { background:#fee; color:var(--red); }

/* ====== EXPANDED FORM (inside a section) ====== */
.section-form {
  background:var(--bg); padding:22px 24px; border-bottom:0.5px solid var(--line-soft);
  display:none;
}
.section-row.expanded + .section-form { display:block; }
.section-form-fields { display:flex; flex-direction:column; gap:18px; }

/* ====== STYLE OVERRIDES BLOCK (per section) ====== */
.section-style-block {
  margin-top:22px; padding-top:14px;
  border-top:0.5px dashed var(--line);
}
.section-style-toggle {
  display:flex; align-items:center; gap:10px;
  padding:8px 0; cursor:pointer; user-select:none;
  font-size:13px; font-weight:500;
  transition:opacity .15s;
}
.section-style-toggle:hover { opacity:.7; }
.section-style-toggle > span:first-child { flex-shrink:0; }
.section-style-hint {
  flex:1; font-size:11.5px; color:var(--ink-light); font-weight:400;
  font-style:italic;
}
.section-style-chevron {
  color:var(--ink-light); transition:transform .25s var(--ease-spring);
  display:inline-block; line-height:1;
}
.section-style-block.open .section-style-chevron { transform:rotate(180deg); }
.section-style-body {
  display:none; padding-top:14px;
  flex-direction:column; gap:16px;
}
.section-style-block.open .section-style-body { display:flex; }

.field { display:block; }
.field-label {
  font-size:12px; font-weight:500; color:var(--ink); margin-bottom:3px;
  display:flex; align-items:center; gap:6px;
}
.field-required { color:var(--coral); font-weight:600; }
.field-hint {
  font-size:11.5px; color:var(--ink-light); margin:0 0 7px; line-height:1.45;
}
.field-fmt-hint {
  font-size:10.5px; color:var(--ink-light); margin:5px 0 0; opacity:.7;
}
.field-fmt-hint code {
  background:rgba(0,0,0,.05); padding:1px 5px; border-radius:4px;
  font-family:ui-monospace, "SF Mono", Menlo, monospace; font-size:10px;
}
.field-input, .field-textarea, .field-select {
  width:100%; padding:9px 12px; border:0.5px solid #d5d0c5; border-radius:7px;
  background:#fff; font-size:13.5px; color:var(--ink); font-family:inherit;
  transition:border-color .12s, box-shadow .12s;
}
.field-input:focus, .field-textarea:focus, .field-select:focus {
  outline:0; border-color:var(--coral);
  box-shadow:0 0 0 3px rgba(232,93,60,.15);
}
.field-textarea { min-height:54px; resize:vertical; line-height:1.5; }
.field-number { width:120px; }

/* ====== IMAGE FIELD ====== */
.field-image {
  display:flex; gap:12px; align-items:center; padding:10px;
  background:#fff; border:0.5px solid #d5d0c5; border-radius:8px;
  position:relative;
}
.field-image-thumb {
  width:74px; height:50px; border-radius:5px; background:#d4cab8;
  display:flex; align-items:center; justify-content:center;
  color:#8a7d63; flex-shrink:0; overflow:hidden;
}
.field-image-thumb img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .35s var(--ease-out);
}
.field-image:hover .field-image-thumb img { transform:scale(1.08); }
.field-image-thumb svg { width:20px; height:20px; }
.field-image-info { flex:1; min-width:0; }
.field-image-name {
  font-size:12.5px; color:var(--ink); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.field-image-meta { font-size:11px; color:var(--ink-light); margin-top:2px; }
.field-image-btn {
  padding:6px 12px; font-size:12px; border:0.5px solid #d5d0c5;
  border-radius:6px; background:#fff; color:var(--ink);
  transition:all .15s var(--ease-out);
}
.field-image-btn:hover { border-color:var(--ink); }
.field-image-btn.icon { padding:6px; }
.field-image-btn.icon:hover { color:var(--red); border-color:#fcc; }
.field-image-uploading { color:var(--ink-light); font-style:italic; font-size:12px; }

/* ====== IMAGE PAIR (Desktop + Mobile) ====== */
.field-image-pair {
  display:flex; flex-direction:column; gap:8px;
}
.field-image-pair .field-image {
  padding-top:30px; /* spazio per il label */
}
.field-image-variant-label {
  position:absolute; top:8px; left:12px;
  font-size:10.5px; font-weight:600; color:var(--ink-soft);
  letter-spacing:.04em; text-transform:uppercase;
  background:var(--bg-warm); padding:2px 8px; border-radius:4px;
  line-height:1.3;
}

/* ====== VIDEO FIELD ====== */
.field-video {
  display:grid;
  grid-template-columns:120px 1fr auto;
  gap:14px; align-items:start; padding:12px;
  background:#fff; border:0.5px solid #d5d0c5; border-radius:8px;
}
.field-video-thumb {
  width:120px; height:75px; border-radius:6px; background:#1a1714;
  display:flex; align-items:center; justify-content:center;
  color:#888; overflow:hidden; position:relative;
}
.field-video-thumb svg { width:24px; height:24px; }
.field-video-thumb video {
  pointer-events:none;
}
.field-video-thumb::after {
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, transparent 0%, transparent 60%, rgba(0,0,0,.4) 100%);
  pointer-events:none;
}
.field-video-info { min-width:0; }
.field-video-name {
  font-size:12.5px; color:var(--ink); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.field-video-meta { font-size:11px; color:var(--ink-light); margin-top:2px; }
.field-video-opts {
  display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:10px;
}
.field-video-opts label {
  display:inline-flex; align-items:center; gap:5px;
  font-size:11.5px; color:var(--ink-soft); cursor:pointer;
  user-select:none;
}
.field-video-opts input[type="checkbox"] {
  width:13px; height:13px; margin:0; cursor:pointer;
  accent-color:var(--coral);
}
.field-video-actions {
  display:flex; flex-direction:column; gap:6px; align-items:flex-end;
}

/* ====== COLOR PICKER ====== */
.field-color {
  display:flex; gap:10px; align-items:center;
}
.field-color-swatch {
  width:40px; height:40px; border-radius:8px; border:0.5px solid var(--line);
  cursor:pointer; position:relative; flex-shrink:0;
  transition:transform .25s var(--ease-spring), box-shadow .25s var(--ease-out);
}
.field-color-swatch:hover {
  transform:scale(1.08);
  box-shadow:var(--shadow-md);
}
.field-color-swatch input[type="color"] {
  position:absolute; inset:0; opacity:0; cursor:pointer;
}
.field-color-input {
  flex:1; max-width:120px; font-family:ui-monospace, monospace; font-size:13px;
}
.field-color-default {
  font-size:11.5px; color:var(--ink-light);
}

/* ====== LIST FIELD (paragraphs, etc.) ====== */
.field-list { display:flex; flex-direction:column; gap:6px; }
.field-list-item {
  display:grid; grid-template-columns:auto 1fr auto; gap:8px;
  align-items:start; padding:8px 10px;
  background:#fff; border:0.5px solid #d5d0c5; border-radius:7px;
}
.field-list-item-drag { display:flex; flex-direction:column; gap:2px; padding:6px 0; color:var(--ink-light); }
.field-list-item-drag .section-drag-row { gap:1.5px; }
.field-list-item-drag .section-drag-dot { width:2.5px; height:2.5px; }
.field-list-item-content { display:flex; flex-direction:column; gap:0; padding:2px 0; }
.field-list-item textarea, .field-list-item input {
  border:0.5px solid var(--line); padding:8px 10px;
  border-radius:6px; background:#fff;
  font-size:13px; font-family:inherit; color:var(--ink);
  resize:vertical; min-height:34px; outline:none; width:100%;
  transition:border-color .15s var(--ease-out);
}
.field-list-item textarea:hover, .field-list-item input:hover {
  border-color:#b0a896;
}
.field-list-item textarea:focus, .field-list-item input:focus {
  outline:none;
  border-color:var(--coral);
  box-shadow:0 0 0 3px rgba(232,93,60,.08);
}
.field-list-item-remove {
  padding:6px; color:var(--ink-light); border-radius:4px;
  align-self:start;
}
.field-list-item-remove:hover { color:var(--red); background:#fee; }
.field-list-add {
  margin-top:8px; display:inline-flex; align-items:center; gap:6px;
  padding:6px 12px; font-size:12px; border:0.5px dashed #b0a896; border-radius:6px;
  background:transparent; color:var(--ink-soft); align-self:flex-start;
}
.field-list-add:hover {
  border-style:solid; border-color:var(--coral); color:var(--coral); background:var(--coral-soft);
}

/* Sub-fields (nested objects in lists) */
.subfields {
  display:grid; grid-template-columns:minmax(0, 1fr) minmax(0, 1fr); gap:12px;
  width:100%;
}
.subfields .field-textarea { grid-column:1 / -1; }
.subfields .field-full { grid-column:1 / -1; }
/* Variante a singola colonna: usata quando l'elemento contiene un'immagine/video.
   Foto in alto a tutta larghezza, poi titolo, descrizioni sotto. */
.subfields.stack { grid-template-columns:1fr; }
.subfields.stack > .field { grid-column:1; }

/* ====== ADD SECTION BUTTON ====== */
.add-section-wrap { display:flex; justify-content:flex-start; padding-left:6px; margin-top:10px; }
.add-section {
  display:inline-flex; align-items:center; gap:6px; padding:7px 14px;
  font-size:12.5px; border:0.5px dashed #b0a896; border-radius:7px;
  background:transparent; color:var(--ink-soft); position:relative;
}
.add-section:hover {
  border-style:solid; border-color:var(--coral); color:var(--coral); background:var(--coral-soft);
}
.add-section-menu {

  display:flex; flex-direction:column; gap:1px; min-width:240px;

.add-section-menu button {

/* ====== TOAST ====== */
.toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(8px);
  background:#1a1714; color:#fff; padding:11px 20px; border-radius:999px;
  font-size:13px; font-weight:500; z-index:1000;
  box-shadow:var(--shadow-lg);
  opacity:0; transition:opacity .25s var(--ease-out), transform .35s var(--ease-spring);
  pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.toast.error { background:var(--red); }
.toast.success { background:var(--green); }

/* ====== UTILITY ====== */
.hidden { display:none !important; }
.spinner {
  width:16px; height:16px; border:2px solid rgba(0,0,0,.1);
  border-top-color:currentColor; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ====== DRAG & DROP ====== */
.section-row { cursor:default; }
.section-drag { cursor:grab; user-select:none; }
.section-drag:active { cursor:grabbing; }
.section-row.is-dragging {
  opacity:.4;
  background:#f4ede3;
}
.section-row.drag-over-above {
  box-shadow:inset 0 3px 0 0 var(--coral);
}
.section-row.drag-over-below {
  box-shadow:inset 0 -3px 0 0 var(--coral);
}

/* ====== HISTORY MODAL ====== */
.modal-backdrop {
  position:fixed; inset:0; background:rgba(10,10,10,.6);
  display:flex; align-items:center; justify-content:center;
  z-index:200; padding:40px 20px;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  animation:fadeIn .2s var(--ease-out);
}
@keyframes fadeIn {
  from { opacity:0; }
}
.modal {
  background:#fff; border-radius:16px; max-width:680px; width:100%;
  max-height:80vh; display:flex; flex-direction:column;
  box-shadow:var(--shadow-lg);
  overflow:hidden;
  animation:scaleIn .3s var(--ease-spring);
}
@keyframes scaleIn {
  from { opacity:0; transform:scale(.95) translateY(10px); }
}
.modal-header {
  display:flex; align-items:center; padding:18px 22px;
  border-bottom:0.5px solid var(--line); gap:12px;
}
.modal-title { flex:1; font-weight:600; font-size:16px; }
.modal-subtitle { color:var(--ink-light); font-size:13px; font-weight:400; }
.modal-close {
  padding:8px; border-radius:8px; color:var(--ink-light);
}
.modal-close:hover { background:#f4ede3; color:var(--ink); }
.modal-body {
  flex:1; overflow-y:auto; padding:8px 0;
}
.modal-loading {
  padding:40px; text-align:center; color:var(--ink-light);
}
.commit-row {
  display:grid; grid-template-columns:auto 1fr auto;
  gap:14px; align-items:center;
  padding:14px 22px; border-bottom:0.5px solid var(--line-soft);
  transition:background .1s;
}
.commit-row:last-child { border-bottom:0; }
.commit-row:hover { background:#fafaf7; }
.commit-avatar {
  width:32px; height:32px; border-radius:50%; background:#d4cab8;
  display:grid; place-items:center; color:#5a554d; font-weight:600;
  font-size:13px; flex-shrink:0; overflow:hidden;
}
.commit-avatar img { width:100%; height:100%; object-fit:cover; }
.commit-info { min-width:0; }
.commit-message {
  font-size:13.5px; color:var(--ink); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.commit-meta {
  font-size:11.5px; color:var(--ink-light); margin-top:2px;
}
.commit-meta .latest {
  display:inline-block; background:#e1f5ee; color:#0f6e56;
  padding:1px 7px; border-radius:4px; font-weight:500;
  margin-left:6px;
}
.commit-action {
  padding:6px 14px; font-size:12px;
  border:0.5px solid var(--line); border-radius:6px;
  background:#fff; color:var(--ink); transition:all .12s;
  cursor:pointer;
}
.commit-action:hover {
  border-color:var(--coral); color:var(--coral); background:var(--coral-soft);
}
.commit-action.current {
  border-color:transparent; color:var(--ink-light);
  background:transparent; cursor:default;
}
.commit-action.current:hover {
  border-color:transparent; color:var(--ink-light); background:transparent;

/* =====================================================================
   OAUTH
   ===================================================================== */
function login(){
  const w = 600, h = 700;
  const left = (screen.width-w)/2, top = (screen.height-h)/2;
  const authUrl = '/.netlify/functions/auth?provider=github&scope=repo&site_id=' + location.host;
  const popup = window.open(authUrl, 'gh_oauth', `width=${w},height=${h},left=${left},top=${top}`);
  if(!popup){ showError('Popup bloccato. Sblocca i popup per questo sito.'); return; }
  function handler(e){
    if(typeof e.data !== 'string') return;
    if(e.data === 'authorizing:github'){
      popup.postMessage('authorizing:github', '*');
      return;
    }
    const m = e.data.match(/^authorization:github:(success|error):(.*)/);
    if(m){
      if(m[1] === 'success'){
        try {
          const parsed = JSON.parse(m[2]);
          if(parsed.token){
            token = parsed.token;
            sessionStorage.setItem('gh_token', token);
            window.removeEventListener('message', handler);
            try { popup.close(); } catch(e){}
            init();
          }
        } catch(err){ showError('Errore parsing token: ' + err.message); }
      } else {
        showError('Login fallito: ' + m[2]);
      }
    }
  }
  window.addEventListener('message', handler);
}
function logout(){
  sessionStorage.removeItem('gh_token');
  token = null;
  location.reload();
}

/* =====================================================================
   GITHUB API
   ===================================================================== */
async function gh(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({
    'Authorization': 'Bearer ' + token,
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  }, opts.headers || {});
  if(opts.body && typeof opts.body !== 'string'){
    opts.body = JSON.stringify(opts.body);
    opts.headers['Content-Type'] = 'application/json';
  }
  const res = await fetch('https://api.github.com' + path, opts);
  if(res.status === 401){
    sessionStorage.removeItem('gh_token');
    token = null;
    throw new Error('Sessione scaduta. Rifai login.');
  }
  if(!res.ok){
    const txt = await res.text();
    throw new Error(`GitHub ${res.status}: ${txt.substring(0,200)}`);
  }
  return res.json();
}

function b64encode(str){
  // Handle Unicode chars correctly
  return btoa(unescape(encodeURIComponent(str)));
}
function b64decode(str){
  return decodeURIComponent(escape(atob(str)));
}

async function loadContent(){
  const r = await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.json?ref=${BRANCH}`);
  dataSha = r.sha;
  return JSON.parse(b64decode(r.content.replace(/\n/g, '')));
}

async function saveContent(){
  const content = JSON.stringify(data, null, 2);
  const body = {
    message: 'Update content.json',
    content: b64encode(content),
    sha: dataSha,
    branch: BRANCH
  };
  const r = await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.json`, {
    method: 'PUT',
    body: body
  });
  dataSha = r.content.sha;
}

/* =====================================================================
   TRADUZIONE AUTOMATICA EN (DeepL via Netlify function)
   - Cammina il JSON italiano, raccoglie SOLO i testi da tradurre
   - Memoria di traduzione (_tm dentro content.en.json): ritraduce solo il nuovo
   - Ricostruisce content.en.json e lo committa
   ===================================================================== */
const TR_SKIP_KEYS = new Set(['href','src','image','poster','photo','logo_url','bg_image','video','icon','id','type',
  'layout','service','style','colors','new_tab','google_brand','featured','free','autoplay','loop','muted','controls',
  'embed_form','c1','c2','c3','mission_percent','mobile_title_gap','title_offset','bg_position','bg_position_mobile','bg_zoom',
  'bg_zoom_mobile','play_x','play_y','player_width','player_ratio','label_size','intro_size','scale','number',
  'prefix','suffix','strong_part','enabled','watermark']);
function trSkipKey(k){ return TR_SKIP_KEYS.has(k) || /(_href|_link)$/.test(k); }
function trSkipValue(v){
  if(typeof v !== 'string') return true;
  const s = v.trim();
  if(!s) return true;
  if(/^(https?:|\/|#|tel:|mailto:)/i.test(s)) return true;      // link e percorsi
  if(/wa\.me/i.test(s)) return true;
  if(/^#?[0-9a-fA-F]{3,8}$/.test(s) && /[0-9a-fA-F]/.test(s) && s.length<=9 && /^#/.test(v.trim())) return true; // colori hex
  if(s === 'sì' || s === 'si' || s === 'no') return true;         // flag del confronto
  if(/^[+\d][\d\s.,-]*$/.test(s)) return true;                  // numeri e telefoni
  if(s.includes('@') && !s.includes(' ')) return true;            // email / handle
  return false;
}
function trWalk(node, key, fn){
  if(node == null) return;
  if(Array.isArray(node)){ node.forEach(x => trWalk(x, key, fn)); return; }
  if(typeof node === 'object'){
    for(const k of Object.keys(node)){
      if(k === '_tm') continue;
      if(trSkipKey(k)) continue;
      const v = node[k];
      if(typeof v === 'string'){ fn(node, k, v); }
      else trWalk(v, k, fn);
    }
    return;
  }
}
function trCollect(itData){
  const out = new Set();
  trWalk(itData, '', (obj, k, v) => {
    if(k === 'features'){ v.split('\n').forEach(line => { if(!trSkipValue(line)) out.add(line.trim()); }); return; }
    if(!trSkipValue(v)) out.add(v);
  });
  return Array.from(out);
}
function trBuildEn(itData, tm){
  const en = JSON.parse(JSON.stringify(itData));
  trWalk(en, '', (obj, k, v) => {
    if(k === 'features'){
      obj[k] = v.split('\n').map(line => tm[line.trim()] !== undefined ? tm[line.trim()] : line).join('\n');
      return;
    }
    if(!trSkipValue(v) && tm[v] !== undefined) obj[k] = tm[v];
  });
  return en;
}
async function trTranslateMissing(strings, tm){
  const missing = strings.filter(s => tm[s] === undefined);
  if(!missing.length) return 0;
  for(let i = 0; i < missing.length; i += 40){
    const chunk = missing.slice(i, i + 40);
    const res = await fetch('/.netlify/functions/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texts: chunk })
    });
    if(!res.ok){
      let msg = 'HTTP ' + res.status;
      try{ const j = await res.json(); if(j.error) msg = j.error; }catch(e){}
      throw new Error(msg);
    }
    const j = await res.json();
    (j.translations || []).forEach((tr, idx) => { tm[chunk[idx]] = tr; });
  }
  return missing.length;
}
async function saveEnglish(){
  // 1. Carica EN esistente (per sha e memoria di traduzione)
  let enSha = null, tm = {};
  try{
    const r = await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.en.json?ref=${BRANCH}`);
    enSha = r.sha;
    try{ const old = JSON.parse(b64decode(r.content.replace(/\n/g, ''))); tm = old._tm || {}; }catch(e){}
  }catch(e){ /* prima volta: il file non esiste ancora */ }
  // 2. Traduce solo le frasi nuove
  const nuove = await trTranslateMissing(trCollect(data), tm);
  // 3. Ricostruisce l'inglese e committa
  const en = trBuildEn(data, tm);
  en._tm = tm;
  const body = {
    message: 'Auto-translate content.en.json' + (nuove ? ` (+${nuove} frasi)` : ''),
    content: b64encode(JSON.stringify(en, null, 2)),
    branch: BRANCH
  };
  if(enSha) body.sha = enSha;
  await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.en.json`, { method: 'PUT', body });
  return nuove;
}

/* Carica un file binario (immagine o video) nel repo GitHub.
   `folder` è 'images' o 'videos'. Ritorna il path con leading slash da salvare nel JSON. */
async function uploadAsset(file, folder){
  // GitHub API ha un limite di 100MB per file ma la base64 raddoppia il peso.
  // Per i video chiediamo conferma sopra i 25MB per evitare crash.
  if(folder === 'videos' && file.size > 25 * 1024 * 1024){
    const mb = (file.size / 1024 / 1024).toFixed(1);
    if(!confirm(`Il video pesa ${mb} MB. File grandi rallentano molto il sito (raccomandato sotto i 10 MB) e potrebbero non caricarsi via GitHub API. Procedere?`)){
      throw new Error('Upload annullato');
    }
  }
  const buf = await file.arrayBuffer();
  let binary = '';
  const bytes = new Uint8Array(buf);
  for(let i=0; i<bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const b64 = btoa(binary);
  const safeName = file.name.replace(/[^a-zA-Z0-9.\-]/g, '-').toLowerCase();
  const path = `${folder}/${Date.now()}-${safeName}`;
  const body = {
    message: `Add ${folder === 'videos' ? 'video' : 'image'} ${safeName}`,
    content: b64,
    branch: BRANCH
  };
  await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'PUT',
    body: body
  });
  return '/' + path;
}

function scrollEditorToSection(idx){
  const editor = document.querySelector('#editor');
  const row = document.querySelector(`[data-section-idx="${idx}"]`);
  if(!editor || !row) return;
  // Calculate the row's top relative to the editor's scroll origin
  const rowRect = row.getBoundingClientRect();
  const editorRect = editor.getBoundingClientRect();
  const targetScroll = editor.scrollTop + (rowRect.top - editorRect.top) - 16;
  editor.scrollTo({top: Math.max(0, targetScroll), behavior:'smooth'});
}

function closeHistory(){

function timeAgo(iso){
  const then = new Date(iso).getTime();
  const sec = Math.floor((Date.now() - then)/1000);
  if(sec < 60) return 'pochi secondi fa';
  if(sec < 3600) return Math.floor(sec/60) + ' min fa';
  if(sec < 86400) return Math.floor(sec/3600) + ' ore fa';
  if(sec < 86400*7) return Math.floor(sec/86400) + ' giorni fa';
  return new Date(iso).toLocaleDateString('it-IT', {day:'numeric',month:'short',year:'numeric'});
}
function renderHistoryList(commits){
  const body = document.querySelector('#historyBody');
  if(!commits || !commits.length){
    body.innerHTML = `<div class="modal-loading">Nessun commit trovato per content.json.</div>`;
    return;
  }
  const rows = commits.map((c, i) => {
    const author = c.commit.author || {};
    const isLatest = i === 0;
    const initials = (author.name || 'C').split(' ').map(s=>s[0]).join('').substring(0,2).toUpperCase();
    const avatar = c.author && c.author.avatar_url
      ? `<img src="${esc(c.author.avatar_url)}" alt="">`
      : esc(initials);
    return `<div class="commit-row">
      <div class="commit-avatar">${avatar}</div>
      <div class="commit-info">
        <div class="commit-message">${esc(c.commit.message.split('\n')[0])}</div>
        <div class="commit-meta">${esc(author.name||'?')} · ${esc(timeAgo(author.date))} · <code style="font-size:11px;color:var(--ink-light)">${esc(c.sha.substring(0,7))}</code>${isLatest?'<span class="latest">attuale</span>':''}</div>
      </div>
      ${isLatest
        ? `<button class="commit-action current" disabled>Versione attuale</button>`
        : `<button class="commit-action" data-restore-sha="${esc(c.sha)}" data-restore-msg="${esc(c.commit.message.split('\n')[0])}">Ripristina</button>`
      }
    </div>`;
  }).join('');
  body.innerHTML = rows;
  // Wire restore buttons
  body.querySelectorAll('[data-restore-sha]').forEach(btn => {
    btn.onclick = async () => {
      const sha = btn.dataset.restoreSha;
      const msg = btn.dataset.restoreMsg;
      if(!confirm(`Ripristinare la versione "${msg}" (${sha.substring(0,7)})?\n\nLe modifiche non pubblicate andranno perse. La versione attuale rimane nello storico.`)) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:1.5px;display:inline-block;vertical-align:-2px"></span> Ripristino…';
      try {
        await restoreVersion(sha);
        closeHistory();
        showToast('Versione ripristinata e pubblicata', 'success');
      } catch(err){
        btn.disabled = false;
        btn.textContent = 'Ripristina';
        showToast('Errore: ' + err.message, 'error');
      }
    };
  });
}
async function restoreVersion(sha){
  // Get the content of content.json at that commit
  const file = await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.json?ref=${sha}`);
  const oldContent = b64decode(file.content.replace(/\n/g, ''));
  // Validate JSON
  let parsed;
  try { parsed = JSON.parse(oldContent); }
  catch(err){ throw new Error('Il file in quel commit non è JSON valido: ' + err.message); }
  // Commit it as a NEW commit (preserving history)
  const body = {
    message: `Ripristina versione ${sha.substring(0,7)}`,
    content: b64encode(oldContent),
    sha: dataSha, // SHA of current content.json
    branch: BRANCH
  };
  const r = await gh(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/content.json`, {
    method: 'PUT',
    body: body
  });
  dataSha = r.content.sha;
  data = parsed;
  ui.expandedSection = null;
  ui.isDirty = false;
  renderApp();
}

function getPath(obj, path){
  let cur = obj;
  for(const k of path){
    if(cur == null) return undefined;
    cur = cur[k];
  }
  return cur;
}
function setPath(obj, path, val){
  let cur = obj;
  for(let i=0; i<path.length-1; i++){
    const k = path[i];
    if(cur[k] == null){
      cur[k] = (typeof path[i+1] === 'number') ? [] : {};
    }
    cur = cur[k];
  }
  cur[path[path.length-1]] = val;
}
function delPath(obj, path){
  let cur = obj;
  for(let i=0; i<path.length-1; i++){
    if(cur[path[i]] == null) return;
    cur = cur[path[i]];
  }
  const k = path[path.length-1];
  if(Array.isArray(cur)) cur.splice(k, 1);
  else delete cur[k];
}

/* =====================================================================
   ESCAPE HELPERS for PREVIEW
   ===================================================================== */
function esc(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* Tronca una stringa lunga mostrando inizio + "…" + fine.
   Utile per nomi file lunghi tipo "photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=...".
   Es: truncateMiddle("photo-1494790108377-be9c29b29330?auto=format.jpg", 28)
       → "photo-1494790108…format.jpg"
*/
function truncateMiddle(s, max){
  if(!s) return '';
  const str = String(s);
  if(str.length <= max) return str;
  // Tieni di più all'inizio (60%) e di meno alla fine (40%), che spesso ha l'estensione
  const head = Math.ceil(max * 0.6);
  const tail = Math.max(4, max - head - 1);
  return str.slice(0, head) + '…' + str.slice(-tail);
}

/* richText: applica formattazione inline sicura su testo che potrebbe contenere
   markdown semplice o tag inline tipo <strong>, <em>, <br>.
   Whitelist: **bold**, *italic*, <strong>, <em>, <b>, <i>, <br>. Resto escapeato.
   IDENTICA alla funzione richText() nella landing — necessaria perché la preview
   del CMS è un iframe isolato che renderizza autonomamente i template. */
function richText(s){
  if(s==null) return '';
  let out = String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
  out = out
    .replace(/&lt;(\/?)strong&gt;/gi, '<$1strong>')
    .replace(/&lt;(\/?)b&gt;/gi, '<$1strong>')
    .replace(/&lt;(\/?)em&gt;/gi, '<$1em>')
    .replace(/&lt;(\/?)i&gt;/gi, '<$1em>')
    .replace(/&lt;br\s*\/?&gt;/gi, '<br>');
  out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
  out = out.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  out = out.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
  return out;
}
/* Normalizza un valore immagine (stringa o {desktop, mobile}) e ritorna una URL utilizzabile.
   Nella preview del CMS ritorniamo sempre la versione desktop (la preview è in iframe a varie larghezze). */
function imageSrc(value){
  if(!value) return '';
  if(typeof value === 'object') return value.desktop || value.mobile || '';
  return value;
}
/* Per la preview del CMS le URL vanno fatte risolvere via raw.githubusercontent
   (visto che l'iframe gira sul dominio admin) */
function previewSrc(value){
  const s = imageSrc(value);
  if(!s) return '';
  if(/^(https?:|data:|blob:)/i.test(s)) return s;
  const path = s.startsWith('/') ? s.slice(1) : s;
  return `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${path}`;
}
function imgTag(src, alt){
  const url = previewSrc(src);
  if(!url) return '';
  return `<img src="${esc(url)}" alt="${esc(alt||'')}">`;
}
/* Genera tag <video> per la preview. Accetta stringa (URL) o oggetto {src, autoplay, loop, muted, controls, poster} */
function videoTag(value, opts){
  if(!value) return '';
  let v;
  if(typeof value === 'string') v = {src:value};
  else v = value;
  const src = v.src || '';
  if(!src) return '';
  const url = previewSrc(src);
  const posterUrl = v.poster ? previewSrc(v.poster) : '';
  opts = opts || {};
  const cls = opts.className || '';
  const fillAttrs = opts.fill ? 'style="width:100%;height:100%;object-fit:cover"' : 'style="width:100%;height:auto"';
  const attrs = [
    v.autoplay ? 'autoplay' : '',
    v.loop ? 'loop' : '',
    v.muted || v.autoplay ? 'muted' : '', // autoplay implica muted
    v.controls ? 'controls' : '',
    'playsinline',
    'preload="metadata"',
    posterUrl ? `poster="${esc(posterUrl)}"` : '',
    cls ? `class="${esc(cls)}"` : ''
  ].filter(Boolean).join(' ');
  return `<video src="${esc(url)}" ${attrs} ${fillAttrs}></video>`;
}

/* Genera attributo style="" con CSS variables locali dalla section.style.
   Le variabili sono: --section-bg, --section-accent, --section-text, --section-card, --text-scale.
   I template della landing/preview leggono queste variabili e fallback sulla palette globale. */
function sectionStyleAttr(s){
  const st = (s && s.style) || {};
  const parts = [];
  if(st.bg)     parts.push(`--section-bg:${st.bg}`);
  if(st.accent) parts.push(`--section-accent:${st.accent}`);
  if(st.text)   parts.push(`--section-text:${st.text}`);
  if(st.card)   parts.push(`--section-card:${st.card}`);
  const scale = scaleValue(st.scale);
  if(scale)     parts.push(`--text-scale:${scale}`);
  return parts.length ? ` style="${parts.join(';')}"` : '';
}
function scaleValue(s){
  if(!s || s === 'normale') return null;
  if(s === 'compatto')   return '0.88';
  if(s === 'grande')     return '1.12';
  if(s === 'extralarge') return '1.25';
  return null;
}

  spacer(s){
    const hd = (s.height_desktop !== undefined && s.height_desktop !== null && String(s.height_desktop).trim() !== '') ? Number(s.height_desktop) : 60;
    const hm = (s.height_mobile !== undefined && s.height_mobile !== null && String(s.height_mobile).trim() !== '') ? Number(s.height_mobile) : hd;
    let divider = '';
    if(s.show_line === 'line') divider = '<span class="spacer-line"></span>';
    else if(s.show_line === 'dot') divider = '<span class="spacer-dot"></span>';
    else if(s.show_line === 'gold') divider = '<span class="spacer-gold"></span>';
    // Nel preview mostro un'indicazione visiva leggera così l'editor "vede" lo spazio
    return `<div class="spacer-block spacer-block-preview" style="--sp-d:${hd}px; --sp-m:${hm}px">
      ${divider}
      <span class="spacer-preview-badge">Spazio ${hd}px${hm!==hd?` · mobile ${hm}px`:''}</span>
    </div>`;
  },
  stats_band(s){
    const items = (s.items||[]).filter(it => it && (it.number || it.label)).map(it => {
      const raw = String(it.number||'').trim();
      const isDecimal = raw.includes(',') || raw.includes('.');
      const intVal = raw.replace(/[^\d]/g, '');
      const shown = isDecimal ? raw : (intVal ? parseInt(intVal,10).toLocaleString('it-IT') : '0');
      return `<div class="sb-item">
        <div class="sb-number">
          ${it.prefix?`<span class="sb-affix sb-prefix">${esc(it.prefix)}</span>`:''}
          <span class="sb-count">${shown}</span>
          ${it.suffix?`<span class="sb-affix sb-suffix">${esc(it.suffix)}</span>`:''}
        </div>
        ${it.label?`<div class="sb-label">${richText(it.label)}</div>`:''}
      </div>`;
    }).join('');
    const labelSizeCls = s.label_size ? ` sb-labelsize-${s.label_size}` : '';
    const introSizeCls = s.intro_size ? ` sb-introsize-${s.intro_size}` : '';

    let logosHtml = '';
    const logos = (s.logos||[]).filter(l => l && l.image);
    if(s.logos_title || logos.length){
      const logoItems = logos.map(l => {
        const url = previewImageUrl(l.image);
        const urlC = l.image_contrast ? previewImageUrl(l.image_contrast) : '';
        const imgTag = url ? `<img class="sb-logo-img sb-logo-dark" src="${esc(url)}" alt="${esc(l.alt||'')}">` : `<span style="opacity:.5;font-size:12px">[logo]</span>`;
        const imgTagC = urlC ? `<img class="sb-logo-img sb-logo-light" src="${esc(urlC)}" alt="${esc(l.alt||'')}">` : '';
        const cls = 'sb-logo' + (urlC ? ' has-contrast' : '');
        return `<div class="${cls}">${imgTag}${imgTagC}</div>`;
      }).join('');
      logosHtml = `<div class="sb-logos-block">
        ${s.logos_title?`<p class="sb-logos-title">${richText(s.logos_title)}</p>`:''}
        ${logoItems?`<div class="sb-logos-grid">${logoItems}</div>`:''}
      </div>`;
    }

    return `<section${sectionStyleAttr(s)} class="stats-band${labelSizeCls}${introSizeCls}">
      <div class="container">
        ${s.intro?`<p class="sb-intro">${richText(s.intro)}</p>`:''}
        <div class="sb-grid">${items}</div>
        ${logosHtml}
      </div>
    </section>`;
  },
  booking_ladder(s){
    const checkSvg = '<svg class="bl-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    const lock = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';
    const featList = (t)=> String(t.features||'').split('\n').map(x=>x.trim()).filter(Boolean);
    const featUl = (t)=>{ const f=featList(t); return f.length?`<ul class="bl-features">${f.map(x=>`<li>${checkSvg}<span>${richText(x)}</span></li>`).join('')}</ul>`:''; };
    const xSvg = '<svg class="bl-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
    const compareRows = Array.isArray(s.compare_features) ? s.compare_features.filter(r=>r&&r.label) : [];
    const compareMode = compareRows.length>0;
    const isOn = (r,idx)=>{ const v=r['c'+(idx+1)]; return v===true||v==='sì'||v==='si'||v==='x'||v==='✓'; };
    const premium = (t)=>{
      const FIC = ['<path d="M20 6 9 17l-5-5"/>','<rect x="2" y="6" width="13" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3z"/>','<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/>','<circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/>','<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>','<path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/>'];
      const fIcon = (i)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${FIC[i%FIC.length]}</svg>`;
      const f = featList(t);
      const featGrid = f.length?`<div class="bl-feat-list">${f.map((x,i)=>`<div class="bl-feat-item"><span class="bl-feat-ic">${fIcon(i)}</span><span>${richText(x)}</span></div>`).join('')}</div>`:'';
      const price = esc(String(t.price||'').trim());
      const cta = t.cta_label?`<span class="bl-cta bl-cta-dark">${esc(t.cta_label)}</span>`:'';
      return `
        <div class="bl-tier is-featured">
          ${t.badge?`<div class="bl-feat-ribbon"><span>${esc(t.badge)}</span></div>`:''}
          <div class="bl-feat-pad">
            <div class="bl-feat-gem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M3 9l4-6h10l4 6-9 12L3 9z"/><path d="M3 9h18"/><path d="M8 3l-1 6 5 12 5-12-1-6"/></svg></div>
            <h3 class="bl-feat-name">${richText(t.name||'')}</h3>
            ${t.who?`<span class="bl-feat-pill">${richText(t.who)}</span>`:''}
            ${t.social_proof?`<div class="bl-social"><span class="bl-stars">★★★★★</span><span>${richText(t.social_proof)}</span></div>`:''}
            ${featGrid}
            <div class="bl-feat-pricewrap">
              ${t.price_compare?`<div class="bl-compare">Valore reale <s>${esc(t.price_compare)}</s></div>`:''}
              <div class="bl-today">Oggi solo</div>
              <div class="bl-price-big">${price}</div>
            </div>
            ${cta}
            ${t.scarcity?`<span class="bl-feat-scarcity">${lock}${esc(t.scarcity)}</span>`:''}
          </div>
        </div>`;
    };
    const renderTier = (t, idx)=>{
      if(!compareMode && s.layout==='columns' && !!t.featured && t.featured!=='') return premium(t);
      const isFeatured = !compareMode && !!t.featured && t.featured!=='';
      const isFree = !!t.free && t.free!=='';
      const priceRaw = String(t.price||'').trim();
      const priceIsFree = isFree || /grat/i.test(priceRaw);
      const cls = `bl-tier${isFeatured?' is-featured':''}${isFree?' is-free':''}${(compareMode&&t.photo)?' has-photo':''}`;
      const icon = previewBookingLadderIcon(t.icon);
      const feats = (compareMode && featList(t).length===0)
        ? `<ul class="bl-features bl-compare-list">${compareRows.map(r=>{
            const on = isOn(r, idx);
            return `<li class="${on?'is-on':'is-off'}">${on?checkSvg:xSvg}<span>${richText(r.label)}</span></li>`;
          }).join('')}</ul>`
        : featUl(t);
      const ctaA = t.cta_label?`<span class="bl-cta">${esc(t.cta_label)}</span>`:'';
      const ctaB = t.cta2_label?`<span class="bl-cta bl-cta-alt">${esc(t.cta2_label)}</span>`:'';
      const ctaWrap = (ctaA||ctaB)?`<div class="bl-cta-pair">${ctaA}${ctaB}</div>`:'';
      const formHtml = t.embed_form ? `
        <form class="bl-lead-form">
          <input type="text" placeholder="Nome" disabled>
          <input type="text" placeholder="Cognome" disabled>
          <input type="email" placeholder="Email" disabled>
          <input type="tel" placeholder="Telefono" disabled>
          <label class="bl-consent"><input type="checkbox" disabled><span>Ho letto e accetto l\u2019informativa privacy\u2026</span></label>
          <span class="bl-cta">Invia richiesta</span>
        </form>` : '';
      return `<div class="${cls}${t.embed_form?' bl-has-form':''}">
        ${(compareMode&&t.photo) ? '' : (t.icon ? `<div class="bl-icon">${icon}</div>` : '')}
        <div class="bl-tier-body">
          ${t.badge?`<span class="bl-badge">${esc(t.badge)}</span>`:''}
          <h3 class="bl-tier-name">${richText(t.name||'')}</h3>
          ${t.who?`<p class="bl-tier-who">${richText(t.who)}</p>`:''}
          ${t.format?`<p class="bl-tier-format">${richText(t.format)}</p>`:''}
          ${t.value_line?`<p class="bl-value">${richText(t.value_line)}</p>`:''}
          ${t.embed_form ? '' : feats}
          ${t.scarcity?`<span class="bl-scarcity">${esc(t.scarcity)}</span>`:''}
        </div>
        ${t.embed_form
          ? `<div class="bl-tier-action bl-tier-action-form">${formHtml}</div>`
          : `<div class="bl-tier-action">
          <div class="bl-price${priceIsFree?' is-free':''}">${esc(priceRaw||'')}</div>
          ${ctaWrap}
        </div>`}
      </div>`;
    };
    const renderButton = (t)=>{
      const isWa = (t.icon==='whatsapp');
      const sub = t.format || t.who || '';
      return `<div class="bl-button ${isWa?'bl-button-wa':'bl-button-gold'}">
        <span class="bl-button-ic">${previewBookingLadderIcon(t.icon||'chat')}</span>
        <span class="bl-button-tx"><strong>${esc(t.name||t.cta_label||'')}</strong>${sub?`<small>${richText(sub)}</small>`:''}</span>
        <span class="bl-button-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg></span>
      </div>`;
    };
    const all = (s.tiers||[]).filter(t => t && (t.name || t.price));
    let tiersHtml;
    if(s.layout === 'columns'){
      const cards = all.filter(t => !(t.free && t.free!==''));
      const btns = all.filter(t => t.free && t.free!=='');
      const renderCard = (t,i)=> compareMode
        ? `<div class="bl-card-wrap">${t.photo?`<div class="bl-photo">${imgTag(t.photo, t.name||'')}</div>`:''}${renderTier(t,i)}</div>`
        : renderTier(t,i);
      const anyPhoto = compareMode && cards.some(t=>t.photo);
      tiersHtml = `<div class="bl-row bl-row-paid${anyPhoto?' bl-row-haspics':''}">${cards.map((t,i)=>renderCard(t,i)).join('')}</div>`
        + (btns.length ? `<div class="bl-buttons">${btns.map(renderButton).join('<span class="bl-or" aria-hidden="true">oppure</span>')}</div>` : '');
    } else {
      tiersHtml = all.map((t,i)=>renderTier(t,i)).join('');
    }
    return `
      <section${sectionStyleAttr(s)} class="booking-ladder${s.layout==='columns'?' bl-columns':''}"${s.id?` id="${esc(s.id)}"`:''}>
        <div class="container">
          <div class="bl-head">
            ${s.eyebrow?`<p class="bl-eyebrow">${esc(s.eyebrow)}</p>`:''}
            <h2 class="bl-title">${richText(s.title_a||'')} <span class="accent">${richText(s.title_accent||'')}</span></h2>
            ${s.subtitle?`<p class="bl-subtitle">${richText(s.subtitle)}</p>`:''}
          </div>
          ${s.urgency?`<div class="bl-urgency-wrap"><span class="bl-urgency">${richText(s.urgency)}</span></div>`:''}
          <div class="bl-tiers">${tiersHtml}</div>
          ${s.footer_note?`<p class="bl-footer-note">${richText(s.footer_note)}</p>`:''}
        </div>
      </section>`;
  }
};

function previewBookingLadderIcon(name){
  const S = path => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
  switch(name){
    case 'crown':    return S('<path d="M3 8l4 4 5-7 5 7 4-4-2 11H5z"/><path d="M5 20h14"/>');
    case 'video':    return S('<rect x="2" y="6" width="13" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3z"/>');
    case 'user':     return S('<circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/>');
    case 'chat':     return S('<path d="M21 12a8 8 0 0 1-11.5 7.2L4 21l1.8-5.5A8 8 0 1 1 21 12z"/>');
    case 'whatsapp': return S('<path d="M21 12a8.5 8.5 0 0 1-12.6 7.5L3.5 21l1.6-4.8A8.5 8.5 0 1 1 21 12z"/>');
    case 'sparkle':  return S('<path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5L18 18M6 18l2.5-2.5M15.5 8.5L18 6"/>');
    case 'phone':    return S('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>');
    default:         return S('<circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/>');
  }
}

function previewTopbarIconSvg(name){
  const S = (path, sw) => `<svg class="topbar-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.8}" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">${path}</svg>`;
  switch(name){
    case 'newsletter': return S('<rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/>');
    case 'calendar':   return S('<rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/>');
    case 'phone':      return S('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z"/>');
    case 'fire':       return S('<path d="M12 22c4 0 7-3 7-7 0-2-1-4-3-5 0 2-1 3-2 3 0-3-2-5-2-8 0 0-7 4-7 10a7 7 0 0 0 7 7z"/>');
    case 'check':      return S('<polyline points="20 6 9 17 4 12"/>');
    case 'shield':     return S('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>');
    default: return '';
  }
}

function renderPreviewTopbar(d){
  const tb = d.topbar||{};
  if(tb.enabled === false) return '';
  const validItems = (tb.items||[]).filter(it => it && it.label && String(it.label).trim());
  if(!validItems.length) return '';
  const built = validItems.map(item => {
    let label = esc(item.label||'');
    if(item.google_brand) label = label.replace(/Google/g, '<span class="topbar-google">Google</span>');
    if(item.strong_part) label = label.replace(new RegExp(esc(item.strong_part), 'g'), `<span class="topbar-strong">${esc(item.strong_part)}</span>`);
    if(item.icon === 'shield'){
      return {item, html:`<span class="topbar-item topbar-pillars"><span class="topbar-shield">${previewTopbarIconSvg('shield')}</span><span class="topbar-pillars-text">${label}</span></span>`};
    }
    let inner = '';
    if(item.icon === 'star') inner = `<span class="topbar-star">★★★★★</span>`;
    else if(item.icon === 'dot') inner = `<span class="topbar-dot" aria-hidden="true"></span>`;
    else if(item.icon) inner = `<span class="topbar-icon">${previewTopbarIconSvg(item.icon)}</span>`;
    return {item, html: `<span class="topbar-item">${inner}${label}</span>`};
  });
  const itemsHtml = built.map(b => b.html).join('');
  const c1 = tb.bg_color || '#0D2E36';
  const c2 = tb.bg_color_2 || c1;
  const tc = tb.text_color || '#F7F3EC';
  const bg = (c1 === c2) ? c1 : `linear-gradient(90deg, ${c1} 0%, ${c2} 100%)`;
  return `<div class="topbar" style="background:${bg}; color:${tc}"><div class="topbar-track">${itemsHtml}</div></div>`;
}

function previewLogoMark(d){
  const src = d.site?.logo_url;
  let url = '';
  if(typeof src === 'string') url = src;
  else if(src && typeof src === 'object') url = src.desktop || src.mobile || '';
  if(url){
    return `<span class="logo-mark logo-mark-img"><img src="${esc(url)}" alt="Logo"></span>`;
  }
  const txt = (d.site?.logo_text||'Dr. Campa').trim();
  const initials = txt.split(/\s+/).map(w=>w.replace(/\./g,'').charAt(0).toUpperCase()).join('').slice(0,2) || 'DC';
  return `<span class="logo-mark">${esc(initials)}</span>`;
}

function renderPreviewNav(d){
  const nav = d.nav||{};
  const links = (nav.links||[]).map(l=>`<li><a href="${esc(l.href||'#')}">${esc(l.label||'')}</a></li>`).join('');
  const logoText = d.site?.logo_text || '';
  return `<nav class="nav"><div class="container nav-inner">
    <a href="#" class="logo">${previewLogoMark(d)}${logoText?`<span class="logo-text">${esc(logoText)}</span>`:''}</a>
    <ul class="nav-links">${links}</ul>
    <div class="nav-cta">
      ${nav.phone_label?`<a href="${esc(nav.phone_href||'#')}" class="login">${esc(nav.phone_label)}</a>`:''}
      ${nav.cta_label?`<a href="${esc(nav.cta_href||'#')}" class="btn btn-primary">${esc(nav.cta_label)}</a>`:''}
    </div>
  </div></nav>`;
}
function renderPreviewFooter(d){
  const f = d.footer||{};
  const cols = (f.columns||[]).map(c=>{
    const links = (c.links||[]).map(l=>`<li><a href="${esc(l.href||'#')}">${esc(l.label||'')}</a></li>`).join('');
    return `<div><h5>${esc(c.title||'')}</h5><ul>${links}</ul></div>`;
  }).join('');
  const logoText = d.site?.logo_text || '';
  return `<footer class="footer"><div class="container">
    <div class="footer-top">
      <div class="footer-about">
        <a href="#" class="logo">${previewLogoMark(d)}${logoText?`<span class="logo-text">${esc(logoText)}</span>`:''}</a>
        <p>${esc(f.about_text||'')}</p>
      </div>${cols}
    </div>
    <div class="footer-bottom"><div>${esc(f.bottom_left||'')}</div></div>
  </div></footer>`;
}

function colorVars(d){
  return '<style id="cms-color-vars">' + colorVarsRules(d) + '</style>';
}
function colorVarsRules(d){
  const c = (d.site && d.site.colors) || {};
  // Default Clinical Luxury palette
  const p = c.primary || '#123C46';   // Deep Petrol
  const a = c.accent  || '#C8A86B';   // Champagne Gold
  const i = c.ink     || '#1E1E1E';   // Charcoal
  const b = c.bg_soft || '#F7F3EC';   // Warm Ivory
  // Emetto sia le variabili nuove (--petrol, --gold) che gli alias legacy
  // (--coral-deep, --yellow, --bg-soft) usati ancora da alcuni template
  return `:root{
    --petrol:${p};--coral-deep:${p};--coral-1:${p};--coral-darker:${p};
    --gold:${a};--yellow:${a};
    --ink:${i};
    --ivory:${b};--bg-soft:${b};
  }`;
}

const PREVIEW_BASE_CSS_URL = '/index.html';

async function ensurePreviewBaseCss(){
  if(!ensurePreviewBaseCss._css){
    try {
      // Cache-bust: ogni sessione editor scarica una copia fresca della landing
      const r = await fetch(PREVIEW_BASE_CSS_URL + '?_t=' + Date.now());
      const html = await r.text();
      const m = html.match(/<style>([\s\S]*?)<\/style>/);
      ensurePreviewBaseCss._css = m ? m[1] : '';
    } catch(e){
      ensurePreviewBaseCss._css = 'body{font-family:sans-serif;padding:40px;color:#333}';
    }
  }
  return ensurePreviewBaseCss._css;
}

function renderPreviewBody(){
  const sectionsHTML = (data.sections||[]).map((s, i) => {
    const tpl = previewTemplates[s.type];
    let inner;
    if(!tpl) inner = `<div style="padding:20px;background:#ffe;color:#a60">Tipo sconosciuto: ${esc(s.type)}</div>`;
    else {
      try { inner = tpl(s); }
      catch(e){ inner = `<div style="padding:20px;background:#fee;color:#a60">Errore in ${esc(s.type)}: ${esc(e.message)}</div>`; }
    }
    return `<div data-cms-section-idx="${i}" data-cms-section-type="${esc(s.type)}">${inner}</div>`;
  }).join('');
  return renderPreviewTopbar(data) + renderPreviewNav(data) + '<main>' + sectionsHTML + '</main>' + renderPreviewFooter(data);
}

(function(){
  // ====== TOPBAR ROTATION: una voce alla volta, ogni 4 secondi ======
  var topbarItems = document.querySelector('.topbar-fixed') ? [] : document.querySelectorAll('.topbar-item');
  if(topbarItems.length){
    var current = 0;
    topbarItems[0].classList.add('is-active');
    setInterval(function(){
      topbarItems[current].classList.remove('is-active');
      current = (current + 1) % topbarItems.length;
      topbarItems[current].classList.add('is-active');
    }, 4000);
  }
  // Click on a section → tell parent editor to open it
  document.addEventListener('click', function(e){
    var sec = e.target.closest('[data-cms-section-idx]');
    if(!sec) return;
    if(e.target.closest('a, button, input, textarea, select, form')) return;
    e.preventDefault(); e.stopPropagation();
    var idx = parseInt(sec.getAttribute('data-cms-section-idx'));
    if(!isNaN(idx)){
      parent.postMessage({cms:'open-section', idx:idx}, '*');
    }
  }, true);

  // Receive messages from parent
  window.addEventListener('message', function(e){
    if(!e.data) return;
    if(e.data.cms === 'highlight'){
      document.querySelectorAll('[data-cms-section-idx]').forEach(function(el){
        el.classList.remove('cms-current');
      });
      if(e.data.idx == null) return;
      var target = document.querySelector('[data-cms-section-idx="' + e.data.idx + '"]');
      if(target) target.classList.add('cms-current');
    } else if(e.data.cms === 'scroll-to'){
      if(e.data.idx == null) return;
      var target = document.querySelector('[data-cms-section-idx="' + e.data.idx + '"]');
      if(target){
        target.scrollIntoView({behavior:'smooth', block:'start'});
      }
    } else if(e.data.cms === 'update-body'){
      // Save scroll, replace body content, restore scroll
      var savedScroll = window.scrollY;
      var savedHighlight = null;
      var cur = document.querySelector('[data-cms-section-idx].cms-current');
      if(cur) savedHighlight = cur.getAttribute('data-cms-section-idx');
      document.body.innerHTML = e.data.bodyHTML;
      window.scrollTo(0, savedScroll);
      // Re-apply highlight if previous current section still exists
      if(savedHighlight !== null){
        var t = document.querySelector('[data-cms-section-idx="' + savedHighlight + '"]');
        if(t) t.classList.add('cms-current');
      }
      // Update color variables
      if(e.data.colorRules){
        var cv = document.getElementById('cms-color-vars');
        if(!cv){
          cv = document.createElement('style');
          cv.id = 'cms-color-vars';
          document.head.appendChild(cv);
        }
        cv.textContent = e.data.colorRules;
      }
    }
  });
})();
<\/script></body></html>`;
}

let pendingPreviewScroll = null;
let previewInitialized = false;

async function updatePreview(){
  const iframe = document.querySelector('#preview-iframe');
  if(!iframe) return;

  // Check if iframe is the same one that was initialized
  if(previewInitialized){
    try {
      // Verify iframe still alive and has our cms-color-vars element
      if(!iframe.contentDocument || !iframe.contentDocument.body){
        previewInitialized = false;
      } else if(!iframe.contentDocument.getElementById('cms-color-vars')){
        previewInitialized = false;
      }
    } catch(e){
      previewInitialized = false;
    }
  }

  if(!previewInitialized){
    // First load: full srcdoc
    const html = await buildInitialPreviewHTML();
    const onLoad = () => {
      iframe.removeEventListener('load', onLoad);
      previewInitialized = true;
      syncPreviewHighlight();
      if(pendingPreviewScroll !== null){
        const idx = pendingPreviewScroll;
        pendingPreviewScroll = null;
        setTimeout(() => scrollPreviewToSection(idx), 50);
      }
    };
    iframe.addEventListener('load', onLoad);
    iframe.srcdoc = html;
  } else {
    // Incremental: just send the new body content via postMessage
    // The iframe's update-body handler preserves scroll & highlight by itself
    const bodyHTML = renderPreviewBody();
    const colorRules = colorVarsRules(data);
    try {
      iframe.contentWindow.postMessage({
        cms: 'update-body',
        bodyHTML: bodyHTML,
        colorRules: colorRules
      }, '*');
    } catch(e){}
    // After the iframe processes update-body (which happens immediately),
    // optionally apply highlight (the iframe already preserves it, but in case
    // ui.expandedSection changed we want the new one) and pending scroll
    setTimeout(() => {
      syncPreviewHighlight();
      if(pendingPreviewScroll !== null){
        const idx = pendingPreviewScroll;
        pendingPreviewScroll = null;
        scrollPreviewToSection(idx);
      }
    }, 20);
  }
}

/* Send a message to the iframe telling it which section is currently being edited */
function syncPreviewHighlight(){
  // Update the parent toolbar badge first (always visible, never overlaps content)
  updateEditingInfo();
  const iframe = document.querySelector('#preview-iframe');
  if(!iframe || !iframe.contentWindow) return;
  try {
    iframe.contentWindow.postMessage({
      cms: 'highlight',
      idx: ui.expandedSection
    }, '*');
  } catch(e){}
}

function updateEditingInfo(){
  const el = document.querySelector('#editingInfo');
  if(!el) return;
  if(ui.expandedSection != null && data && data.sections && data.sections[ui.expandedSection]){
    const type = data.sections[ui.expandedSection].type;
    const label = TYPE_LABELS[type] || type;
    el.innerHTML = '✏️ <span style="color:var(--ink-soft);font-weight:400">Modificando:</span>&nbsp;<strong>' + esc(label) + '</strong>';
    el.classList.remove('hidden');
  } else {
    el.classList.add('hidden');
    el.textContent = '';
  }
}

/* Tell the iframe to scroll to a specific section */
function scrollPreviewToSection(idx){
  const iframe = document.querySelector('#preview-iframe');
  if(!iframe || !iframe.contentWindow) return;
  try {
    iframe.contentWindow.postMessage({
      cms: 'scroll-to',
      idx: idx
    }, '*');
  } catch(e){}
}

/* =====================================================================
   FIELD RENDERERS — produce <input>/<textarea>/etc for each field type
   ===================================================================== */
function renderField(field, value, path){
  const [name, label, type, hint, extra] = field;
  let inputHTML = '';

  if(type === 'text'){
    inputHTML = `<input class="field-input" type="text" data-path="${path.join('.')}" value="${esc(value||'')}"><p class="field-fmt-hint">Formattazione: <code>_corsivo_</code> · <code>**grassetto**</code></p>`;
  } else if(type === 'textarea'){
    inputHTML = `<textarea class="field-textarea" data-path="${path.join('.')}">${esc(value||'')}</textarea><p class="field-fmt-hint">Formattazione: <code>_corsivo_</code> · <code>**grassetto**</code></p>`;
  } else if(type === 'number'){
    inputHTML = `<input class="field-input field-number" type="number" data-path="${path.join('.')}" value="${value!=null?value:''}">`;
  } else if(type === 'boolean'){
    inputHTML = `<label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);cursor:pointer"><input type="checkbox" data-path="${path.join('.')}" ${value?'checked':''} style="width:auto;margin:0"> Attivo</label>`;
  } else if(type === 'select'){
    // Le opzioni possono essere stringhe ['a','b'] o tuple [['a','Label A'],['b','Label B']]
    const opts = (extra||[]).map(o => {
      let val, lbl;
      if(Array.isArray(o)){ val = o[0]; lbl = o[1]; }
      else { val = o; lbl = o; }
      return `<option value="${esc(val)}" ${val===value?'selected':''}>${esc(lbl)}</option>`;
    }).join('');
    // Se la prima opzione è già "vuoto/—", non aggiungiamo il placeholder duplicato
    const hasEmpty = (extra||[]).some(o => (Array.isArray(o) ? o[0] : o) === '');
    const placeholder = hasEmpty ? '' : '<option value="">—</option>';
    inputHTML = `<select class="field-select" data-path="${path.join('.')}">${placeholder}${opts}</select>`;
  } else if(type === 'color'){
    const def = field[3]; // default color
    const hintTxt = field[4];
    const v = value || '';
    const swatchColor = v || def;
    inputHTML = `<div class="field-color">
      <div class="field-color-swatch" style="background:${esc(swatchColor)}">
        <input type="color" value="${esc(swatchColor)}" data-path="${path.join('.')}" data-color>
      </div>
      <input class="field-input field-color-input" type="text" data-path="${path.join('.')}" value="${esc(v)}" placeholder="${esc(def)}">
      <span class="field-color-default">default ${esc(def)}</span>
    </div>`;
    return `<div class="field"><div class="field-label">${esc(label)}</div>${hintTxt?`<p class="field-hint">${esc(hintTxt)}</p>`:''}${inputHTML}</div>`;
  } else if(type === 'image'){
    inputHTML = renderImageField(value, path);
  } else if(type === 'video'){
    inputHTML = renderVideoField(value, path);
  } else if(type === 'list-text'){
    inputHTML = renderListText(value||[], path);
  } else if(type === 'list-object'){
    inputHTML = renderListObject(value||[], path, extra);
  }

  return `<div class="field"><div class="field-label">${esc(label)}</div>${hint?`<p class="field-hint">${esc(hint)}</p>`:''}${inputHTML}</div>`;
}

/* Trasforma un path relativo dell'immagine (es. "/images/foo.jpg") nella URL
   raw.githubusercontent.com, che è disponibile IMMEDIATAMENTE dopo upload
   (senza aspettare il rebuild Netlify). URL già assolute (http/https/data:) restano.
   Se value è un oggetto {desktop, mobile}, ritorna la URL del desktop. */
function previewImageUrl(value){
  if(!value) return '';
  // Supporto formato oggetto {desktop, mobile}
  if(typeof value === 'object'){
    return previewImageUrl(value.desktop || value.mobile || '');
  }
  if(/^(https?:|data:|blob:)/i.test(value)) return value;
  const path = value.startsWith('/') ? value.slice(1) : value;
  return `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${path}`;
}

/* Estrae la URL desktop e mobile da un valore image (stringa o oggetto). */
function imageVariants(value){
  if(!value) return {desktop:'', mobile:''};
  if(typeof value === 'string') return {desktop:value, mobile:''};
  return {
    desktop: value.desktop || '',
    mobile: value.mobile || ''
  };
}

function renderImageField(value, path){
  const variants = imageVariants(value);
  const pathStr = path.join('.');
  return `<div class="field-image-pair" data-image-path="${pathStr}">
    ${renderImageSlot('desktop', '🖥️ Desktop', variants.desktop, pathStr)}
    ${renderImageSlot('mobile', '📱 Mobile (opzionale)', variants.mobile, pathStr)}
  </div>`;
}

function renderImageSlot(variant, label, url, parentPath){
  const rawName = url ? url.split('/').pop() : '';
  // Tronca i nomi lunghi mantenendo l'inizio e l'estensione (es. "photo-1494790108377-be9c29...crop.jpg")
  const filename = truncateMiddle(rawName, 32);
  const thumbUrl = previewImageUrl(url);
  return `<div class="field-image" data-image-variant="${variant}" data-image-parent="${parentPath}">
    <div class="field-image-variant-label">${label}</div>
    <div class="field-image-thumb">
      ${url
        ? `<img src="${esc(thumbUrl)}" alt="" onerror="this.style.display='none'">`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`
      }
    </div>
    <div class="field-image-info">
      ${url
        ? `<div class="field-image-name">${esc(filename)}</div><div class="field-image-meta">Caricata</div>`
        : `<div class="field-image-name" style="color:var(--ink-light)">${variant === 'mobile' ? 'Usa desktop se vuoto' : 'Nessuna immagine'}</div><div class="field-image-meta">Clicca per caricare</div>`
      }
    </div>
    <button class="field-image-btn" data-action="upload">Carica</button>
    ${url?`<button class="field-image-btn icon" data-action="remove" aria-label="Rimuovi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>`:''}
  </div>`;
}

/* Nuovo: video field renderer */
function renderVideoField(value, path){
  const pathStr = path.join('.');
  // Value può essere: stringa (URL del video) o oggetto {src, poster, autoplay, loop, muted, controls}
  let v;
  if(typeof value === 'string') v = {src:value, autoplay:false, loop:false, muted:false, controls:true};
  else v = value || {};
  const src = v.src || '';
  const poster = v.poster || '';
  const filename = src ? src.split('/').pop() : '';
  const previewUrl = previewImageUrl(src);

  return `<div class="field-video" data-video-path="${pathStr}">
    <div class="field-video-thumb">
      ${src
        ? `<video src="${esc(previewUrl)}" ${poster?`poster="${esc(previewImageUrl(poster))}"`:''} muted preload="metadata" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></video>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`
      }
    </div>
    <div class="field-video-info">
      <div class="field-video-name">${src ? esc(filename) : 'Nessun video caricato'}</div>
      <div class="field-video-meta">${src ? 'Video caricato' : 'MP4 o WebM, max 5MB consigliato'}</div>
      <div class="field-video-opts">
        <label><input type="checkbox" data-video-opt="autoplay" data-video-parent="${pathStr}" ${v.autoplay?'checked':''}> Autoplay</label>
        <label><input type="checkbox" data-video-opt="loop" data-video-parent="${pathStr}" ${v.loop?'checked':''}> Loop</label>
        <label><input type="checkbox" data-video-opt="muted" data-video-parent="${pathStr}" ${v.muted?'checked':''}> Muted</label>
        <label><input type="checkbox" data-video-opt="controls" data-video-parent="${pathStr}" ${v.controls?'checked':''}> Controlli</label>
      </div>
    </div>
    <div class="field-video-actions">
      <button class="field-image-btn" data-action="upload-video">${src ? 'Sostituisci' : 'Carica'}</button>
      ${src?`<button class="field-image-btn icon" data-action="remove-video" aria-label="Rimuovi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>`:''}
    </div>
  </div>`;
}

function renderListText(items, path){

function renderListObject(items, path, subSchema){
  // Se l'elemento ha un campo immagine o video, usiamo layout stacked (singola colonna)
  // così foto e video si vedono grandi sopra, e i testi stanno sotto in piena larghezza.
  const hasMedia = (subSchema||[]).some(f => f[2] === 'image' || f[2] === 'video');
  const subfieldsCls = hasMedia ? 'subfields stack' : 'subfields';
  const itemsHTML = items.map((it, i) => {
    const subFields = (subSchema||[]).map(f => {
      return renderField(f, it[f[0]], path.concat([i, f[0]]));
    }).join('');
    return `<div class="field-list-item" data-list-item="${i}" style="display:block;padding:14px 14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px solid var(--line-soft)">
        <span style="font-size:12px;font-weight:500;color:var(--ink-soft)">Elemento ${i+1}</span>
        <span style="display:inline-flex;gap:2px;align-items:center">
          <button class="field-list-item-remove" data-list-move="up" data-list-idx="${i}" data-list-path="${path.join('.')}" aria-label="Sposta su" title="Sposta su"${i===0?' disabled style="opacity:.25;cursor:default"':''}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="field-list-item-remove" data-list-move="down" data-list-idx="${i}" data-list-path="${path.join('.')}" aria-label="Sposta giù" title="Sposta giù"${i===items.length-1?' disabled style="opacity:.25;cursor:default"':''}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button class="field-list-item-remove" data-list-remove="${i}" data-list-path="${path.join('.')}" aria-label="Rimuovi" title="Rimuovi">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </span>
      </div>
      <div class="${subfieldsCls}">${subFields}</div>
    </div>`;
  }).join('');
  return `<div class="field-list">${itemsHTML}</div>
    <button class="field-list-add" data-list-add="${path.join('.')}" data-list-type="object" data-sub-schema='${esc(JSON.stringify(subSchema||[]))}'>+ Aggiungi elemento</button>`;
}
